&lt;!-- ============ U1 ============ --&gt;
&lt;section class=&quot;unit show&quot; id=&quot;u1&quot;&gt;
  &lt;div class=&quot;uhead b1&quot;&gt;&lt;h2&gt;Unidad 1 — Derivados, mercados y mecánica de futuros&lt;/h2&gt;
  &lt;p&gt;Hull caps. 1 y 2 (la numeración coincide en inglés y español)&lt;/p&gt;&lt;/div&gt;

  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c1&quot;&gt;U1&lt;/span&gt;Qué es un derivado: usos e instrumentos&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;Instrumento cuyo valor &lt;b&gt;deriva&lt;/b&gt; de un subyacente (acción, bono, commodity, divisa, tasa). Usos: &lt;b&gt;cobertura&lt;/b&gt; (reducir riesgo — no garantiza mejor resultado), &lt;b&gt;especulación&lt;/b&gt; (apostar con apalancamiento) y &lt;b&gt;arbitraje&lt;/b&gt; (ganancia sin capital propio; dura poco y deja a los precios dentro de bandas de no arbitraje).&lt;/p&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo cátedra — especulación apalancada (dólar futuro)&lt;/b&gt;Capital $55MM; S=1.100, F=1.150. Spot: long USD 50.000. Futuros: 500 contratos (size 1.000, margen 100). Si S=F=1.200: +5MM vs &lt;b&gt;+25MM&lt;/b&gt;. Si 1.050: −2,5MM vs &lt;b&gt;−50MM&lt;/b&gt;. El apalancamiento multiplica para ambos lados.&lt;/div&gt;
    &lt;div class=&quot;ojo&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ojo — ejemplo GGAL (PPT pág. 14)&lt;/b&gt;El &quot;+1,5MM&quot; del call con S=9.000 es payoff &lt;b&gt;bruto&lt;/b&gt;: neto de la prima ($0,7MM) la ganancia es &lt;b&gt;+0,8MM&lt;/b&gt;. Hull netea la prima en sus ejemplos. Además, en la tabla de la pág. 4, la definición de &quot;Exchange-Traded&quot; repite por error el texto de forwards.&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Instrumentos&lt;/b&gt;: forwards/futuros (obligación, payoff lineal, suma cero, valor inicial 0) · swaps (intercambio de flujos; el de tasas = conjunto de FRAs) · opciones (derecho contra prima; en BYMA son americanas).&lt;/p&gt;
    &lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;73.0&quot; x2=&quot;260&quot; y2=&quot;73.0&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;76.0&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,73.0 34.0,117.9 147.0,73.0 260.0,28.1 260.0,73.0&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,117.9 147.0,73.0 260.0,28.1&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K=500&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Long forward/futuro&lt;/b&gt; — soja a K=500 (PPT U1). &lt;b&gt;Lectura:&lt;/b&gt; payoff lineal S&lt;sub&gt;T&lt;/sub&gt;−K, sin prima y sin piso ni techo: con S&lt;sub&gt;T&lt;/sub&gt;=600 gano 100, con 400 pierdo 100. El valor de entrar hoy es cero y es un juego de suma cero con el short. Compará con un call: acá la baja NO está capeada.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;73.0&quot; x2=&quot;260&quot; y2=&quot;73.0&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;76.0&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,73.0 34.0,28.1 147.0,73.0 260.0,117.9 260.0,73.0&quot; fill=&quot;#f87171&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,28.1 147.0,73.0 260.0,117.9&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K=500&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Short forward/futuro&lt;/b&gt; — espejo exacto (K−S&lt;sub&gt;T&lt;/sub&gt;). &lt;b&gt;Lectura:&lt;/b&gt; gana cuando el precio cae: es la posición del que cubre una cosecha o del especulador bajista. Lo que gana el long lo pierde el short, peso a peso.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c1&quot;&gt;U1&lt;/span&gt;Forwards vs. futuros · organizado vs. OTC&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;table&gt;&lt;tr&gt;&lt;th&gt;&lt;/th&gt;&lt;th&gt;Forwards&lt;/th&gt;&lt;th&gt;Futuros&lt;/th&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Mercado&lt;/td&gt;&lt;td&gt;OTC&lt;/td&gt;&lt;td&gt;Exchange&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Contrato&lt;/td&gt;&lt;td&gt;Personalizado&lt;/td&gt;&lt;td&gt;Estandarizado&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Contraparte&lt;/td&gt;&lt;td&gt;Riesgo alto&lt;/td&gt;&lt;td&gt;Clearing house&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Liquidación&lt;/td&gt;&lt;td&gt;Al vencimiento&lt;/td&gt;&lt;td&gt;Diaria (MtM)&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Entrega&lt;/td&gt;&lt;td&gt;Usual&lt;/td&gt;&lt;td&gt;Cash settlement o delivery; suele cerrarse antes&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;
    &lt;p&gt;Organizado: productos limitados, márgenes requeridos, electrónico, horario limitado (*futuros de crypto 24/7). OTC: a medida, sin margen requerido, chat/teléfono/plataformas, 24/7, contratos menos pero más grandes.&lt;/p&gt;
    &lt;p class=&quot;note&quot;&gt;Extra Hull (2.2, 2.6): el exchange define activo, calidades, size, límites de precio y posición. La &lt;b&gt;parte corta&lt;/b&gt; elige cuándo/dónde/qué calidad entregar.&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c1&quot;&gt;U1&lt;/span&gt;Convergencia, contango y backwardation&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;Spot y futuro &lt;b&gt;convergen en maturity&lt;/b&gt; (si no, arbitraje). PPT: &lt;b&gt;contango&lt;/b&gt; = futuro arriba del spot (converge bajando); &lt;b&gt;backwardation&lt;/b&gt; = futuro abajo (converge subiendo).&lt;/p&gt;
    &lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;14&quot; y1=&quot;14&quot; x2=&quot;14&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;14&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;14.0,32.0 22.2,32.6 30.4,33.6 38.6,34.7 46.8,35.9 55.0,37.3 63.2,38.7 71.4,40.1 79.6,41.7 87.8,43.3 96.0,44.9 104.2,46.7 112.4,48.4 120.6,50.2 128.8,52.0 137.0,53.9 145.2,55.9 153.4,57.8 161.6,59.8 169.8,61.8 178.0,63.9 186.2,66.0 194.4,68.1 202.6,70.2 210.8,72.4 219.0,74.6 227.2,76.8 235.4,79.1 243.6,81.4 251.8,83.7 260.0,86.0&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;polyline points=&quot;14.0,86.0 22.2,86.0 30.4,86.0 38.6,86.0 46.8,86.0 55.0,86.0 63.2,86.0 71.4,86.0 79.6,86.0 87.8,86.0 96.0,86.0 104.2,86.0 112.4,86.0 120.6,86.0 128.8,86.0 137.0,86.0 145.2,86.0 153.4,86.0 161.6,86.0 169.8,86.0 178.0,86.0 186.2,86.0 194.4,86.0 202.6,86.0 210.8,86.0 219.0,86.0 227.2,86.0 235.4,86.0 243.6,86.0 251.8,86.0 260.0,86.0&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;text x=&quot;23.8&quot; y=&quot;40.4&quot; fill=&quot;#4fc3f7&quot; font-size=&quot;9.5&quot;&gt;Futuro&lt;/text&gt;&lt;text x=&quot;23.8&quot; y=&quot;94.4&quot; fill=&quot;#4ade80&quot; font-size=&quot;9.5&quot;&gt;Spot&lt;/text&gt;&lt;line x1=&quot;260.0&quot; y1=&quot;14&quot; x2=&quot;260.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;260.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;t = T&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;tiempo&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Contango&lt;/b&gt; (PPT U1) — el futuro cotiza &lt;b&gt;arriba&lt;/b&gt; del spot y converge bajando hacia él en T. Típico de mercados bien abastecidos, bajos costos de almacenamiento y &lt;b&gt;baja convenience yield&lt;/b&gt;. Si no convergieran, habría arbitraje (vendo futuro, compro spot, entrego).&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;14&quot; y1=&quot;14&quot; x2=&quot;14&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;14&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;14.0,116.0 22.2,115.4 30.4,114.4 38.6,113.3 46.8,112.1 55.0,110.7 63.2,109.3 71.4,107.9 79.6,106.3 87.8,104.7 96.0,103.1 104.2,101.3 112.4,99.6 120.6,97.8 128.8,96.0 137.0,94.1 145.2,92.1 153.4,90.2 161.6,88.2 169.8,86.2 178.0,84.1 186.2,82.0 194.4,79.9 202.6,77.8 210.8,75.6 219.0,73.4 227.2,71.2 235.4,68.9 243.6,66.6 251.8,64.3 260.0,62.0&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;polyline points=&quot;14.0,62.0 22.2,62.0 30.4,62.0 38.6,62.0 46.8,62.0 55.0,62.0 63.2,62.0 71.4,62.0 79.6,62.0 87.8,62.0 96.0,62.0 104.2,62.0 112.4,62.0 120.6,62.0 128.8,62.0 137.0,62.0 145.2,62.0 153.4,62.0 161.6,62.0 169.8,62.0 178.0,62.0 186.2,62.0 194.4,62.0 202.6,62.0 210.8,62.0 219.0,62.0 227.2,62.0 235.4,62.0 243.6,62.0 251.8,62.0 260.0,62.0&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;text x=&quot;23.8&quot; y=&quot;118.4&quot; fill=&quot;#4fc3f7&quot; font-size=&quot;9.5&quot;&gt;Futuro&lt;/text&gt;&lt;text x=&quot;23.8&quot; y=&quot;54.8&quot; fill=&quot;#4ade80&quot; font-size=&quot;9.5&quot;&gt;Spot&lt;/text&gt;&lt;line x1=&quot;260.0&quot; y1=&quot;14&quot; x2=&quot;260.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;260.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;t = T&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;tiempo&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Backwardation&lt;/b&gt; — el futuro cotiza &lt;b&gt;debajo&lt;/b&gt; del spot y converge subiendo. Típico de mercados ajustados con &lt;b&gt;alta convenience yield&lt;/b&gt; (escasez: prefiero el físico). Ojo Hull 5.14: la definición formal compara F₀ contra el spot &lt;b&gt;esperado&lt;/b&gt; E(S&lt;sub&gt;T&lt;/sub&gt;).&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
    &lt;div class=&quot;ojo&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ojo — definición formal de Hull (5.14)&lt;/b&gt;Hull define contango/backwardation contra el &lt;b&gt;spot esperado&lt;/b&gt;: contango F₀ &amp;gt; E(S&lt;sub&gt;T&lt;/sub&gt;), (normal) backwardation F₀ &amp;lt; E(S&lt;sub&gt;T&lt;/sub&gt;). La PPT usa la definición de mercado (vs. spot actual): conviene saber ambas.&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c1&quot;&gt;U1&lt;/span&gt;Cuentas de margen y marking to market&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;Garantía contra el riesgo de contraparte: &lt;b&gt;initial margin&lt;/b&gt; al abrir → &lt;b&gt;MtM diario&lt;/b&gt; (el contrato &quot;se cierra y reabre&quot; cada día) → si el saldo perfora el &lt;b&gt;maintenance margin&lt;/b&gt; (~75% del inicial) hay &lt;b&gt;margin call&lt;/b&gt; que repone hasta el &lt;b&gt;inicial&lt;/b&gt; → si no se cumple, liquidación forzada. Se puede integrar en especie (T-bills ~90%, acciones ~50%) y retirar excedentes.&lt;/p&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo cátedra — long 3 futuros de trigo&lt;/b&gt;F₀=100, size 100. Inicial $6.000, mantenimiento $4.500. Rueda 5: F=89 → saldo 2.700 &amp;lt; 4.500 → &lt;b&gt;margin call $3.300&lt;/b&gt; (repone a 6.000). Cierra en rueda 9 con F=101: saldo 9.600 = 6.000 + 3.300 + 300 de P&amp;L ✓.&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo Hull (tabla 2.1) — long 2 futuros de oro&lt;/b&gt;F₀=$600, 100 oz. Inicial $4.000, mantenimiento $3.000. Margin calls de $1.340 (13/6) y $1.260 (19/6); cierra a 592,30 con pérdida acumulada $1.540.&lt;/div&gt;
    &lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 560 210&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;44&quot; y1=&quot;14&quot; x2=&quot;44&quot; y2=&quot;180&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;44&quot; y1=&quot;180&quot; x2=&quot;548&quot; y2=&quot;180&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;44&quot; y1=&quot;85.1&quot; x2=&quot;548&quot; y2=&quot;85.1&quot; stroke=&quot;#4fc3f7&quot; stroke-dasharray=&quot;4 3&quot; opacity=&quot;0.7&quot;/&gt;&lt;text x=&quot;548&quot; y=&quot;81.1&quot; fill=&quot;#4fc3f7&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;inicial 6.000&lt;/text&gt;&lt;line x1=&quot;44&quot; y1=&quot;108.9&quot; x2=&quot;548&quot; y2=&quot;108.9&quot; stroke=&quot;#f87171&quot; stroke-dasharray=&quot;4 3&quot; opacity=&quot;0.7&quot;/&gt;&lt;text x=&quot;548&quot; y=&quot;104.9&quot; fill=&quot;#f87171&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;mantenimiento 4.500&lt;/text&gt;&lt;polyline points=&quot;44.0,85.1 107.0,80.4 170.0,80.4 233.0,104.1 296.0,137.3 359.0,99.4 422.0,61.4 485.0,33.0 548.0,28.2&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;circle cx=&quot;44.0&quot; cy=&quot;85.1&quot; r=&quot;3&quot; fill=&quot;#4ade80&quot;/&gt;&lt;text x=&quot;44.0&quot; y=&quot;192&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R1&lt;/text&gt;&lt;circle cx=&quot;107.0&quot; cy=&quot;80.4&quot; r=&quot;3&quot; fill=&quot;#4ade80&quot;/&gt;&lt;text x=&quot;107.0&quot; y=&quot;192&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R2&lt;/text&gt;&lt;circle cx=&quot;170.0&quot; cy=&quot;80.4&quot; r=&quot;3&quot; fill=&quot;#4ade80&quot;/&gt;&lt;text x=&quot;170.0&quot; y=&quot;192&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R3&lt;/text&gt;&lt;circle cx=&quot;233.0&quot; cy=&quot;104.1&quot; r=&quot;3&quot; fill=&quot;#4ade80&quot;/&gt;&lt;text x=&quot;233.0&quot; y=&quot;192&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R4&lt;/text&gt;&lt;circle cx=&quot;296.0&quot; cy=&quot;137.3&quot; r=&quot;3&quot; fill=&quot;#4ade80&quot;/&gt;&lt;text x=&quot;296.0&quot; y=&quot;192&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R5&lt;/text&gt;&lt;circle cx=&quot;359.0&quot; cy=&quot;99.4&quot; r=&quot;3&quot; fill=&quot;#4ade80&quot;/&gt;&lt;text x=&quot;359.0&quot; y=&quot;192&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R6&lt;/text&gt;&lt;circle cx=&quot;422.0&quot; cy=&quot;61.4&quot; r=&quot;3&quot; fill=&quot;#4ade80&quot;/&gt;&lt;text x=&quot;422.0&quot; y=&quot;192&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R7&lt;/text&gt;&lt;circle cx=&quot;485.0&quot; cy=&quot;33.0&quot; r=&quot;3&quot; fill=&quot;#4ade80&quot;/&gt;&lt;text x=&quot;485.0&quot; y=&quot;192&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R8&lt;/text&gt;&lt;circle cx=&quot;548.0&quot; cy=&quot;28.2&quot; r=&quot;3&quot; fill=&quot;#4ade80&quot;/&gt;&lt;text x=&quot;548.0&quot; y=&quot;192&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R9&lt;/text&gt;&lt;line x1=&quot;296.0&quot; y1=&quot;137.3&quot; x2=&quot;359.0&quot; y2=&quot;121.4&quot; stroke=&quot;#fbbf24&quot; stroke-width=&quot;1.5&quot; stroke-dasharray=&quot;3 3&quot;/&gt;&lt;text x=&quot;304.0&quot; y=&quot;151.3&quot; fill=&quot;#fbbf24&quot; font-size=&quot;10&quot; font-weight=&quot;700&quot;&gt;margin call +3.300&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Cuenta de margen — long 3 futuros de trigo (PPT U1)&lt;/b&gt;. Inicial $6.000, mantenimiento $4.500. &lt;b&gt;Lectura:&lt;/b&gt; el saldo sigue el MtM diario del futuro (F: 100→101→101→96→89→86→94→100→101). En la rueda 5 el saldo (2.700) perfora el mantenimiento → &lt;b&gt;margin call de $3.300&lt;/b&gt;, que repone hasta el &lt;b&gt;inicial&lt;/b&gt; (no hasta el mantenimiento). En la rueda 4 (4.800 ≥ 4.500) no pasa nada: solo dispara al perforar el piso. Si no se repone: liquidación forzada.&lt;/figcaption&gt;&lt;/figure&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c1&quot;&gt;U1&lt;/span&gt;Volumen, open interest y mercado normal/invertido&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;&lt;b&gt;Volumen&lt;/b&gt;: contratos negociados en el día (se resetea). &lt;b&gt;Open interest&lt;/b&gt;: posiciones abiertas (acumulativo). Volumen alto + O.I. ↑ = entran participantes nuevos; volumen alto + O.I. ↓ = cierre de posiciones, posible reversión.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Mercado normal&lt;/b&gt;: la curva de futuros crece con la maturity. &lt;b&gt;Invertido&lt;/b&gt;: decrece. &lt;b&gt;NO confundir&lt;/b&gt; con contango/backwardation (relación futuro-spot en el tiempo).&lt;/p&gt;
    &lt;div class=&quot;chartgrid small&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 200 120&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;12&quot; y1=&quot;10&quot; x2=&quot;12&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;12&quot; y1=&quot;98&quot; x2=&quot;192&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;12.0,76.0 18.0,74.4 24.0,72.8 30.0,71.2 36.0,69.5 42.0,67.9 48.0,66.3 54.0,64.7 60.0,63.1 66.0,61.5 72.0,59.9 78.0,58.3 84.0,56.6 90.0,55.0 96.0,53.4 102.0,51.8 108.0,50.2 114.0,48.6 120.0,47.0 126.0,45.3 132.0,43.7 138.0,42.1 144.0,40.5 150.0,38.9 156.0,37.3 162.0,35.7 168.0,34.1 174.0,32.4 180.0,30.8 186.0,29.2 192.0,27.6&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2&quot;/&gt;&lt;text x=&quot;100&quot; y=&quot;113&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9.5&quot; text-anchor=&quot;middle&quot;&gt;maturity →&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Mercado normal&lt;/b&gt; — los precios de futuros crecen con la maturity (curva de futuros ascendente).&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 200 120&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;12&quot; y1=&quot;10&quot; x2=&quot;12&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;12&quot; y1=&quot;98&quot; x2=&quot;192&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;12.0,27.6 18.0,29.2 24.0,30.8 30.0,32.4 36.0,34.1 42.0,35.7 48.0,37.3 54.0,38.9 60.0,40.5 66.0,42.1 72.0,43.7 78.0,45.3 84.0,47.0 90.0,48.6 96.0,50.2 102.0,51.8 108.0,53.4 114.0,55.0 120.0,56.6 126.0,58.3 132.0,59.9 138.0,61.5 144.0,63.1 150.0,64.7 156.0,66.3 162.0,67.9 168.0,69.5 174.0,71.2 180.0,72.8 186.0,74.4 192.0,76.0&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2&quot;/&gt;&lt;text x=&quot;100&quot; y=&quot;113&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9.5&quot; text-anchor=&quot;middle&quot;&gt;maturity →&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Mercado invertido&lt;/b&gt; — decrecen con la maturity. &lt;b&gt;Lectura clave (PPT):&lt;/b&gt; esto describe la &lt;b&gt;curva por vencimientos en un instante&lt;/b&gt;; contango/backwardation describen la &lt;b&gt;evolución temporal&lt;/b&gt; futuro vs. spot. No mezclar.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;
&lt;/section&gt;

&lt;!-- ============ U2 ============ --&gt;
&lt;section class=&quot;unit&quot; id=&quot;u2&quot;&gt;
  &lt;div class=&quot;uhead b2&quot;&gt;&lt;h2&gt;Unidad 2 — Cobertura con futuros&lt;/h2&gt;
  &lt;p&gt;Hull cap. 3 (la convenience yield está en el cap. 5 del libro)&lt;/p&gt;&lt;/div&gt;

  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c2&quot;&gt;U2&lt;/span&gt;Cobertura short y long&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;&lt;b&gt;Short hedge&lt;/b&gt; (vendo futuros): poseo el activo y temo la baja (agricultor). &lt;b&gt;Long hedge&lt;/b&gt; (compro futuros): voy a comprar y temo la suba (importador). Definir: dirección, contrato, maturity, cantidad.&lt;/p&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo cátedra&lt;/b&gt;Soja: short futuro a 100 (spot 90) → con S&lt;sub&gt;T&lt;/sub&gt;=120 o 80, el precio final siempre es &lt;b&gt;100&lt;/b&gt;. Dólar: long futuro a 1.000 → costo final 1.000 con S&lt;sub&gt;T&lt;/sub&gt;=1.100 o 900.&lt;/div&gt;
    &lt;p class=&quot;note&quot;&gt;Extra Hull (3.2): por qué muchas empresas no cubren — los accionistas diversifican solos; si los competidores no cubren, cubrir hace fluctuar el margen (joyeros de oro, tabla 3.1); y el riesgo del tesorero (diálogo &quot;presidente vs. tesorero&quot;: el neteo es difícil de explicar). Mineras de oro: el banco que les compra forward se cubre pidiendo oro al banco central (lease rate ~1,5%).&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c2&quot;&gt;U2&lt;/span&gt;Convenience yield y cost of carry&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;La &lt;b&gt;CY (y)&lt;/b&gt; es el beneficio de tener el activo físico (disponibilidad). Sube con escasez; baja con mercado abastecido o almacenamiento caro.&lt;/p&gt;
    &lt;div class=&quot;frm&quot;&gt;F₀ = S₀·e&lt;sup&gt;(r+u−y)T&lt;/sup&gt; &amp;nbsp;·&amp;nbsp; y = r + u − (1/T)·ln(F₀/S₀)&lt;/div&gt;
    &lt;p&gt;y &amp;gt; u → el físico vale más que el futuro (backwardation típica). y &amp;lt; u → el futuro es más atractivo (contango típico).&lt;/p&gt;
    &lt;div class=&quot;ojo&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ojo — la &quot;c&quot; de la PPT (pág. 6)&lt;/b&gt;La PPT define c = &quot;costos de almacenamiento &lt;b&gt;y financiamiento&lt;/b&gt;&quot;, pero el financiamiento ya está en r: según Hull (5.11-5.12) la letra extra es &lt;b&gt;solo almacenamiento&lt;/b&gt; (u). Como está escrita, cuenta el financiamiento dos veces. Cost of carry = r + u − q; activos financieros: y = 0.&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c2&quot;&gt;U2&lt;/span&gt;Riesgo base&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;BASE b = S − F &amp;nbsp;·&amp;nbsp; Resultado del hedge = F₁ + b₂&lt;/div&gt;
    &lt;p&gt;F₁ se conoce al armar la cobertura; toda la incertidumbre es &lt;b&gt;b₂&lt;/b&gt; (riesgo base). Base ↑ = se &lt;b&gt;fortalece&lt;/b&gt; (mejora el short hedge, empeora el long); base ↓ = se &lt;b&gt;debilita&lt;/b&gt; (al revés). Con subyacente distinto: F₁ + (S*₂−F₂) + (S₂−S*₂) — riesgo de timing + riesgo de activo distinto.&lt;/p&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull ej. 3.3 (short, yenes)&lt;/b&gt;Vende futuros sept. a 0,7800; cierra con spot 0,7200 y futuro 0,7250 → b₂ = −0,0050 → tipo de cambio efectivo 0,7800 − 0,0050 = &lt;b&gt;0,7750&lt;/b&gt; ($387.500 por ¥50MM).&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull ej. 3.4 (long, petróleo)&lt;/b&gt;Compra futuros dic. a $68; el 10/11 spot $75 y futuro $72 → b₂ = 3 → costo efectivo 68 + 3 = &lt;b&gt;$71/bbl&lt;/b&gt;.&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Elección del contrato&lt;/b&gt;: subyacente igual o el más correlacionado; mes de entrega &lt;b&gt;cercano pero posterior&lt;/b&gt; al fin de la cobertura (precios erráticos en el mes de entrega + riesgo de delivery para el long).&lt;/p&gt;
    &lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 170&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;14&quot; y1=&quot;14&quot; x2=&quot;14&quot; y2=&quot;144&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;14&quot; y1=&quot;144&quot; x2=&quot;260&quot; y2=&quot;144&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;14.0,50.4 22.2,51.7 30.4,53.0 38.6,54.3 46.8,55.6 55.0,56.9 63.2,58.2 71.4,59.5 79.6,60.8 87.8,62.1 96.0,63.4 104.2,64.7 112.4,66.0 120.6,67.3 128.8,68.6 137.0,69.9 145.2,71.2 153.4,72.5 161.6,73.8 169.8,75.1 178.0,76.4 186.2,77.7 194.4,79.0 202.6,80.3 210.8,81.6 219.0,82.9 227.2,84.2 235.4,85.5 243.6,86.8 251.8,88.1 260.0,89.4&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;text x=&quot;21.4&quot; y=&quot;47.8&quot; fill=&quot;#4ade80&quot; font-size=&quot;9.5&quot;&gt;Spot&lt;/text&gt;&lt;polyline points=&quot;14.0,79.0 22.2,79.5 30.4,80.0 38.6,80.6 46.8,81.1 55.0,81.6 63.2,82.1 71.4,82.6 79.6,83.2 87.8,83.7 96.0,84.2 104.2,84.7 112.4,85.2 120.6,85.8 128.8,86.3 137.0,86.8 145.2,87.3 153.4,87.8 161.6,88.4 169.8,88.9 178.0,89.4 186.2,89.9 194.4,90.4 202.6,91.0 210.8,91.5 219.0,92.0 227.2,92.5 235.4,93.0 243.6,93.6 251.8,94.1 260.0,94.6&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;text x=&quot;21.4&quot; y=&quot;86.8&quot; fill=&quot;#4fc3f7&quot; font-size=&quot;9.5&quot;&gt;Futuro&lt;/text&gt;&lt;line x1=&quot;75.5&quot; y1=&quot;14&quot; x2=&quot;75.5&quot; y2=&quot;144&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;75.5&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;t₁&lt;/text&gt;&lt;line x1=&quot;75.5&quot; y1=&quot;60.1&quot; x2=&quot;75.5&quot; y2=&quot;82.9&quot; stroke=&quot;#fbbf24&quot; stroke-width=&quot;2.5&quot;/&gt;&lt;line x1=&quot;210.8&quot; y1=&quot;14&quot; x2=&quot;210.8&quot; y2=&quot;144&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;210.8&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;t₂&lt;/text&gt;&lt;line x1=&quot;210.8&quot; y1=&quot;81.6&quot; x2=&quot;210.8&quot; y2=&quot;91.5&quot; stroke=&quot;#fbbf24&quot; stroke-width=&quot;2.5&quot;/&gt;&lt;text x=&quot;80.5&quot; y=&quot;71.5&quot; fill=&quot;#fbbf24&quot; font-size=&quot;10&quot; font-weight=&quot;700&quot;&gt;b₁&lt;/text&gt;&lt;text x=&quot;215.8&quot; y=&quot;86.5&quot; fill=&quot;#fbbf24&quot; font-size=&quot;10&quot; font-weight=&quot;700&quot;&gt;b₂&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;tiempo&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;La base y su riesgo (Hull fig. 3.1)&lt;/b&gt; — b = S − F se achica a medida que el futuro converge al spot. &lt;b&gt;Lectura:&lt;/b&gt; el hedge se abre en t₁ (conozco F₁) y se cierra en t₂: el resultado es &lt;b&gt;F₁ + b₂&lt;/b&gt;, así que toda la incertidumbre quedó comprimida en la base final b₂ — eso es el riesgo base. Si b se &lt;b&gt;fortalece&lt;/b&gt; (sube) gana el short hedge; si se &lt;b&gt;debilita&lt;/b&gt;, el long.&lt;/figcaption&gt;&lt;/figure&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c2&quot;&gt;U2&lt;/span&gt;Hedge ratio óptimo y contratos&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;h* = ρ·σ&lt;sub&gt;S&lt;/sub&gt;/σ&lt;sub&gt;F&lt;/sub&gt; &amp;nbsp;·&amp;nbsp; N* = h*·Q&lt;sub&gt;A&lt;/sub&gt;/Q&lt;sub&gt;F&lt;/sub&gt; &amp;nbsp;·&amp;nbsp; Efectividad = R² = ρ²&lt;/div&gt;
    &lt;p&gt;h* es la pendiente de la regresión ΔS vs ΔF y &lt;b&gt;minimiza la varianza&lt;/b&gt; de la posición cubierta. &lt;b&gt;h* = 1 NO implica hedge perfecto&lt;/b&gt; (hace falta ρ = 1): con ρ=0,5 y σ&lt;sub&gt;S&lt;/sub&gt;=2σ&lt;sub&gt;F&lt;/sub&gt;, h*=1 y la cobertura es mala.&lt;/p&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo cátedra — cebada con trigo&lt;/b&gt;σ&lt;sub&gt;F&lt;/sub&gt;=0,022; σ&lt;sub&gt;S&lt;/sub&gt;=0,027; ρ=0,91 → h* = 0,91×(0,027/0,022) = &lt;b&gt;1,117&lt;/b&gt; → N* = 1,117×1.200/25 ≈ &lt;b&gt;54 contratos&lt;/b&gt;.&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull ej. 3.5 — aerolínea con diesel&lt;/b&gt;σ&lt;sub&gt;F&lt;/sub&gt;=0,0313; σ&lt;sub&gt;S&lt;/sub&gt;=0,0263; ρ=0,928 → h*=&lt;b&gt;0,78&lt;/b&gt; → N* = 0,78×2MM/42.000 ≈ &lt;b&gt;37&lt;/b&gt;. Con tailing (V&lt;sub&gt;A&lt;/sub&gt;/V&lt;sub&gt;F&lt;/sub&gt;): 36.&lt;/div&gt;
    &lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;14&quot; y1=&quot;14&quot; x2=&quot;14&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;14&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;14.0,26.0 20.1,34.0 26.3,41.6 32.5,48.9 38.6,55.8 44.8,62.3 50.9,68.4 57.0,74.2 63.2,79.6 69.3,84.6 75.5,89.2 81.7,93.5 87.8,97.4 94.0,100.9 100.1,104.1 106.2,106.9 112.4,109.3 118.5,111.4 124.7,113.0 130.8,114.3 137.0,115.3 143.2,115.8 149.3,116.0 155.4,115.8 161.6,115.3 167.8,114.3 173.9,113.0 180.1,111.4 186.2,109.3 192.3,106.9 198.5,104.1 204.7,100.9 210.8,97.4 216.9,93.5 223.1,89.2 229.2,84.6 235.4,79.6 241.6,74.2 247.7,68.4 253.8,62.3 260.0,55.8&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;line x1=&quot;149.3&quot; y1=&quot;14&quot; x2=&quot;149.3&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;circle cx=&quot;149.3&quot; cy=&quot;116.0&quot; r=&quot;3.5&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;149.3&quot; y=&quot;146&quot; fill=&quot;#fbbf24&quot; font-size=&quot;10&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;h*&lt;/text&gt;&lt;text x=&quot;18&quot; y=&quot;24&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;varianza de la posición&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;h&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Varianza de la posición cubierta vs. hedge ratio (Hull fig. 3.2)&lt;/b&gt;. &lt;b&gt;Lectura:&lt;/b&gt; la varianza es una parábola en h con mínimo en &lt;b&gt;h* = ρ·σ&lt;sub&gt;S&lt;/sub&gt;/σ&lt;sub&gt;F&lt;/sub&gt;&lt;/b&gt; (la pendiente de la regresión ΔS vs ΔF). Cubrir de más (h &amp;gt; h*) vuelve a agregar riesgo — más cobertura no siempre es mejor. La fracción de varianza eliminada en el óptimo es ρ².&lt;/figcaption&gt;&lt;/figure&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c2&quot;&gt;U2&lt;/span&gt;Cobertura con índices (beta) y rolling&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;N* = β·V&lt;sub&gt;A&lt;/sub&gt;/V&lt;sub&gt;F&lt;/sub&gt; &amp;nbsp;·&amp;nbsp; cambiar el beta: N* = (β − β*)·V&lt;sub&gt;A&lt;/sub&gt;/V&lt;sub&gt;F&lt;/sub&gt;&lt;/div&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo cátedra (= Hull) — fondo global con S&amp;P 500&lt;/b&gt;Índice 1.000, futuro 1.010, contrato $250×índice, portfolio $5.050.000, β=1,5 → &lt;b&gt;30 contratos short&lt;/b&gt;. Con índice 900/futuro 902: hedge +$810.000; CAPM: r = 1% + 1,5(−9,75%−1%) = −15,125% → portfolio 4.286.187 → total &lt;b&gt;5.096.187&lt;/b&gt; ≈ rinde r&lt;sub&gt;f&lt;/sub&gt; (1% trim.). La cobertura genera β = 0.&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;¿Por qué cubrir y no vender?&lt;/b&gt; Fees de desarmar, convicción en el alpha (neutralizo mercado, mantengo overweights), horizonte largo con cobertura corta.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Rolling&lt;/b&gt;: si no existe la maturity, encadeno contratos cortos (más líquidos). Hull tabla 3.5: tres rolls de petróleo suman +1,70 contra una caída del spot de 3 — solo se asegura el precio futuro &quot;implícito&quot;. &lt;b&gt;Metallgesellschaft&lt;/b&gt;: rolleó futuros largos contra contratos a 5-10 años; los margin calls de hoy contra cobros lejanos la fundieron ($1.330MM).&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;
&lt;/section&gt;

&lt;!-- ============ U3 ============ --&gt;
&lt;section class=&quot;unit&quot; id=&quot;u3&quot;&gt;
  &lt;div class=&quot;uhead b3&quot;&gt;&lt;h2&gt;Unidad 3 — Tasas de interés y valuación de forwards&lt;/h2&gt;
  &lt;p&gt;Hull caps. 4 y 5 (la PPT cita también el 6, pero no usa su contenido)&lt;/p&gt;&lt;/div&gt;

  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c3&quot;&gt;U3&lt;/span&gt;Tasas: composición, ceros, bootstrap y forwards&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;A(1+R&lt;sub&gt;d&lt;/sub&gt;/m)&lt;sup&gt;mT&lt;/sup&gt; ↔ A·e&lt;sup&gt;r·T&lt;/sup&gt; &amp;nbsp;·&amp;nbsp; r = m·ln(1+R&lt;sub&gt;d&lt;/sub&gt;/m) &amp;nbsp;·&amp;nbsp; R&lt;sub&gt;d&lt;/sub&gt; = m(e&lt;sup&gt;r/m&lt;/sup&gt;−1)&lt;/div&gt;
    &lt;p&gt;$100 al 10%: 110,00 anual · 110,38 trimestral · 110,52 continua (≈ diaria). Convención de la materia: &lt;b&gt;30/360 y tasas anuales continuas&lt;/b&gt;. TNA₃₀ 32% → efectiva 90d: (1+0,32/12)³−1 = &lt;b&gt;8,22%&lt;/b&gt;.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Tasa cero (spot)&lt;/b&gt;: inversión sin flujos intermedios; se usa una por plazo para descontar. Se construyen &lt;b&gt;stripeando&lt;/b&gt; o por &lt;b&gt;bootstrap&lt;/b&gt;.&lt;/p&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Bootstrap (cátedra = Hull tabla 4.3)&lt;/b&gt;Cero 3m: 100 = 97,5e&lt;sup&gt;R·0,25&lt;/sup&gt; → &lt;b&gt;10,127%&lt;/b&gt;; 6m &lt;b&gt;10,469%&lt;/b&gt;; 12m &lt;b&gt;10,536%&lt;/b&gt;; con el bono 1,5a (cupón $4 sem., precio 96) → &lt;b&gt;10,681%&lt;/b&gt;; 2a &lt;b&gt;10,808%&lt;/b&gt;. Extremos: curva flat.&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;R&lt;sub&gt;fwd&lt;/sub&gt; = (R₂T₂ − R₁T₁)/(T₂ − T₁)&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull tabla 4.5&lt;/b&gt;Ceros 3/4/4,6/5/5,3% (1-5a) → forwards 5; 5,8; 6,2; 6,5%. La forward se asegura pidiendo corto e invirtiendo largo. Curva creciente → R&lt;sub&gt;fwd&lt;/sub&gt; &amp;gt; R₂.&lt;/div&gt;
    &lt;p class=&quot;note&quot;&gt;Extra Hull: estrategias de curva (Condado de Orange, −$1.500MM en 1994) y teorías de la curva (expectativas, segmentación, preferencia por liquidez).&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c3&quot;&gt;U3&lt;/span&gt;FRAs&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;&lt;b&gt;F&lt;sub&gt;m×n&lt;/sub&gt;&lt;/b&gt;: fija hoy la tasa del período m→n; vence en m. &lt;b&gt;Long = borrower&lt;/b&gt;: paga fija, recibe variable (cobra si la LIBOR sube). &lt;b&gt;Short = lender&lt;/b&gt;: al revés. Settlement al inicio del período, descontado:&lt;/p&gt;
    &lt;div class=&quot;frm&quot;&gt;Pago (en m) = L·(R&lt;sub&gt;M&lt;/sub&gt;−R&lt;sub&gt;K&lt;/sub&gt;)·(T₂−T₁) / [1 + R&lt;sub&gt;M&lt;/sub&gt;(T₂−T₁)] &amp;nbsp;·&amp;nbsp; V&lt;sub&gt;FRA&lt;/sub&gt; = L·(R&lt;sub&gt;K&lt;/sub&gt;−R&lt;sub&gt;f&lt;/sub&gt;)(T₂−T₁)·e&lt;sup&gt;−R₂T₂&lt;/sup&gt;&lt;/div&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Cátedra = Hull ej. 4.2&lt;/b&gt;FRA 4% por 3 meses dentro de 3 años, L=$100MM; LIBOR resulta 4,5% → lender paga $125.000 en 3,25a = &lt;b&gt;$123.609&lt;/b&gt; en t=3.&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull ej. 4.3 — valuación&lt;/b&gt;FRA que recibe 6% anual entre años 1 y 2; forward 5% continua = 5,127% anual → V = 100MM×0,00873×e&lt;sup&gt;−0,08&lt;/sup&gt; = &lt;b&gt;$805.800&lt;/b&gt;.&lt;/div&gt;
    &lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;81.7&quot; x2=&quot;260&quot; y2=&quot;81.7&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;84.7&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,81.7 34.0,116.6 124.4,81.7 260.0,29.4 260.0,81.7&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,116.6 124.4,81.7 260.0,29.4&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;124.4&quot; y1=&quot;12&quot; x2=&quot;124.4&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;124.4&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;R_K=4%&lt;/text&gt;&lt;circle cx=&quot;124.4&quot; cy=&quot;81.7&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Payoff del long FRA (borrower)&lt;/b&gt; vs. la tasa observada R&lt;sub&gt;M&lt;/sub&gt; — pactado al 4%. &lt;b&gt;Lectura:&lt;/b&gt; paga fija/recibe variable: si la LIBOR sale arriba de R&lt;sub&gt;K&lt;/sub&gt; &lt;b&gt;cobra&lt;/b&gt; la diferencia (sobre el nocional, prorrateada y descontada al inicio del período); si sale abajo, paga. Es el seguro del que va a endeudarse; el short (lender) es el espejo. En R&lt;sub&gt;M&lt;/sub&gt; = R&lt;sub&gt;K&lt;/sub&gt; el FRA vale cero — así se setea la fija en inception.&lt;/figcaption&gt;&lt;/figure&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c3&quot;&gt;U3&lt;/span&gt;Valuación de forwards (C&amp;C / RC&amp;C)&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;Sin ingresos: F₀ = S₀e&lt;sup&gt;rT&lt;/sup&gt; &amp;nbsp;·&amp;nbsp; Con ingresos: F₀ = (S₀−I)e&lt;sup&gt;rT&lt;/sup&gt; &amp;nbsp;·&amp;nbsp; Con yield: F₀ = S₀e&lt;sup&gt;(r−q)T&lt;/sup&gt;&lt;/div&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Cátedra = Hull tabla 5.2 — Cash &amp; Carry&lt;/b&gt;S=40, r=5%, 3m → F* = &lt;b&gt;40,50&lt;/b&gt;. Si F=43: pido 40, compro spot, vendo fwd → +2,50. Si F=39: short-sell, coloco 40, long fwd → +1,50.&lt;/div&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Cátedra = Hull 5.5 — bono con cupón&lt;/b&gt;S=900, cupón 40 en 4m (r₄=3%), T=9m (r₉=4%): I=39,60 → F₀=(900−39,60)e&lt;sup&gt;0,03&lt;/sup&gt; = &lt;b&gt;886,60&lt;/b&gt;. F=910 → C&amp;C gana 23,40; F=870 → RC&amp;C gana 16,60.&lt;/div&gt;
    &lt;p class=&quot;note&quot;&gt;Extra Hull: short selling (se pagan los dividendos del prestado) y Kidder Peabody (registrar F−S como ganancia = confundir costo de financiamiento con utilidad; −$350MM reales).&lt;/p&gt;
    &lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;14&quot; y1=&quot;14&quot; x2=&quot;14&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;14&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;14&quot; y1=&quot;71.2&quot; x2=&quot;260&quot; y2=&quot;71.2&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;18&quot; y=&quot;66.2&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;S₀&lt;/text&gt;&lt;polyline points=&quot;14.0,71.2 22.2,70.3 30.4,69.5 38.6,68.6 46.8,67.7 55.0,66.8 63.2,65.9 71.4,64.9 79.6,63.9 87.8,62.8 96.0,61.8 104.2,60.7 112.4,59.5 120.6,58.4 128.8,57.2 137.0,55.9 145.2,54.6 153.4,53.3 161.6,52.0 169.8,50.6 178.0,49.1 186.2,47.6 194.4,46.1 202.6,44.5 210.8,42.9 219.0,41.2 227.2,39.5 235.4,37.7 243.6,35.8 251.8,34.0 260.0,32.0&quot; fill=&quot;none&quot; stroke=&quot;#a78bfa&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;text x=&quot;173.9&quot; y=&quot;40.4&quot; fill=&quot;#a78bfa&quot; font-size=&quot;10&quot;&gt;F₀ = S₀e^rT&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;T&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Precio forward vs. plazo (activo sin ingresos)&lt;/b&gt;. &lt;b&gt;Lectura:&lt;/b&gt; F₀ = S₀e&lt;sup&gt;rT&lt;/sup&gt; crece exponencialmente con T: el forward refleja el &lt;b&gt;costo de financiar&lt;/b&gt; la compra spot hasta T — no una expectativa de suba. Si el mercado cotiza arriba de la curva → &lt;b&gt;cash &amp; carry&lt;/b&gt; (pido prestado, compro spot, vendo forward); abajo → &lt;b&gt;reverse C&amp;C&lt;/b&gt;. Con ingresos I o yield q la curva baja: (S₀−I)e&lt;sup&gt;rT&lt;/sup&gt; o S₀e&lt;sup&gt;(r−q)T&lt;/sup&gt;; con divisas, e&lt;sup&gt;(r−r_f)T&lt;/sup&gt;.&lt;/figcaption&gt;&lt;/figure&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c3&quot;&gt;U3&lt;/span&gt;F vs. f: el valor del contrato&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;f&lt;sub&gt;long&lt;/sub&gt; = (F₀ − K)·e&lt;sup&gt;−rT&lt;/sup&gt; = S − I − K·e&lt;sup&gt;−rT&lt;/sup&gt; &amp;nbsp;(f = 0 en inception, K = F₀)&lt;/div&gt;
    &lt;p&gt;F es el precio que se congela al entrar; f es el valor de la posición a medida que F se mueve y K queda fijo. Se descuenta porque el P&amp;L se cobra en T.&lt;/p&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull ej. 5.4&lt;/b&gt;Long fwd con K=24; hoy S=25, r=10%, restan 6m → F₀=26,28 → f = 25 − 24e&lt;sup&gt;−0,05&lt;/sup&gt; = &lt;b&gt;$2,17&lt;/b&gt;.&lt;/div&gt;
    &lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;81.7&quot; x2=&quot;260&quot; y2=&quot;81.7&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;84.7&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,81.7 34.0,117.9 125.0,81.7 260.0,28.1 260.0,81.7&quot; fill=&quot;#4fc3f7&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,117.9 125.0,81.7 260.0,28.1&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;125.0&quot; y1=&quot;12&quot; x2=&quot;125.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;125.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;Ke⁻ʳᵀ&lt;/text&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;circle cx=&quot;125.0&quot; cy=&quot;81.7&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Valor del contrato forward (long) vs. S&lt;/b&gt; — ejemplo Hull 5.4 (K=24, r=10%, T=0,5). &lt;b&gt;Lectura:&lt;/b&gt; f = S − Ke&lt;sup&gt;−rT&lt;/sup&gt;: una recta de pendiente 1 que cruza cero en &lt;b&gt;Ke&lt;sup&gt;−rT&lt;/sup&gt; = 22,83&lt;/b&gt; (no en K). En inception K se fija = F₀ y f = 0; después la posición gana $1 por cada $1 de suba del spot. Con S = 25, f = &lt;b&gt;2,17&lt;/b&gt;. No confundir F (precio) con f (valor de la posición).&lt;/figcaption&gt;&lt;/figure&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c3&quot;&gt;U3&lt;/span&gt;Divisas (paridad de tasas) y commodities&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;F₀ = S₀·e&lt;sup&gt;(r−r_f)T&lt;/sup&gt; (paridad de tasas) &amp;nbsp;·&amp;nbsp; Commodities: F₀ = (S₀+U)e&lt;sup&gt;rT&lt;/sup&gt; = S₀e&lt;sup&gt;(r+u)T&lt;/sup&gt;; consumo: F₀ ≤ … y F₀ = S₀e&lt;sup&gt;(r+u−y)T&lt;/sup&gt;&lt;/div&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Cátedra — arbitraje AUDUSD&lt;/b&gt;Spot 0,98; r&lt;sub&gt;USA&lt;/sub&gt;=1%, r&lt;sub&gt;AUS&lt;/sub&gt;=3%, T=2 → F* = &lt;b&gt;0,9416&lt;/b&gt;. F=0,96 (caro): short fwd + long spot AUD → +USD 19,97. F=0,93 (barato): long fwd + short spot → +USD 12,29. Intuición: si una tasa &quot;debería ser menor&quot;, coloco en esa moneda; si &quot;debería ser mayor&quot;, me endeudo en ella.&lt;/div&gt;
    &lt;p&gt;Imperfecciones (fees, tasas activas/pasivas, aforos) → &lt;b&gt;banda de no arbitraje&lt;/b&gt;. En commodities &lt;b&gt;de consumo&lt;/b&gt; nadie quiere shortear el físico: solo vale la cota superior, y la convenience yield cierra la ecuación. Forwards ≈ futuros con r constante (difieren con correlación S-tasas; Panorámica 5.2: el forward cobra el VP, el futuro cobra hoy).&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;
&lt;/section&gt;

&lt;!-- ============ U4 ============ --&gt;
&lt;section class=&quot;unit&quot; id=&quot;u4&quot;&gt;
  &lt;div class=&quot;uhead b4&quot;&gt;&lt;h2&gt;Unidad 4 — Swaps de tasas y de monedas&lt;/h2&gt;
  &lt;p&gt;Hull cap. 7&lt;/p&gt;&lt;/div&gt;

  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c4&quot;&gt;U4&lt;/span&gt;Mecánica y usos del swap de tasas&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;A paga variable (floating-rate payer), B paga fija (fixed-rate payer) sobre un &lt;b&gt;nocional que nunca se intercambia&lt;/b&gt;. La variable se &lt;b&gt;fija al inicio y se paga al final&lt;/b&gt; de cada período (el 1.er pago es cierto). Se liquida por compensación; la fija se calibra para que el swap valga 0 en inception.&lt;/p&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo cátedra&lt;/b&gt;Swap 4 años: B paga 5% TNA₁₈₀ semestral sobre $100MM, A paga LIBOR 6m. 1.er neto (LIBOR 4,5%): B paga &lt;b&gt;$0,25MM&lt;/b&gt;; 2.º (4,7%): &lt;b&gt;$0,15MM&lt;/b&gt;.&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Transformaciones&lt;/b&gt;: deuda fija 5,2% → LIBOR+0,20% (A); deuda LIBOR+0,10% → fija 5,10% (B); colocación LIBOR−0,20% → fija 4,80%; colocación fija 4,7% → LIBOR−0,30%. El &lt;b&gt;intermediario&lt;/b&gt; cobra fee (3 pb) y asume el riesgo de contraparte.&lt;/p&gt;
    &lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 560 190&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;rect x=&quot;25&quot; y=&quot;58&quot; width=&quot;110&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;80&quot; y=&quot;76&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;Cía. A&lt;/text&gt;&lt;text x=&quot;80&quot; y=&quot;93&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;paga 4% fija&lt;/text&gt;&lt;rect x=&quot;230&quot; y=&quot;58&quot; width=&quot;100&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;280&quot; y=&quot;76&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;Interm.&lt;/text&gt;&lt;text x=&quot;280&quot; y=&quot;93&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;fee 4 pb&lt;/text&gt;&lt;rect x=&quot;425&quot; y=&quot;58&quot; width=&quot;110&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;480&quot; y=&quot;76&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;Cía. B&lt;/text&gt;&lt;text x=&quot;480&quot; y=&quot;93&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;paga L+0,60%&lt;/text&gt;&lt;defs&gt;&lt;marker id=&quot;a&quot; markerWidth=&quot;8&quot; markerHeight=&quot;8&quot; refX=&quot;7&quot; refY=&quot;3&quot; orient=&quot;auto&quot;&gt;&lt;path d=&quot;M0,0 L7,3 L0,6 z&quot; fill=&quot;#4ade80&quot;/&gt;&lt;/marker&gt;&lt;/defs&gt;&lt;line x1=&quot;138&quot; y1=&quot;60&quot; x2=&quot;227&quot; y2=&quot;60&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;1.6&quot;/&gt;&lt;text x=&quot;183&quot; y=&quot;50&quot; fill=&quot;#4ade80&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;← 4,33% fija&lt;/text&gt;&lt;line x1=&quot;138&quot; y1=&quot;100&quot; x2=&quot;227&quot; y2=&quot;100&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;1.6&quot;/&gt;&lt;text x=&quot;183&quot; y=&quot;118&quot; fill=&quot;#f87171&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;LIBOR →&lt;/text&gt;&lt;line x1=&quot;333&quot; y1=&quot;60&quot; x2=&quot;422&quot; y2=&quot;60&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;1.6&quot;/&gt;&lt;text x=&quot;378&quot; y=&quot;50&quot; fill=&quot;#4ade80&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;← 4,37% fija&lt;/text&gt;&lt;line x1=&quot;333&quot; y1=&quot;100&quot; x2=&quot;422&quot; y2=&quot;100&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;1.6&quot;/&gt;&lt;text x=&quot;378&quot; y=&quot;118&quot; fill=&quot;#f87171&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;LIBOR →&lt;/text&gt;&lt;text x=&quot;80&quot; y=&quot;150&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;neto: LIBOR − 0,33%&lt;/text&gt;&lt;text x=&quot;480&quot; y=&quot;150&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;neto: 4,97% fija&lt;/text&gt;&lt;text x=&quot;280&quot; y=&quot;150&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;gana 4 pb&lt;/text&gt;&lt;text x=&quot;280&quot; y=&quot;172&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9.5&quot; text-anchor=&quot;middle&quot; font-style=&quot;italic&quot;&gt;A quería variable (ventaja en fija) · B quería fija (ventaja relativa en variable) · ganancia total a−b = 50 pb&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Swap con intermediario (ejemplo cátedra: A 4%/L−0,10 · B 5,2%/L+0,60)&lt;/b&gt;. &lt;b&gt;Lectura:&lt;/b&gt; cada empresa se endeuda afuera donde tiene &lt;b&gt;ventaja relativa&lt;/b&gt; (A en fija, B en variable) y el swap convierte la naturaleza de la deuda: A termina pagando LIBOR−0,33% (vs. L−0,10 directo) y B 4,97% (vs. 5,2%). Los 50 pb de ganancia (a−b = 1,2%−0,7%) se reparten: 23 + 23 + 4 de fee. El intermediario asume el riesgo de contraparte: las puntas no se conocen.&lt;/figcaption&gt;&lt;/figure&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c4&quot;&gt;U4&lt;/span&gt;Ventaja comparativa&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;Ganancia total = a − b (spread fijo − spread variable)&lt;/div&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo cátedra&lt;/b&gt;A: 4,0% / L−0,10; B: 5,2% / L+0,60 → a=1,2, b=0,7 → &lt;b&gt;50 pb&lt;/b&gt;. Fee 4 pb → 23 pb c/u: A termina en &lt;b&gt;L−0,33%&lt;/b&gt; y B en &lt;b&gt;4,97%&lt;/b&gt;.&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull tabla 7.4&lt;/b&gt;AAACorp 4,0%/L+0,3; BBBCorp 5,2%/L+1,0 → misma ganancia 0,5%. Directo (swap 3,95%): L+0,05% y 4,95%. Con intermediario: L+0,07% y 4,97%.&lt;/div&gt;
    &lt;p class=&quot;note&quot;&gt;Extra Hull — crítica (7.4): los spreads no son comparables (fijo a 5 años vs. variable revisable cada 6 meses); el spread fijo mayor refleja que el default de BBB crece más rápido. El &quot;4,97% fijo&quot; supone renovar siempre a L+1%. Y la &lt;b&gt;tasa swap&lt;/b&gt; (7.5) ≈ riesgo de prestar consecutivamente a 6m a bancos AA → menor que la tasa AA a 5 años.&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c4&quot;&gt;U4&lt;/span&gt;Valuación: bonos y FRAs&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;V = B&lt;sub&gt;fix&lt;/sub&gt; − B&lt;sub&gt;fl&lt;/sub&gt; (recibe fija) &amp;nbsp;·&amp;nbsp; B&lt;sub&gt;fl&lt;/sub&gt; = (L + k*)·e&lt;sup&gt;−r*t*&lt;/sup&gt; (par tras cada pago)&lt;/div&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo cátedra (verificado)&lt;/b&gt;Recibe LIBOR, paga 3% TNA₁₈₀ sobre $100MM; restan 15m; ceros 2,8/3,2/3,4%; última LIBOR 2,9%. B&lt;sub&gt;fix&lt;/sub&gt;=100,2306; B&lt;sub&gt;fl&lt;/sub&gt;=101,45·e&lt;sup&gt;−0,007&lt;/sup&gt;=100,7423 → &lt;b&gt;V = +0,5117MM&lt;/b&gt; (fixed-rate payer).&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull ej. 7.4&lt;/b&gt;Recibe 8% sem., paga LIBOR; ceros 10/10,5/11%; última LIBOR 10,2% → B&lt;sub&gt;fix&lt;/sub&gt;=98,238, B&lt;sub&gt;fl&lt;/sub&gt;=102,505 → V = &lt;b&gt;−4,267MM&lt;/b&gt;.&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Por FRAs&lt;/b&gt;: cada intercambio (salvo el 1.º) es un FRA; se calculan las forwards, los flujos como si se realizaran, y se descuenta. Cátedra: −0,0497 + 0,2094 + 0,3519 = &lt;b&gt;+0,5117&lt;/b&gt; ✓ idéntico. Al inicio el swap vale 0 pero cada FRA no: con curva creciente, quien paga fija tiene FRAs cortos negativos y largos positivos (Hull fig. 7.8).&lt;/p&gt;
    &lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 420 180&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;40&quot; y1=&quot;87.8&quot; x2=&quot;408&quot; y2=&quot;87.8&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;36&quot; y=&quot;90.8&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;rect x=&quot;53.8&quot; y=&quot;87.8&quot; width=&quot;33.7&quot; height=&quot;46.6&quot; rx=&quot;3&quot; fill=&quot;#f87171&quot; opacity=&quot;0.75&quot;/&gt;&lt;text x=&quot;70.7&quot; y=&quot;162&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;FRA 1&lt;/text&gt;&lt;rect x=&quot;115.1&quot; y=&quot;87.8&quot; width=&quot;33.7&quot; height=&quot;27.2&quot; rx=&quot;3&quot; fill=&quot;#f87171&quot; opacity=&quot;0.75&quot;/&gt;&lt;text x=&quot;132.0&quot; y=&quot;162&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;FRA 2&lt;/text&gt;&lt;rect x=&quot;176.5&quot; y=&quot;87.8&quot; width=&quot;33.7&quot; height=&quot;7.8&quot; rx=&quot;3&quot; fill=&quot;#f87171&quot; opacity=&quot;0.75&quot;/&gt;&lt;text x=&quot;193.3&quot; y=&quot;162&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;FRA 3&lt;/text&gt;&lt;rect x=&quot;237.8&quot; y=&quot;74.2&quot; width=&quot;33.7&quot; height=&quot;13.6&quot; rx=&quot;3&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.75&quot;/&gt;&lt;text x=&quot;254.7&quot; y=&quot;162&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;FRA 4&lt;/text&gt;&lt;rect x=&quot;299.1&quot; y=&quot;52.9&quot; width=&quot;33.7&quot; height=&quot;35.0&quot; rx=&quot;3&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.75&quot;/&gt;&lt;text x=&quot;316.0&quot; y=&quot;162&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;FRA 5&lt;/text&gt;&lt;rect x=&quot;360.5&quot; y=&quot;29.5&quot; width=&quot;33.7&quot; height=&quot;58.3&quot; rx=&quot;3&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.75&quot;/&gt;&lt;text x=&quot;377.3&quot; y=&quot;162&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;FRA 6&lt;/text&gt;&lt;text x=&quot;408&quot; y=&quot;162&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;vencimiento →&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Valor de los FRAs que componen un swap (Hull fig. 7.8)&lt;/b&gt; — caso: curva de tasas &lt;b&gt;creciente&lt;/b&gt;, posición que &lt;b&gt;paga fija&lt;/b&gt; / recibe variable. &lt;b&gt;Lectura:&lt;/b&gt; el swap nace con valor total cero, pero no cada intercambio: las forwards cortas están &lt;b&gt;debajo&lt;/b&gt; de la tasa fija (FRAs cercanos negativos) y las largas &lt;b&gt;encima&lt;/b&gt; (FRAs lejanos positivos). Con curva decreciente, o desde la otra punta, el patrón se invierte. Por eso el paso del tiempo redistribuye el valor del swap aunque las tasas no se muevan.&lt;/figcaption&gt;&lt;/figure&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c4&quot;&gt;U4&lt;/span&gt;Swaps de monedas&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;&lt;b&gt;Fixed-for-fixed&lt;/b&gt; en dos monedas; el &lt;b&gt;nocional SÍ se intercambia&lt;/b&gt; (inicio en sentido opuesto, final con los intereses).&lt;/p&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Flujos (cátedra)&lt;/b&gt;A paga 5% GBP / recibe 6% USD; nocionales USD 15MM y GBP 10MM: 2025: −15 USD/+10 GBP; 2026-29: +0,90/−0,50; 2030: +15,90/−10,50.&lt;/div&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ventaja comparativa USD/AUD (= Hull)&lt;/b&gt;A: 5% USD/7,6% AUD; B: 7%/8% → spreads 200 y 40 pb → ganancia 160; fee 20 → 70 pb c/u: A paga &lt;b&gt;AUD 6,9%&lt;/b&gt;, B paga &lt;b&gt;USD 6,3%&lt;/b&gt;. El descalce de monedas del intermediario se cubre con forwards.&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;V = S₀·B&lt;sub&gt;foránea&lt;/sub&gt; − B&lt;sub&gt;doméstica&lt;/sub&gt; (recibe foránea) &amp;nbsp;·&amp;nbsp; o netear cada flujo al TC forward y descontar&lt;/div&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Valuación JPY/USD (= Hull)&lt;/b&gt;Recibe 5% JPY, paga 8% USD; JPY 1.200MM/USD 10MM; 3 años; curvas flat 4% y 9%; USDJPY 110. B&lt;sub&gt;USD&lt;/sub&gt;=9,6439; B&lt;sub&gt;JPY&lt;/sub&gt;=1.230,55 → V = 1.230,55/110 − 9,6439 = &lt;b&gt;+1,5430MM&lt;/b&gt;. Por forwards (0,009557/0,010047/0,010562): −0,2071 −0,1647 +1,9148 = &lt;b&gt;+1,5430&lt;/b&gt; ✓.&lt;/div&gt;
    &lt;p&gt;Variantes: fixed-for-floating entre monedas = swap de moneda + swap de tasas; floating-for-floating = + dos swaps de tasas. Extra Hull (7.10): el riesgo de crédito existe solo si el swap vale positivo; en currency swaps es mayor por el intercambio final de nocionales.&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;
&lt;/section&gt;

&lt;!-- ============ FORMULAS ============ --&gt;
&lt;section class=&quot;unit&quot; id=&quot;for&quot;&gt;
  &lt;div class=&quot;uhead&quot; style=&quot;border-left:4px solid #f472b6;&quot;&gt;&lt;h2&gt;Σ Todas las fórmulas&lt;/h2&gt;&lt;p&gt;Repaso rápido&lt;/p&gt;&lt;/div&gt;
  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c1&quot;&gt;U1&lt;/span&gt;Futuros&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;Payoff: long S&lt;sub&gt;T&lt;/sub&gt;−K · short K−S&lt;sub&gt;T&lt;/sub&gt; · valor inicial 0 · F→S en T&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Margin call si saldo &amp;lt; mantenimiento → reponer al inicial&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;
  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c2&quot;&gt;U2&lt;/span&gt;Cobertura&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;b = S − F · resultado = F₁ + b₂&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;h* = ρ·σ&lt;sub&gt;S&lt;/sub&gt;/σ&lt;sub&gt;F&lt;/sub&gt; · N* = h*·Q&lt;sub&gt;A&lt;/sub&gt;/Q&lt;sub&gt;F&lt;/sub&gt; (tailing: V&lt;sub&gt;A&lt;/sub&gt;/V&lt;sub&gt;F&lt;/sub&gt;) · R² = ρ²&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Índices: N* = β·V&lt;sub&gt;A&lt;/sub&gt;/V&lt;sub&gt;F&lt;/sub&gt; · cambiar beta: (β−β*)·V&lt;sub&gt;A&lt;/sub&gt;/V&lt;sub&gt;F&lt;/sub&gt;&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;F₀ = S₀e&lt;sup&gt;(r+u−y)T&lt;/sup&gt; · y = r + u − (1/T)ln(F₀/S₀)&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;
  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c3&quot;&gt;U3&lt;/span&gt;Tasas y forwards&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;r = m·ln(1+R/m) · R = m(e&lt;sup&gt;r/m&lt;/sup&gt;−1) · 30/360, continuas&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;R&lt;sub&gt;fwd&lt;/sub&gt; = (R₂T₂−R₁T₁)/(T₂−T₁) · FRA: pago = L(R&lt;sub&gt;M&lt;/sub&gt;−R&lt;sub&gt;K&lt;/sub&gt;)Δt/(1+R&lt;sub&gt;M&lt;/sub&gt;Δt); V = L(R&lt;sub&gt;K&lt;/sub&gt;−R&lt;sub&gt;f&lt;/sub&gt;)Δt·e&lt;sup&gt;−R₂T₂&lt;/sup&gt;&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;F₀ = S₀e&lt;sup&gt;rT&lt;/sup&gt; · (S₀−I)e&lt;sup&gt;rT&lt;/sup&gt; · S₀e&lt;sup&gt;(r−q)T&lt;/sup&gt; · divisas: S₀e&lt;sup&gt;(r−r_f)T&lt;/sup&gt; · commodities: (S₀+U)e&lt;sup&gt;rT&lt;/sup&gt;&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;f = (F₀−K)e&lt;sup&gt;−rT&lt;/sup&gt; = S − I − Ke&lt;sup&gt;−rT&lt;/sup&gt;&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;
  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c4&quot;&gt;U4&lt;/span&gt;Swaps&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;

    &lt;p&gt;La opción otorga un &lt;b&gt;derecho&lt;/b&gt;, no una obligación (a diferencia de forwards/futuros). Por eso se paga una &lt;b&gt;prima&lt;/b&gt;. &lt;b&gt;Call&lt;/b&gt;: derecho a comprar a K. &lt;b&gt;Put&lt;/b&gt;: derecho a vender a K. &lt;b&gt;Americanas&lt;/b&gt;: ejercibles en cualquier momento; &lt;b&gt;europeas&lt;/b&gt;: solo en maturity.&lt;/p&gt;
    &lt;div class=&quot;frm&quot;&gt;Prima = Valor Intrínseco + Valor Tiempo&amp;nbsp;&amp;nbsp;|&amp;nbsp;&amp;nbsp;VI&lt;sub&gt;call&lt;/sub&gt; = máx(S−K; 0) · VI&lt;sub&gt;put&lt;/sub&gt; = máx(K−S; 0)&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;ITM&lt;/b&gt;: call S&amp;gt;K, put S&amp;lt;K · &lt;b&gt;ATM&lt;/b&gt;: S=K · &lt;b&gt;OTM&lt;/b&gt;: call S&amp;lt;K, put S&amp;gt;K. Las ATM tienen el mayor valor tiempo; las OTM valen solo valor tiempo.&lt;/p&gt;

xt&gt;&lt;circle cx=&quot;165.8&quot; cy=&quot;102.9&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Long call&lt;/b&gt; — K=100, prima $5 (PPT U5). &lt;b&gt;Lectura:&lt;/b&gt; tres zonas. S&lt;sub&gt;T&lt;/sub&gt;&amp;lt;100: no ejerzo, pierdo la prima completa (−5, piso de la pérdida). 100–105: ejerzo igual — el payoff bruto es positivo pero no cubre la prima (pérdida parcial). S&lt;sub&gt;T&lt;/sub&gt;&amp;gt;105 (BE = K+π): ganancia neta que crece $1 por cada $1 de suba, sin techo. Apuesta alcista con riesgo acotado.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;43.1&quot; x2=&quot;260&quot; y2=&quot;43.1&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;46.1&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,43.1 34.0,28.1 147.0,28.1 260.0,117.9 260.0,43.1&quot; fill=&quot;#f87171&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,28.1 147.0,28.1 260.0,117.9&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x &quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;99.9&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,96.9 34.0,28.1 147.0,117.9 260.0,117.9 260.0,96.9&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,28.1 147.0,117.9 260.0,117.9&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K=70&lt;/text&gt;&lt;line x1=&quot;120.6&quot; y1=&quot;12&quot; x2=&quot;120.6&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;120.6&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;BE=63&lt;/text&gt;&lt;circle cx=&quot;120.6&quot; cy=&quot;96.9&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Long put&lt;/b&gt; — K=70, prima $7 (PPT U5). &lt;b&gt;Lectura:&lt;/b&gt; S&lt;sub&gt;T&lt;/sub&gt;&amp;gt;70: no ejerzo, pierdo la prima (−7). 63–70: ejerzo con payoff bruto positivo pero insuficiente (pérdida parcial). S&lt;sub&gt;T&lt;/sub&gt;&amp;lt;63 (BE = K−π): ganancia neta creciente, con máximo K−π = $63 si la acción cae a cero. Apuesta bajista con riesgo acotado.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;49.1&quot; x2=&quot;260&quot; y2=&quot;49.1&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;52.1&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,49.1 34.0,117.9 147.0,28.1 260.0,28.1 260.0,49.1&quot; fill=&quot;#f87171&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,117.9 147.0,28.1 260.0,28.1&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K=70&lt;/text&gt;&lt;line x1=&quot;120.6&quot; y1=&quot;12&quot; x2=&quot;120.6&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;120.6&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;BE=63&lt;/text&gt;&lt;circle cx=&quot;120.6&quot; cy=&quot;49.1&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Short put&lt;/b&gt; — espejo del long put. &lt;b&gt;Lectura:&lt;/b&gt; si S&lt;sub&gt;T&lt;/sub&gt;≥70 me quedo la prima (+7). Debajo del BE (63) pierdo cada vez más, hasta K−π = $63 si S→0. Pérdida grande pero acotada (la acción no baja de cero) — equivale al perfil de un covered call.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo Hull 8.1 (el gráfico de la PPT)&lt;/b&gt;Call europeo, lote de 100, K=$100, prima $5, S₀=$98. Con S&lt;sub&gt;T&lt;/sub&gt;=$115: gana $1.500 brutos, $1.000 netos. Break-even $105. Clave: con S&lt;sub&gt;T&lt;/sub&gt;=$102 conviene ejercer igual (pierdo $300 en vez de $500). &lt;b&gt;A vencimiento, toda opción ITM se ejerce.&lt;/b&gt;&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo Hull 8.2&lt;/b&gt;Put europeo, K=$70, prima $7, S₀=$65. Con S&lt;sub&gt;T&lt;/sub&gt;=$55: gana $1.500 brutos, $800 netos. Break-even $63.&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c5&quot;&gt;U5&lt;/span&gt;Subyacentes y especificación de contratos&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;&lt;b&gt;Acciones&lt;/b&gt;: exchange, lote = 100 acciones.&lt;/li&gt;
      &lt;li&gt;&lt;b&gt;Monedas&lt;/b&gt;: mayormente OTC (en bolsa el lote depende de la divisa).&lt;/li&gt;
      &lt;li&gt;&lt;b&gt;Índices&lt;/b&gt;: generalmente europeas; payoff = N × índice (típico 100); &lt;b&gt;siempre cash settlement&lt;/b&gt;.&lt;/li&gt;
      &lt;li&gt;&lt;b&gt;Futuros&lt;/b&gt;: americanas; la opción vence antes que el futuro; el call ejercido entrega long futuro + (F − K).&lt;/li&gt;
    &lt;/ul&gt;
    &lt;p&gt;&lt;b&gt;El exchange define&lt;/b&gt;: maturity, strikes (saltos fijos), tratamiento de dividendos, límites de posición.&lt;/p&gt;
    &lt;ul&gt;
      &lt;li&gt;&lt;b&gt;Dividendos en efectivo&lt;/b&gt;: en exchange NO se ajusta el strike (salvo dividendos enormes, caso Gucci 2003 &amp;gt;10%).&lt;/li&gt;
      &lt;li&gt;&lt;b&gt;Dividendos en acciones y splits&lt;/b&gt;: SÍ se ajustan. Split n por m → K pasa a m/n; lote a n/m. Hull 8.3: call 100 acc. K=$30, split 2:1 → 200 acc. K=$15.&lt;/li&gt;
    &lt;/ul&gt;
    &lt;p class=&quot;note&quot;&gt;Extra Hull: el lanzador descubierto integra margen = máx(prima + 20%S − monto OTM; prima + 10%S). La OCC garantiza el cumplimiento como cámara compensadora.&lt;/p&gt;
    &lt;p class=&quot;note&quot;&gt;Argentina (PPT Intro): BYMA codifica GFGC195.JU; en A3 las opciones sobre futuros son americanas (dólar: estilo equity; agro: estilo Matba-Rofex con MtM diario del VI).&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c5&quot;&gt;U5&lt;/span&gt;Las 6 variables que afectan el precio&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
