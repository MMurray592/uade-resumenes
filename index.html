&lt;div class=&quot;wrap&quot;&gt;
  &lt;div class=&quot;top&quot;&gt;
    &lt;h1&gt;Resumen teórico — Finanzas Corporativas II&lt;/h1&gt;
    &lt;div class=&quot;sub&quot;&gt;2.º Parcial · Unidades 2, 3 y 4 + Project Finance · Prof. E. Marino / N. Mesa&lt;/div&gt;
    &lt;div class=&quot;exam&quot;&gt;📌 Parcial &lt;b&gt;teórico&lt;/b&gt; (sin práctica): el foco está en conceptos, definiciones, comparaciones y el &lt;b&gt;&quot;por qué&quot;&lt;/b&gt;, no en resolver números.&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;nav&quot;&gt;
    &lt;button class=&quot;nav-btn active&quot; id=&quot;nb2&quot; onclick=&quot;show(2,this)&quot;&gt;
      &lt;div class=&quot;nb-tag&quot;&gt;Unidad 2&lt;/div&gt;
      &lt;div class=&quot;nb-title&quot;&gt;Evaluación de proyectos en países emergentes&lt;/div&gt;
    &lt;/button&gt;
    &lt;button class=&quot;nav-btn&quot; id=&quot;nb3&quot; onclick=&quot;show(3,this)&quot;&gt;
      &lt;div class=&quot;nb-tag&quot;&gt;Unidad 3&lt;/div&gt;
      &lt;div class=&quot;nb-title&quot;&gt;Tópicos avanzados — Incertidumbre&lt;/div&gt;
    &lt;/button&gt;
    &lt;button class=&quot;nav-btn&quot; id=&quot;nb4&quot; onclick=&quot;show(4,this)&quot;&gt;
      &lt;div class=&quot;nb-tag&quot;&gt;Unidad 4&lt;/div&gt;
      &lt;div class=&quot;nb-title&quot;&gt;Estructura de capital&lt;/div&gt;
    &lt;/button&gt;
    &lt;button class=&quot;nav-btn&quot; id=&quot;nbpf&quot; onclick=&quot;show(&#x27;pf&#x27;,this)&quot;&gt;
      &lt;div class=&quot;nb-tag&quot;&gt;Project Finance&lt;/div&gt;
      &lt;div class=&quot;nb-title&quot;&gt;Financiación estructurada de proyectos&lt;/div&gt;
    &lt;/button&gt;
  &lt;/div&gt;

  &lt;!-- ===================== UNIDAD 2 ===================== --&gt;
  &lt;div class=&quot;unit u2 show&quot; id=&quot;u2&quot;&gt;
    &lt;div class=&quot;uhead&quot;&gt;
      &lt;h2&gt;Unidad 2 · Evaluación de proyectos en países emergentes&lt;/h2&gt;
      &lt;p&gt;Criterios de selección, el rol de la inflación, el proceso de evaluación y el tipo de cambio en monedas inestables.&lt;/p&gt;
    &lt;/div&gt;
    &lt;span class=&quot;expand-all&quot; onclick=&quot;toggleAll(&#x27;u2&#x27;)&quot;&gt;Expandir / colapsar todo&lt;/span&gt;

    &lt;!-- 2.1 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;2.1&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Criterios de selección: NPV, Payback, IRR, MIRR&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Comparativa&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p class=&quot;lead&quot;&gt;Las tres familias de criterios para decidir si un proyecto se acepta. El NPV es el rey; los demás se usan como complemento o por costumbre de la industria.&lt;/p&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;NPV — Valor Actual Neto (Irving Fisher, 1930)&lt;/div&gt;
          Suma de los flujos descontados a la tasa de oportunidad. &lt;span class=&quot;fx&quot;&gt;NPV = C₀ + Σ Cₜ/(1+r)ᵗ&lt;/span&gt; Se acepta si &lt;strong&gt;NPV &amp;gt; 0&lt;/strong&gt;. Es el &lt;strong&gt;mejor criterio&lt;/strong&gt;: incorpora el valor tiempo del dinero, usa &lt;strong&gt;todos&lt;/strong&gt; los flujos y al estar en plata es sumable entre proyectos. &lt;strong&gt;Cuando los criterios se contradicen, manda el NPV.&lt;/strong&gt;
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Payback — Período de repago&lt;/div&gt;
          Tiempo que tarda el proyecto en devolver la inversión inicial. Defectos: &lt;strong&gt;ignora el valor tiempo del dinero&lt;/strong&gt;, da ponderación nula a los períodos posteriores al corte y tiene sesgo hacia proyectos de corto plazo.
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;IRR — Tasa Interna de Retorno&lt;/div&gt;
          Tasa que hace &lt;span class=&quot;fx&quot;&gt;NPV = 0&lt;/span&gt;. Se acepta si &lt;strong&gt;IRR &amp;gt; WACC&lt;/strong&gt;. Conviene usarla &lt;strong&gt;junto al NPV&lt;/strong&gt;, nunca sola. Supuesto oculto: reinversión de los flujos a la propia IRR (sobreestima si la IRR es alta). Otras limitaciones: puede haber IRR múltiples (varios cambios de signo), puede no existir, y entra en conflicto con el NPV en proyectos mutuamente excluyentes (por escala y por timing).
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;MIRR — TIR Modificada&lt;/div&gt;
          Corrige el supuesto de reinversión de la IRR. Maneja &lt;strong&gt;tres tasas con tres roles distintos&lt;/strong&gt;: reinvierte los flujos positivos a la &lt;strong&gt;tasa de reinversión&lt;/strong&gt; (≈ WACC), trae los flujos negativos a VP a la &lt;strong&gt;tasa de financiamiento&lt;/strong&gt; (costo de deuda), y la MIRR resultante se compara contra el &lt;strong&gt;WACC&lt;/strong&gt; (hurdle rate) para decidir.
        &lt;/div&gt;
        &lt;div class=&quot;note&quot;&gt;&lt;b&gt;Por qué la IRR se usa tanto en la realidad&lt;/b&gt; (pese a ser inferior al NPV): es intuitiva y se comunica en un % único; no exige fijar la tasa de descuento de antemano; es el estándar de la industria (PE, VC y real estate reportan en IRR). Regla profesional: &lt;b&gt;decidir con NPV, comunicar con IRR.&lt;/b&gt;&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 2.2 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;2.2&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Principios clave del NPV&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Concepto base&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;El forecast del cash flow es CLAVE:&lt;/strong&gt; la calidad del NPV depende de la calidad de la proyección de flujos.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Base incremental + lógica:&lt;/strong&gt; se computan solo los flujos que el proyecto agrega respecto de no hacerlo; nada de costos hundidos.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Consistencia con la inflación:&lt;/strong&gt; tratar la inflación igual arriba (flujos) y abajo (tasa) de la fracción. Es el principio que articula toda la unidad.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 2.3 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;2.3&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Inflación: nominal vs. real (corazón de la unidad)&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Mecanismo&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;div class=&quot;key&quot;&gt;&lt;b&gt;Regla de oro:&lt;/b&gt; flujos &lt;b&gt;nominales → tasa nominal&lt;/b&gt;; flujos &lt;b&gt;reales → tasa real&lt;/b&gt;. &lt;b&gt;Nunca mezclar.&lt;/b&gt; Las dos vías dan exactamente el &lt;b&gt;mismo NPV&lt;/b&gt; porque la inflación se cancela en el numerador y el denominador de la fracción.&lt;/div&gt;
        &lt;p&gt;La &lt;strong&gt;tasa real&lt;/strong&gt; se calcula con la fórmula exacta de Fisher, no con la resta:&lt;/p&gt;
        &lt;p&gt;&lt;span class=&quot;fx&quot;&gt;r_real = (1 + r_nom) / (1 + inflación) − 1&lt;/span&gt;&lt;/p&gt;
        &lt;div class=&quot;note&quot;&gt;⚠️ &lt;b&gt;En países emergentes no usar la aproximación por resta&lt;/b&gt; (r_nom − inflación). Con inflación alta el error es grande; siempre la fórmula exacta.&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 2.4 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;2.4&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Proceso de evaluación en 3 pasos + checklist corporativo&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Operatoria&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Paso 1 · Del P&amp;amp;L al Free Cash Flow&lt;/div&gt;
          Sumar de vuelta la &lt;strong&gt;depreciación&lt;/strong&gt; (no es salida de caja), restar &lt;strong&gt;CAPEX&lt;/strong&gt;, ajustar el &lt;strong&gt;capital de trabajo&lt;/strong&gt;, en base &lt;strong&gt;incremental&lt;/strong&gt; y &lt;strong&gt;antes del financiamiento&lt;/strong&gt;.
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Paso 2 · Elegir la tasa de descuento&lt;/div&gt;
          Descontar al &lt;strong&gt;WACC&lt;/strong&gt;: costo promedio ponderado de deuda y equity = rentabilidad mínima exigida por la empresa al proyecto.
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Paso 3 · Calcular NPV y MIRR + criterio de aceptación&lt;/div&gt;
          Aceptar si &lt;strong&gt;NPV &amp;gt; 0&lt;/strong&gt; y &lt;strong&gt;MIRR &amp;gt; WACC&lt;/strong&gt;. Se justifica tanto por el valor presente positivo como por una rentabilidad anual superior a la tasa requerida.
        &lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Investment Proposal Check List&lt;/strong&gt; (de SI / Siemens Corporate Controlling): es un &lt;strong&gt;proceso formal de aprobación de inversiones&lt;/strong&gt;, no un método de cálculo. Documenta supuestos de inflación, análisis de sensibilidad, riesgos, contratos y SLAs. Punto conceptual: la decisión real combina el &lt;strong&gt;criterio cuantitativo&lt;/strong&gt; (NPV/MIRR) con el &lt;strong&gt;análisis cualitativo&lt;/strong&gt; de riesgos.&lt;/p&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 2.5 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;2.5&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Moneda y tipo de cambio: IFE vs. PPP&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Comparativa&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p class=&quot;lead&quot;&gt;Las evaluaciones se hacen mayormente en &lt;strong&gt;moneda fuerte (USD/EUR)&lt;/strong&gt;. Si hay que estimar el tipo de cambio futuro (p. ej. para evaluar en pesos), se usa uno de estos dos métodos.&lt;/p&gt;
        &lt;div class=&quot;vs-grid vs-2&quot;&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Efecto Internacional de Fisher (IFE)&lt;/div&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Purchasing Power Parity (PPP)&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Parte de la diferencia de &lt;strong&gt;tasas de interés&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Parte de la diferencia de &lt;strong&gt;inflaciones&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Tasa nominal alta → inflación alta → la moneda se deprecia. &lt;span class=&quot;fx&quot;&gt;E ≈ i₁ − i₂&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;span class=&quot;fx&quot;&gt;Sₜ = S₀·[(1+inflₐ)/(1+infl_b)]ᵗ&lt;/span&gt; — la moneda de más inflación se deprecia&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;key&quot;&gt;&lt;b&gt;Ambas predicen lo mismo:&lt;/b&gt; la moneda con mayor inflación se devalúa. Difieren solo en la &lt;b&gt;variable de partida&lt;/b&gt; (tasas de interés vs. inflaciones).&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===================== UNIDAD 3 ===================== --&gt;
  &lt;div class=&quot;unit u3&quot; id=&quot;u3&quot;&gt;
    &lt;div class=&quot;uhead&quot;&gt;
      &lt;h2&gt;Unidad 3 · Tópicos avanzados — Evaluación bajo incertidumbre&lt;/h2&gt;
      &lt;p&gt;Herramientas que van más allá del NPV de un único escenario, hasta llegar a las opciones reales y la valuación de la flexibilidad.&lt;/p&gt;
    &lt;/div&gt;
    &lt;span class=&quot;expand-all&quot; onclick=&quot;toggleAll(&#x27;u3&#x27;)&quot;&gt;Expandir / colapsar todo&lt;/span&gt;

    &lt;!-- 3.1 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;3.1&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;El problema: el NPV tradicional y la gestión estática&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Fundamentos&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;El hilo conductor de la unidad: el NPV tradicional asume un &lt;strong&gt;único escenario esperado&lt;/strong&gt; de flujos y una &lt;strong&gt;gestión estática&lt;/strong&gt;, apegada a una sola estrategia operativa. No captura la flexibilidad de &lt;strong&gt;revisar decisiones&lt;/strong&gt; a medida que se resuelve la incertidumbre del mercado. Cada herramienta de la unidad incorpora esa incertidumbre de una forma distinta.&lt;/p&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 3.2 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;3.2&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Análisis de sensibilidad&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Mecanismo&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;Antes de decidir, se identifican las &lt;strong&gt;variables clave&lt;/strong&gt; que determinan el éxito o fracaso. Se hace una estimación &lt;strong&gt;optimista y pesimista&lt;/strong&gt; de cada una y se calcula el NPV &lt;strong&gt;variando una variable a la vez&lt;/strong&gt;. El cuadro de NPVs en distintos escenarios revela las variables más &quot;peligrosas&quot;.&lt;/p&gt;
        &lt;p&gt;&lt;strong&gt;Limitaciones:&lt;/strong&gt;&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;Hay que identificar bien cuáles son las variables clave.&lt;/li&gt;
          &lt;li&gt;Resultado ambiguo: depende de qué se defina como optimista o pesimista.&lt;/li&gt;
          &lt;li&gt;Ignora que las variables pueden estar &lt;strong&gt;correlacionadas&lt;/strong&gt; entre sí.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 3.3 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;3.3&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Simulación de Montecarlo&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Mecanismo&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;Método matemático para proyectos con incertidumbre. A diferencia de la sensibilidad básica, considera &lt;strong&gt;todas las variables a la vez&lt;/strong&gt;. Estima no solo el &lt;strong&gt;valor esperado&lt;/strong&gt; del proyecto sino también su &lt;strong&gt;riesgo&lt;/strong&gt;. Pasos:&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;Modelizar el proyecto definiendo las variables clave.&lt;/li&gt;
          &lt;li&gt;Asignar una &lt;strong&gt;distribución de probabilidad&lt;/strong&gt; a cada variable (en base a una muestra).&lt;/li&gt;
          &lt;li&gt;Simular escenarios (&lt;strong&gt;mínimo 10.000&lt;/strong&gt;) según esas distribuciones.&lt;/li&gt;
          &lt;li&gt;Calcular el NPV medio de las simulaciones y la &lt;strong&gt;probabilidad de que el NPV sea &amp;gt; 0&lt;/strong&gt;.&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;note&quot;&gt;&lt;b&gt;Limitación práctica:&lt;/b&gt; reduce la incertidumbre, pero el &lt;b&gt;costo y la complejidad&lt;/b&gt; de implementarla hacen que se use poco en la práctica.&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 3.4 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;3.4&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Árboles de decisión&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Mecanismo&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;Se usan para proyectos con &lt;strong&gt;decisiones secuenciales&lt;/strong&gt;. Parten de un &lt;strong&gt;nodo raíz&lt;/strong&gt; y se ramifican en opciones; cada opción puede llevar a distintos resultados, cada uno con su probabilidad y valor, hasta los resultados finales.&lt;/p&gt;
        &lt;div class=&quot;vs-grid vs-2&quot;&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Nodo de decisión (cuadrado)&lt;/div&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Nodo de azar (círculo)&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Elegís vos: representás una decisión gerencial&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Lo decide la incertidumbre: se le asignan probabilidades&lt;/div&gt;
        &lt;/div&gt;
        &lt;p&gt;Se resuelve &lt;strong&gt;hacia atrás&lt;/strong&gt; (roll back): se evalúa desde los resultados finales hacia la decisión inicial. Captura el &lt;strong&gt;valor de la flexibilidad&lt;/strong&gt; de decidir con más información en el futuro.&lt;/p&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 3.5 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;3.5&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Opciones reales y el VAN Expandido&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Concepto base&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;Las opciones reales (Myers, 1977) valúan la &lt;strong&gt;flexibilidad administrativa&lt;/strong&gt;: aplican técnicas de opciones financieras a activos reales. Una opción real existe cuando hay una &lt;strong&gt;posibilidad futura de actuar&lt;/strong&gt; al resolverse una incertidumbre actual.&lt;/p&gt;
        &lt;div class=&quot;key&quot;&gt;&lt;b&gt;VAN Expandido = VAN tradicional (sin flexibilidad) + Valor de la(s) opción(es).&lt;/b&gt; Como una opción nunca vale negativo, &lt;b&gt;la flexibilidad siempre suma valor.&lt;/b&gt;&lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Tipos de opciones reales&lt;/strong&gt; (Trigeorgis):&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Esperar / diferir:&lt;/strong&gt; retrasar el momento de la inversión inicial.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Expandir:&lt;/strong&gt; ampliar la escala con una inversión adicional si el escenario es bueno.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Contraer:&lt;/strong&gt; reducir un monto de inversión previsto.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Abandonar:&lt;/strong&gt; frenar permanentemente el programa de inversiones.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Cambio a mejor uso alternativo:&lt;/strong&gt; reconvertir el proyecto, con un valor de salvamento específico.&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;note&quot;&gt;Contraintuitivo: &lt;b&gt;a más volatilidad, más vale la opción&lt;/b&gt; — al revés que en las finanzas tradicionales, donde más riesgo penaliza el valor. En BSM aplicado a proyectos: &lt;b&gt;S&lt;/b&gt; = VP de los flujos, &lt;b&gt;E&lt;/b&gt; = costo de invertir, &lt;b&gt;σ&lt;/b&gt; = volatilidad del proyecto.&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 3.6 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;3.6&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Métodos de valuación: Binomial vs. Black-Scholes&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Comparativa&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;div class=&quot;vs-grid vs-2&quot;&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Método Binomial (Cox-Ross-Rubinstein, 1979)&lt;/div&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Black-Scholes (1973)&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Construye un &lt;strong&gt;árbol&lt;/strong&gt; con las posibilidades de crecimiento del valor del subyacente; calcula el valor de la opción en cada nodo, año por año.&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Una &lt;strong&gt;fórmula cerrada&lt;/strong&gt; en función del precio del subyacente, el precio de ejercicio, la volatilidad, el tiempo a expiración, la tasa libre de riesgo y los dividendos.&lt;/div&gt;
        &lt;/div&gt;
        &lt;p&gt;&lt;span class=&quot;fx&quot;&gt;C = S·N(d₁) − E·e^(−rT)·N(d₂)&lt;/span&gt;&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;S&lt;/strong&gt; = VP de los flujos de fondos (sin la inversión inicial) · &lt;strong&gt;E&lt;/strong&gt; = precio de ejercicio (costo de expandir/abandonar).&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;r&lt;/strong&gt; = tasa libre de riesgo · &lt;strong&gt;T&lt;/strong&gt; = tiempo a la expiración · &lt;strong&gt;σ&lt;/strong&gt; = volatilidad del proyecto.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;N(d)&lt;/strong&gt; = función de distribución normal estándar acumulada.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 3.7 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;3.7&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Caso Magno Charter (árbol + opción de expandir)&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Caso&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;Compañía de vuelos para ejecutivos en el sudeste de EE.UU. La demanda es incierta: 40% de que sea baja el primer año; si es baja, 60% de que siga baja; si arranca alta, 80% de que siga alta.&lt;/p&gt;
        &lt;p&gt;La decisión clave es &lt;strong&gt;qué avión comprar&lt;/strong&gt;:&lt;/p&gt;
        &lt;div class=&quot;vs-grid vs-2&quot;&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Turbopropulsor nuevo — $550.000&lt;/div&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Avión de combustión usado — $250.000&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Más caro y &lt;strong&gt;rígido&lt;/strong&gt;: sin flexibilidad ante la demanda.&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Barato e incorpora la &lt;strong&gt;opción de expandir&lt;/strong&gt;: si la demanda es alta, se compra un 2.º avión un año después por solo $150.000.&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;key&quot;&gt;Es la integración de la unidad: &lt;b&gt;árbol de decisión + opción real de expandir.&lt;/b&gt; El avión barato vale más de lo que parece porque incorpora la &lt;b&gt;flexibilidad&lt;/b&gt; de crecer solo si conviene — flexibilidad que el turbopropulsor rígido no tiene.&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===================== UNIDAD 4 ===================== --&gt;
  &lt;div class=&quot;unit u4&quot; id=&quot;u4&quot;&gt;
    &lt;div class=&quot;uhead&quot;&gt;
      &lt;h2&gt;Unidad 4 · Estructura de capital&lt;/h2&gt;
      &lt;p&gt;Deuda vs. capital, los vehículos de financiación, el tradeoff de la deuda y los tres enfoques para hallar la estructura óptima.&lt;/p&gt;
    &lt;/div&gt;
    &lt;span class=&quot;expand-all&quot; onclick=&quot;toggleAll(&#x27;u4&#x27;)&quot;&gt;Expandir / colapsar todo&lt;/span&gt;

    &lt;!-- 4.1 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.1&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Decisión de financiación: Deuda vs. Capital&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Comparativa&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;div class=&quot;vs-grid vs-2&quot;&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Deuda&lt;/div&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Capital (Equity)&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Derecho &lt;strong&gt;fijo&lt;/strong&gt; (fixed claim)&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Derecho &lt;strong&gt;residual&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Alta prioridad&lt;/strong&gt; sobre los flujos&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Menor prioridad&lt;/strong&gt; sobre los flujos&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Deducible&lt;/strong&gt; de impuestos&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;No deducible&lt;/strong&gt; de impuestos&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Vencimiento &lt;strong&gt;fijo&lt;/strong&gt; (fixed maturity)&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Sin vencimiento&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;No&lt;/strong&gt; da control de gestión&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Sí&lt;/strong&gt; da control de gestión&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 4.2 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.2&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Vehículos de financiación: opciones de capital&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Clasificación&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;&lt;strong&gt;Empresas privadas:&lt;/strong&gt;&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Patrimonio neto de los accionistas.&lt;/strong&gt;&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Venture capital / private equity:&lt;/strong&gt; opción para evitar salir a la bolsa; entran al PN de un negocio pequeño y usualmente riesgoso.&lt;/li&gt;
        &lt;/ul&gt;
        &lt;p&gt;&lt;strong&gt;Empresas con cotización pública:&lt;/strong&gt;&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Acciones.&lt;/strong&gt;&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Warrants:&lt;/strong&gt; opción de comprar equity en el futuro a precio fijo. Pueden tener mejor precio que las acciones, no obligan al momento de la emisión y no generan el efecto &lt;strong&gt;dilución&lt;/strong&gt; de emitir acciones.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Contingent Value Rights (CVR):&lt;/strong&gt; opción de vender acciones a precio fijo. Similar a una &lt;strong&gt;put&lt;/strong&gt;, pero a más largo plazo y con los fondos yendo directo a la firma (no a los vendedores de la put).&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 4.3 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.3&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Vehículos de financiación: opciones de deuda&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Clasificación&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Deuda bancaria / línea de crédito.&lt;/strong&gt;&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Bonos:&lt;/strong&gt; para empresas más grandes y públicas, con términos más favorables. Se caracterizan por:&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Anatomía de un bono&lt;/div&gt;
          &lt;strong&gt;Maturity:&lt;/strong&gt; commercial papers (&amp;lt; 6 meses); usualmente 5–15 años. ·
          &lt;strong&gt;Opcionalidad:&lt;/strong&gt; callable (recomprables por la empresa), puttable (devolubles a la empresa). ·
          &lt;strong&gt;Cupón:&lt;/strong&gt; fixed rate o floating (con caps y floors). ·
          &lt;strong&gt;Garantía:&lt;/strong&gt; unsecured (notes &amp;lt;15 años, debentures &amp;gt;15) o secured (respaldados por un activo). ·
          &lt;strong&gt;Moneda:&lt;/strong&gt; usualmente local, salvo proyectos internacionales (Eurobonds, Eurodollar). ·
          &lt;strong&gt;Repago:&lt;/strong&gt; balloon (todo al maturity) o serial (% por año).
        &lt;/div&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Leases:&lt;/strong&gt; operating (corto plazo, flexibles) y capital/financial (largo plazo, no cancelables).&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 4.4 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.4&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Híbridos: convertibles y acciones preferentes&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Concepto base&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Deuda / bono convertible&lt;/div&gt;
          Bono convertible en acciones &lt;strong&gt;a decisión del tenedor&lt;/strong&gt;. Las firmas agregan la &quot;conversion option&quot; para &lt;strong&gt;reducir la tasa de interés&lt;/strong&gt; del bono.
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Acciones preferentes&lt;/div&gt;
          Como la deuda, requieren un &lt;strong&gt;pago fijo de dividendo&lt;/strong&gt;; si no hay fondos, se acumulan. &lt;strong&gt;No otorgan control&lt;/strong&gt; de la firma. Se usan en lugar de deuda cuando la empresa no quiere &lt;strong&gt;empeorar sus ratios de endeudamiento&lt;/strong&gt; (leverage).
        &lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 4.5 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.5&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Tradeoff deuda vs. capital: ventajas y desventajas&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Comparativa&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;div class=&quot;vs-grid vs-2&quot;&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Ventajas de la deuda&lt;/div&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Desventajas de la deuda&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Beneficio impositivo&lt;/strong&gt; (los intereses son deducibles)&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Costo de quiebra&lt;/strong&gt; (insolvencia financiera)&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Disciplina financiera:&lt;/strong&gt; separa a los managers de los accionistas y obliga a generar caja&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Costo de agencia:&lt;/strong&gt; conflicto entre accionistas y tenedores de bonos/prestamistas&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;&lt;strong&gt;Pérdida de flexibilidad&lt;/strong&gt; financiera futura&lt;/div&gt;
        &lt;/div&gt;
        &lt;p&gt;La pregunta que abre el resto de la unidad: &lt;strong&gt;¿existe una estructura de capital óptima?&lt;/strong&gt;&lt;/p&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 4.6 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.6&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Modigliani-Miller&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Fundamentos&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Mundo sin impuestos&lt;/strong&gt;, sin costos de transacción y sin posibilidad de default/quiebra.&lt;/li&gt;
          &lt;li&gt;En ese mundo, las ventajas y desventajas de la deuda &lt;strong&gt;desaparecen&lt;/strong&gt;.&lt;/li&gt;
          &lt;li&gt;Conclusión: la decisión sobre la estructura de capital es &lt;strong&gt;irrelevante&lt;/strong&gt;.&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;note&quot;&gt;Más adelante incorporaron el &lt;b&gt;beneficio impositivo&lt;/b&gt; de la deuda. Con ese único agregado, la estructura óptima pasaría a ser &lt;b&gt;100% deuda&lt;/b&gt; — lo que muestra que son los costos de quiebra y de agencia (ausentes en el modelo) los que en la realidad limitan el endeudamiento.&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 4.7 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.7&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Cómo deciden las firmas + financiación interna vs. externa&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Mecanismo&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;Las firmas definen su estructura de capital con tres argumentos:&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;¿En qué &lt;strong&gt;fase de su ciclo de vida&lt;/strong&gt; están?&lt;/li&gt;
          &lt;li&gt;¿Qué hacen &lt;strong&gt;otras empresas del mismo rubro&lt;/strong&gt;?&lt;/li&gt;
          &lt;li&gt;Su propia &lt;strong&gt;preferencia&lt;/strong&gt; financiera.&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;vs-grid vs-2&quot;&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Financiación interna&lt;/div&gt;
          &lt;div class=&quot;vs-cell vs-header&quot;&gt;Financiación externa&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Con fondos propios (net income / utilidades retenidas)&lt;/div&gt;
          &lt;div class=&quot;vs-cell&quot;&gt;Cualquier otro tipo: deuda o equity nuevo&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 4.8 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.8&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Estructura óptima · Operating Income Approach&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Operatoria&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;Busca el nivel de deuda compatible con una &lt;strong&gt;probabilidad de default tolerable&lt;/strong&gt;. Lógica:&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;Con información histórica, estimar la &lt;strong&gt;media&lt;/strong&gt; y el &lt;strong&gt;desvío estándar&lt;/strong&gt; de la variación del operating income (EBITDA).&lt;/li&gt;
          &lt;li&gt;Para un nivel dado de nueva deuda, estimar el &lt;strong&gt;total debt payment&lt;/strong&gt; = intereses de deuda existente + intereses y principal de la deuda adicional.&lt;/li&gt;
          &lt;li&gt;Calcular el estadístico: &lt;span class=&quot;fx&quot;&gt;T = (EBITDA actual − total debt payment) / (desvío × EBITDA actual)&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;De la &lt;strong&gt;tabla normal&lt;/strong&gt; se obtiene la &lt;strong&gt;probabilidad de default&lt;/strong&gt; de ese nivel de deuda.&lt;/li&gt;
          &lt;li&gt;La empresa fija un &lt;strong&gt;límite máximo tolerable&lt;/strong&gt; de probabilidad de default; se despeja el &quot;breakeven debt payment&quot; y de ahí el &lt;strong&gt;nivel óptimo de deuda&lt;/strong&gt;.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 4.9 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.9&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Estructura óptima · Cost of Capital Approach&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Operatoria&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;Busca el &lt;strong&gt;debt ratio&lt;/strong&gt; (deuda/activos) que &lt;strong&gt;maximiza el valor de la firma&lt;/strong&gt; en estado estacionario:&lt;/p&gt;
        &lt;p&gt;&lt;span class=&quot;fx&quot;&gt;Valor firma = Cash Flow·(1+g) / (WACC − g)&lt;/span&gt;&lt;/p&gt;
        &lt;div class=&quot;key&quot;&gt;El valor de la firma &lt;b&gt;aumenta cuando el WACC baja&lt;/b&gt;, y viceversa → el óptimo es el debt ratio que &lt;b&gt;minimiza el WACC.&lt;/b&gt;&lt;/div&gt;
        &lt;p&gt;&lt;strong&gt;Pasos:&lt;/strong&gt;&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Cost of equity&lt;/strong&gt; = tasa libre de riesgo + (β × market risk premium). El β se reapalanca (beta levered) para cada debt ratio.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Cost of debt:&lt;/strong&gt; depende del riesgo de default (rating). El rating se resume en el &lt;strong&gt;Interest Coverage Ratio = EBIT / intereses&lt;/strong&gt; (&amp;gt;8,5 → AAA … &amp;lt;0,65 → D).&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;WACC&lt;/strong&gt; = Ke·(E/(E+D)) + Kd después de impuestos·(D/(E+D)), donde Kd after-tax = tasa pre-impuesto·(1 − tax rate).&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;note&quot;&gt;&lt;b&gt;Detalle clave:&lt;/b&gt; el beneficio impositivo de los intereses &lt;b&gt;empieza a reducirse cuando los intereses superan al EBIT&lt;/b&gt;: a partir de ahí dejan de ser plenamente deducibles. &lt;b&gt;Desventaja del método:&lt;/b&gt; hay que estimar el costo de deuda y de equity para cada nivel y suponerlos constantes en el tiempo.&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- 4.10 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;4.10&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Estructura óptima · Adjusted Present Value (APV)&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Operatoria&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p&gt;Descompone el valor de la firma en sus partes. Se arranca del valor &lt;strong&gt;como si no tuviera deuda&lt;/strong&gt; y se ajusta:&lt;/p&gt;
        &lt;p&gt;&lt;span class=&quot;fx&quot;&gt;Valor firma levered = Valor unlevered + VP del beneficio impositivo − Costo esperado de default&lt;/span&gt;&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;VP del beneficio impositivo:&lt;/strong&gt; &lt;span class=&quot;fx&quot;&gt;tD = (tax rate × Kd × Deuda) / Kd&lt;/span&gt; (≈ tax rate × Deuda).&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Costo esperado de default:&lt;/strong&gt; &lt;span class=&quot;fx&quot;&gt;pDC = prob. de default × VP de los costos de default&lt;/span&gt;. Es el &lt;strong&gt;gran problema&lt;/strong&gt; del método: ambos son difíciles de estimar directamente.&lt;/li&gt;
          &lt;li&gt;La &lt;strong&gt;probabilidad de default&lt;/strong&gt; se estima por la evidencia empírica de los ratings; los &lt;strong&gt;costos de default&lt;/strong&gt;, por estudios de empresas similares (≈ &lt;strong&gt;25%–30% del valor de la firma&lt;/strong&gt;).&lt;/li&gt;
        &lt;/ul&gt;
        &lt;p&gt;Se calcula el valor de la firma levered para distintos niveles de deuda; el nivel que lo maximiza es el &lt;strong&gt;ratio óptimo de deuda&lt;/strong&gt;.&lt;/p&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===================== PROJECT FINANCE ===================== --&gt;
  &lt;div class=&quot;unit upf&quot; id=&quot;upf&quot;&gt;
    &lt;div class=&quot;uhead&quot;&gt;
      &lt;h2&gt;Project Finance · Financiación estructurada de proyectos&lt;/h2&gt;
      &lt;p&gt;Cómo financiar un proyecto con su propio flujo de fondos y sin recurso contra los Sponsors: estructura, contratos, ventajas/desventajas y esquema de garantías. Caso VMOS (Vaca Muerta Oleoducto Sur).&lt;/p&gt;
    &lt;/div&gt;
    &lt;span class=&quot;expand-all&quot; onclick=&quot;toggleAll(&#x27;upf&#x27;)&quot;&gt;Expandir / colapsar todo&lt;/span&gt;

    &lt;!-- PF.1 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;PF.1&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;¿Qué es el Project Finance?&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Concepto base&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p class=&quot;lead&quot;&gt;Estructuración de un proyecto que tendrá su &lt;strong&gt;propio funding&lt;/strong&gt;, que queda separado de la posición de deuda de sus Sponsors. La decisión de prestar se apoya en el &lt;strong&gt;flujo de fondos futuro del propio proyecto&lt;/strong&gt;, no en el balance de los dueños.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Sin recurso (non-recourse):&lt;/strong&gt; el acreedor de la deuda &lt;strong&gt;no tiene recurso contra el balance de los Sponsors&lt;/strong&gt;. Su garantía son los activos y los flujos del proyecto.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Desconsolidación:&lt;/strong&gt; al quedar fuera del balance del Sponsor, &lt;strong&gt;mejora los ratios de endeudamiento&lt;/strong&gt; de los Sponsors.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Múltiples contratos en simultáneo:&lt;/strong&gt; la operación involucra negociar varios contratos a la vez, que buscan asegurar que los &lt;strong&gt;flujos de fondos del proyecto puedan ser capturados por el acreedor de deuda&lt;/strong&gt;.&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;note&quot;&gt;&lt;b&gt;Idea central:&lt;/b&gt; se aísla el riesgo del proyecto del riesgo corporativo del dueño. El proyecto &quot;se banca solo&quot; a través de un vehículo dedicado (SPV).&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- PF.2 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;PF.2&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;El SPV y los actores de la estructura&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Estructura&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p class=&quot;lead&quot;&gt;Todo gira en torno a un &lt;strong&gt;SPV (Special Purpose Vehicle)&lt;/strong&gt; — una sociedad creada exclusivamente para el proyecto. Cada actor se conecta a ese vehículo por un contrato distinto.&lt;/p&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;SPV (el Proyecto)&lt;/div&gt;
          Sociedad dedicada que concentra activos, deuda y flujos. Es el centro de toda la red de contratos.
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Accionistas / Sponsors&lt;/div&gt;
          Aportan el &lt;strong&gt;equity&lt;/strong&gt; y reciben &lt;strong&gt;dividendos&lt;/strong&gt;. Su responsabilidad se limita al capital aportado (salvo Completion Guarantee).
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Bancos / Acreedores&lt;/div&gt;
          Aportan el &lt;strong&gt;financiamiento (deuda)&lt;/strong&gt; y reciben el &lt;strong&gt;repago&lt;/strong&gt; que sale de los flujos del proyecto.
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Proveedores y Constructor&lt;/div&gt;
          Reciben &lt;strong&gt;contratación/pagos&lt;/strong&gt; a cambio de servicios, equipos y materiales, y de la construcción de la obra.
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Clientes (Off-takers)&lt;/div&gt;
          Compran la producción: generan las &lt;strong&gt;ventas y cobranzas&lt;/strong&gt; que son la fuente última del repago.
        &lt;/div&gt;
        &lt;div class=&quot;note&quot;&gt;&lt;b&gt;Debt Service Reserve Account (DSRA):&lt;/b&gt; cuenta de reserva que guarda fondos para cubrir el servicio de deuda ante baches de caja. Funciona como garantía/colchón para el acreedor.&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- PF.3 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;PF.3&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Proceso de estructuración (fases del proyecto)&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Proceso&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p class=&quot;lead&quot;&gt;Es un proceso de negociación de múltiples contratos en simultáneo, ordenado en fases. El &lt;strong&gt;Completion Date&lt;/strong&gt; es el hito que separa construir de operar.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;1 · Estudios de factibilidad:&lt;/strong&gt; se evalúa la viabilidad técnica y económica del proyecto.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;2 · Estructuración:&lt;/strong&gt; se arma el SPV, se negocian los contratos y el esquema de garantías hasta el cierre financiero.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;3 · Construcción:&lt;/strong&gt; se ejecutan los &lt;strong&gt;desembolsos&lt;/strong&gt; de la deuda y se construye la obra.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;4 · Completion Date:&lt;/strong&gt; hito de finalización/puesta en marcha; cambia el perfil de riesgo (se suele liberar la Completion Guarantee).&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;5 · Operación:&lt;/strong&gt; el proyecto genera caja, comienza el &lt;strong&gt;repago&lt;/strong&gt; de la deuda y el reparto de dividendos.&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;note&quot;&gt;&lt;b&gt;Por qué importa el Completion Date:&lt;/b&gt; antes de él el riesgo es de construcción (sin caja todavía); después es riesgo operativo. La estructura de garantías y los flujos de repago están &quot;adaptados a la generación de caja del proyecto&quot;.&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- PF.4 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;PF.4&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Ventajas y desventajas&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Comparativa&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;✓ Ventajas&lt;/div&gt;
          &lt;ul&gt;
            &lt;li&gt;&lt;strong&gt;Sin recurso:&lt;/strong&gt; los acreedores no tienen recurso contra el balance de los Sponsors (excepto si hay Completion Guarantee). Limita la responsabilidad al capital aportado.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Diferenciación de riesgo:&lt;/strong&gt; separa el riesgo del proyecto del riesgo corporativo del Sponsor; evita impactos en su riesgo crediticio.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Elude covenants:&lt;/strong&gt; se evitan los covenants restrictivos contenidos en los instrumentos de deuda del Sponsor.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Repago a medida:&lt;/strong&gt; los flujos de repago se adaptan totalmente a la estructura de generación de caja del proyecto.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;✗ Desventajas&lt;/div&gt;
          &lt;ul&gt;
            &lt;li&gt;&lt;strong&gt;Mayor costo&lt;/strong&gt; del financiamiento.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Complejidad&lt;/strong&gt; en la estructuración y en el esquema de garantías.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Tiempos:&lt;/strong&gt; mayores plazos de estructuración para llegar al cierre financiero.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- PF.5 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;PF.5&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Esquemas de garantías&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Garantías&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p class=&quot;lead&quot;&gt;Como no hay recurso contra el Sponsor, el acreedor se cubre con un paquete de garantías sobre el propio proyecto.&lt;/p&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Completion Guarantee (Sponsors):&lt;/strong&gt; garantía de finalización. Es la principal excepción al &quot;sin recurso&quot;: los Sponsors responden hasta que el proyecto se complete (Completion Date).&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Prenda sobre acciones del SPV:&lt;/strong&gt; permite al acreedor tomar el control del vehículo ante default.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Cesión fiduciaria de cobranzas (con o sin Off-taker):&lt;/strong&gt; los cobros de las ventas se dirigen a un fideicomiso que asegura el repago antes de llegar a los Sponsors.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Debt Service Reserve Account (DSRA):&lt;/strong&gt; reserva de fondos para el servicio de deuda.&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Prenda sobre activos físicos (garantías reales):&lt;/strong&gt; los activos del proyecto (p. ej. el oleoducto) respaldan el préstamo.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- PF.6 --&gt;
    &lt;div class=&quot;sec&quot;&gt;
      &lt;div class=&quot;sec-head&quot; onclick=&quot;toggle(this)&quot;&gt;
        &lt;span class=&quot;sec-num&quot;&gt;PF.6&lt;/span&gt;
        &lt;span class=&quot;sec-title&quot;&gt;Caso VMOS — Vaca Muerta Oleoducto Sur&lt;/span&gt;
        &lt;span class=&quot;chip&quot;&gt;Caso real&lt;/span&gt;&lt;span class=&quot;arrow&quot;&gt;▼&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sec-body&quot;&gt;&lt;div class=&quot;sec-inner&quot;&gt;
        &lt;p class=&quot;lead&quot;&gt;Ejemplo de project finance en Argentina: financiación basada en los flujos de caja del proyecto VMOS para construir un oleoducto, vía un préstamo sindicado liderado por bancos internacionales.&lt;/p&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;¿Qué es VMOS?&lt;/div&gt;
          &lt;strong&gt;VMOS S.A.&lt;/strong&gt; es una sociedad anónima formada por YPF, Pluspetrol, Pan American Energy, Pampa Energía, Vista, Chevron Argentina, Shell Argentina y Tecpetrol. Su objetivo es financiar y construir el &lt;strong&gt;Vaca Muerta Oleoducto Sur&lt;/strong&gt;, un oleoducto de &lt;strong&gt;437 km&lt;/strong&gt; que evacúa crudo desde la Cuenca Neuquina hasta la costa atlántica de Río Negro.
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;El &quot;project finance&quot; acá&lt;/div&gt;
          Financiación estructurada donde los fondos se basan en la &lt;strong&gt;capacidad futura del proyecto de generar caja&lt;/strong&gt;, y los &lt;strong&gt;activos del proyecto (el oleoducto) sirven como garantía&lt;/strong&gt; del préstamo. El SPV es VMOS S.A.; los Sponsors son las petroleras.
        &lt;/div&gt;
        &lt;div class=&quot;concept&quot;&gt;
          &lt;div class=&quot;concept-title&quot;&gt;Detalles del financiamiento&lt;/div&gt;
          &lt;ul&gt;
            &lt;li&gt;&lt;strong&gt;Monto:&lt;/strong&gt; préstamo sindicado de &lt;strong&gt;USD 2.000 millones&lt;/strong&gt;.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Líderes:&lt;/strong&gt; bancos internacionales de primera línea — Citi, Deutsche Bank, Itaú, JP Morgan y Santander.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Inversores:&lt;/strong&gt; un grupo de 14 bancos e inversores institucionales internacionales.&lt;/li&gt;
            &lt;li&gt;&lt;strong&gt;Importancia:&lt;/strong&gt; el mayor préstamo comercial para un proyecto de infraestructura en la historia argentina y un hito en el mercado internacional de project finance.&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;note&quot;&gt;&lt;b&gt;Nota:&lt;/b&gt; los datos del caso VMOS provienen del apunte de la materia. Por tratarse de una operación reciente, cifras y participantes pueden haberse actualizado desde entonces.&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

function show(n, btn){
  document.querySelectorAll(&#x27;.unit&#x27;).forEach(u=&gt;u.classList.remove(&#x27;show&#x27;));
  document.getElementById(&#x27;u&#x27;+n).classList.add(&#x27;show&#x27;);

  btn.classList.add(&#x27;active&#x27;);
  window.scrollTo({top:0,behavior:&#x27;smooth&#x27;});
}
function toggle(head){
  var body = head.nextElementSibling;
  var open = body.classList.contains(&#x27;open&#x27;);
  head.classList.toggle(&#x27;open&#x27;, !open);
  body.classList.toggle(&#x27;open&#x27;, !open);
}
function toggleAll(unitId){
  var unit = document.getElementById(unitId);
  var heads = unit.querySelectorAll(&#x27;.sec-head&#x27;);
  var anyClosed = Array.from(heads).some(h=&gt;!h.classList.contains(&#x27;open&#x27;));
  heads.forEach(h=&gt;{
    h.classList.toggle(&#x27;open&#x27;, anyClosed);
    h.nextElementSibling.classList.toggle(&#x27;open&#x27;, anyClosed);
  });
}

<script>
const subjPills=[...document.querySelectorAll('.subj')];
const tabs=[...document.querySelectorAll('.tab')];
const panels=[...document.querySelectorAll('.panel')];
const topbar=document.getElementById('topbar');
let topbarHidden=false;
let quietUntil=0;
function setTopbar(hide){
  if(hide===topbarHidden)return;
  topbarHidden=hide;
  topbar.style.marginTop=hide?(-topbar.offsetHeight-2)+'px':'0px';
  quietUntil=Date.now()+450;
}
function stickiesOf(doc){
  if(!doc.__stickies){
    try{
      doc.__stickies=[...doc.querySelectorAll('body *')].filter(el=>{
        const s=doc.defaultView.getComputedStyle(el);
        return s.position==='sticky'&&(parseFloat(s.top)||0)<80;
      });
      doc.__stickies.forEach(el=>{
        el.style.transition='transform .28s ease';
        el.style.willChange='transform';
      });
    }catch(e){doc.__stickies=[];}
  }
  return doc.__stickies;
}
function setStickies(doc,hide){
  stickiesOf(doc).forEach(el=>{el.style.transform=hide?'translateY(-120%)':'none';});
}
const hookedDocs=[];
function watchScroll(win){
  const doc=win.document;
  hookedDocs.push(doc);
  let lastY=win.scrollY||0;
  win.addEventListener('scroll',()=>{
    if(win.document!==doc)return;
    const y=win.scrollY;
    if(Date.now()<quietUntil){lastY=y;return;}
    const dy=y-lastY;
    lastY=y;
    if(y<=20){setTopbar(false);setStickies(doc,false);return;}
    if(dy>5){setTopbar(true);setStickies(doc,true);}
    else if(dy<-5){setTopbar(false);setStickies(doc,false);}
  },{passive:true});
}
function hookPanel(f){
  try{
    const d=f.contentDocument;
    if(!d||d.__scrollHooked)return;
    d.__scrollHooked=true;
    watchScroll(f.contentWindow);
  }catch(e){}
}
panels.forEach(f=>f.addEventListener('load',()=>hookPanel(f)));
panels.forEach(hookPanel);
setInterval(()=>panels.forEach(hookPanel),1000);
function selectTab(i){
  tabs.forEach(x=>x.classList.toggle('active',x.dataset.i===i));
  panels.forEach(p=>p.classList.toggle('active',p.dataset.i===i));
  setTopbar(false);
  hookedDocs.forEach(d=>setStickies(d,false));
}
function selectSubj(s){
  subjPills.forEach(p=>p.classList.toggle('active',p.dataset.subj===s));
  tabs.forEach(t=>t.style.display=(t.dataset.subj===s)?'':'none');
  const first=tabs.find(t=>t.dataset.subj===s);
  if(first)selectTab(first.dataset.i);
}
subjPills.forEach(p=>p.addEventListener('click',()=>selectSubj(p.dataset.subj)));
tabs.forEach(t=>t.addEventListener('click',()=>selectTab(t.dataset.i)));
</script>
