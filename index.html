,116.6 203.5,29.4 260.0,29.4&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;90.5&quot; y1=&quot;12&quot; x2=&quot;90.5&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;90.5&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₁&lt;/text&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₂&lt;/text&gt;&lt;line x1=&quot;203.5&quot; y1=&quot;12&quot; x2=&quot;203.5&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;203.5&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₃&lt;/text&gt;&lt;circle cx=&quot;101.8&quot; cy=&quot;46.9&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;circle cx=&quot;192.2&quot; cy=&quot;46.9&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Short butterfly&lt;/b&gt; (−C(55), −C(65), +2C(60)) → &lt;b&gt;net credit&lt;/b&gt; $1. &lt;b&gt;Lectura:&lt;/b&gt; apuesta a la &lt;b&gt;volatilidad&lt;/b&gt; con riesgo acotado: si el precio se aleja de K₂ me quedo el crédito (+1); si termina clavado en K₂ pierdo K₂−K₁−π = −4. BE en K₁+π y K₃−π (56 y 64). Espejo exacto del butterfly long.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c8&quot;&gt;U8&lt;/span&gt;Combinaciones (straddle, strip, strap, strangle)&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;&lt;b&gt;Bottom straddle&lt;/b&gt;: long call + long put, mismo K. Volatilidad: pérdida máx π (en S&lt;sub&gt;T&lt;/sub&gt;=K), ganancia ilimitada. Hull: S=69, K=70, c=4, p=3 → break-evens 63 y 77; peor caso −7 en S&lt;sub&gt;T&lt;/sub&gt;=70. &lt;b&gt;Top straddle&lt;/b&gt; (vendo ambas): NO volatilidad, ganancia máx π, &lt;b&gt;pérdida ilimitada&lt;/b&gt;.&lt;/p&gt;
    &lt;p class=&quot;note&quot;&gt;Panorámica 10.2: si el mercado también espera el salto, las primas ya lo descuentan; el straddle solo paga si tu visión difiere y acertás.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Strip&lt;/b&gt; = 1 call + 2 puts (mismo K): volatilidad con sesgo bajista. &lt;b&gt;Strap&lt;/b&gt; = 2 calls + 1 put: sesgo alcista.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Long strangle&lt;/b&gt; = long put K₁ + long call K₂ (K₁&amp;lt;K₂): más barato que el straddle pero requiere mayor movimiento (break-evens K₁−π y K₂+π). &lt;b&gt;Short strangle&lt;/b&gt;: short de ambas patas; ganancia π (menor que el top straddle), pérdida ilimitada.&lt;/p&gt;
    &lt;div class=&quot;ojo&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ojo — errata PPT (pág. 16)&lt;/b&gt;La PPT define short strangle como &quot;short call K₂ + &lt;i&gt;long&lt;/i&gt; put K₁&quot;. Es &lt;b&gt;short call K₂ + short put K₁&lt;/b&gt;: se venden ambas patas (top vertical combination, Hull).&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Replicación general&lt;/b&gt;: con strikes de todos los valores, una serie de butterflies angostos genera &quot;picos&quot; y cualquier payoff es aproximable (base del diseño a medida). Forward sintético: long call + short put (mismo K) = S&lt;sub&gt;T&lt;/sub&gt; − K.&lt;/p&gt;&lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;86.5&quot; x2=&quot;260&quot; y2=&quot;86.5&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;89.5&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,86.5 34.0,28.1 147.0,117.9 260.0,28.1 260.0,86.5&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,28.1 147.0,117.9 260.0,28.1&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;circle cx=&quot;107.5&quot; cy=&quot;86.5&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;circle cx=&quot;186.6&quot; cy=&quot;86.5&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Bottom straddle&lt;/b&gt; (Hull): +C(70) a $4 y +P(70) a $3 → π = $7. &lt;b&gt;Lectura:&lt;/b&gt; la “V” gana hacia &lt;b&gt;ambos&lt;/b&gt; lados: apuesto a un movimiento fuerte sin saber la dirección. Peor caso: S&lt;sub&gt;T&lt;/sub&gt;=K (pierdo las dos primas, −7). BE en K±π (63 y 77). Solo paga si mi visión de volatilidad difiere de la del mercado (las primas ya descuentan lo esperado).&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;59.5&quot; x2=&quot;260&quot; y2=&quot;59.5&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;62.5&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,59.5 34.0,117.9 147.0,28.1 260.0,117.9 260.0,59.5&quot; fill=&quot;#f87171&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,117.9 147.0,28.1 260.0,117.9&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;circle cx=&quot;107.5&quot; cy=&quot;59.5&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;circle cx=&quot;186.6&quot; cy=&quot;59.5&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Top straddle&lt;/b&gt;: vendo call y put con el mismo K. &lt;b&gt;Lectura:&lt;/b&gt; la “Λ” invertida gana la prima total (+7) si el precio termina clavado en K y pierde hacia ambos lados, &lt;b&gt;sin límite a la suba&lt;/b&gt;. Apuesta a la NO volatilidad de altísimo riesgo.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;95.4&quot; x2=&quot;260&quot; y2=&quot;95.4&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;98.4&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,95.4 34.0,28.1 124.4,117.9 169.6,117.9 260.0,28.1 260.0,95.4&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,28.1 124.4,117.9 169.6,117.9 260.0,28.1&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;124.4&quot; y1=&quot;12&quot; x2=&quot;124.4&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;124.4&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₁&lt;/text&gt;&lt;line x1=&quot;169.6&quot; y1=&quot;12&quot; x2=&quot;169.6&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;169.6&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₂&lt;/text&gt;&lt;circle cx=&quot;101.8&quot; cy=&quot;95.4&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;circle cx=&quot;192.2&quot; cy=&quot;95.4&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Long strangle&lt;/b&gt;: +P(65) +C(75), π = $5. &lt;b&gt;Lectura:&lt;/b&gt; como el straddle pero con strikes separados: la zona de pérdida máxima es la meseta entre K₁ y K₂ (−5, menor que en el straddle porque es más barato), a cambio necesita un movimiento mayor para ganar (BE = K₁−π = 60 y K₂+π = 80). Cuanto más separados los strikes, más barato y más movimiento exige.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;&lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;102.9&quot; x2=&quot;260&quot; y2=&quot;102.9&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;105.9&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,102.9 34.0,28.1 147.0,117.9 260.0,73.0 260.0,102.9&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,28.1 147.0,117.9 260.0,73.0&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;circle cx=&quot;128.2&quot; cy=&quot;102.9&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;circle cx=&quot;184.7&quot; cy=&quot;102.9&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Strip&lt;/b&gt; (+1 call +2 puts, K=70; π=$10 con c=4, p=3). &lt;b&gt;Lectura:&lt;/b&gt; straddle asimétrico: la pata izquierda cae con pendiente &lt;b&gt;−2&lt;/b&gt; (dos puts) y la derecha sube con pendiente +1. Apuesto a volatilidad creyendo que la &lt;b&gt;baja es más probable&lt;/b&gt;: el BE bajista (65) está más cerca de K que el alcista (80).&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;101.4&quot; x2=&quot;260&quot; y2=&quot;101.4&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;104.4&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,101.4 34.0,73.0 147.0,117.9 260.0,28.1 260.0,101.4&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,73.0 147.0,117.9 260.0,28.1&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;circle cx=&quot;105.6&quot; cy=&quot;101.4&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;circle cx=&quot;167.7&quot; cy=&quot;101.4&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Strap&lt;/b&gt; (+2 calls +1 put, K=70; π=$11). &lt;b&gt;Lectura:&lt;/b&gt; el espejo del strip: pendiente +2 a la derecha (dos calls) y −1 a la izquierda. Apuesto a volatilidad con &lt;b&gt;sesgo alcista&lt;/b&gt;: BE alcista en 75,5≈76 vs. bajista en 59 — gano más rápido si sube.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;50.6&quot; x2=&quot;260&quot; y2=&quot;50.6&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;53.6&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,50.6 34.0,117.9 124.4,28.1 169.6,28.1 260.0,117.9 260.0,50.6&quot; fill=&quot;#f87171&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,117.9 124.4,28.1 169.6,28.1 260.0,117.9&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;124.4&quot; y1=&quot;12&quot; x2=&quot;124.4&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;124.4&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₁&lt;/text&gt;&lt;line x1=&quot;169.6&quot; y1=&quot;12&quot; x2=&quot;169.6&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;169.6&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₂&lt;/text&gt;&lt;circle cx=&quot;101.8&quot; cy=&quot;50.6&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;circle cx=&quot;192.2&quot; cy=&quot;50.6&quot; r=&quot;3&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Short strangle&lt;/b&gt; (−P(65) −C(75); crédito $5). &lt;b&gt;Lectura:&lt;/b&gt; apuesta a la NO volatilidad: gano el crédito completo en toda la &lt;b&gt;meseta&lt;/b&gt; entre K₁ y K₂ (más ancha que el punto único del top straddle, pero cobrando menos prima). Fuera de los BE (60 y 80) la pérdida crece sin límite a la suba. Ojo errata PPT: se venden &lt;b&gt;ambas&lt;/b&gt; patas.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c8&quot;&gt;U8&lt;/span&gt;Tabla maestra de estrategias&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;table&gt;&lt;tr&gt;&lt;th&gt;Estrategia&lt;/th&gt;&lt;th&gt;Composición&lt;/th&gt;&lt;th&gt;Visión&lt;/th&gt;&lt;th&gt;D/C&lt;/th&gt;&lt;th&gt;Gan. máx&lt;/th&gt;&lt;th&gt;Pérd. máx&lt;/th&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Bull call spread&lt;/td&gt;&lt;td&gt;+C(K₁) −C(K₂)&lt;/td&gt;&lt;td&gt;Alcista mod.&lt;/td&gt;&lt;td&gt;D&lt;/td&gt;&lt;td&gt;K₂−K₁−π&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Bull put spread&lt;/td&gt;&lt;td&gt;+P(K₁) −P(K₂)&lt;/td&gt;&lt;td&gt;Alcista mod.&lt;/td&gt;&lt;td&gt;C&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;td&gt;K₂−K₁−π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Bear put spread&lt;/td&gt;&lt;td&gt;+P(K₂) −P(K₁)&lt;/td&gt;&lt;td&gt;Bajista mod.&lt;/td&gt;&lt;td&gt;D&lt;/td&gt;&lt;td&gt;K₂−K₁−π&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Bear call spread&lt;/td&gt;&lt;td&gt;+C(K₂) −C(K₁)&lt;/td&gt;&lt;td&gt;Bajista mod.&lt;/td&gt;&lt;td&gt;C&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;td&gt;K₂−K₁−π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Box&lt;/td&gt;&lt;td&gt;Bull call + bear put&lt;/td&gt;&lt;td&gt;Tasa sintética&lt;/td&gt;&lt;td&gt;D&lt;/td&gt;&lt;td colspan=&quot;2&quot;&gt;Payoff fijo K₂−K₁ (rinde r)&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Butterfly long&lt;/td&gt;&lt;td&gt;+K₁ +K₃ −2K₂&lt;/td&gt;&lt;td&gt;NO volatilidad&lt;/td&gt;&lt;td&gt;D&lt;/td&gt;&lt;td&gt;K₂−K₁−π&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Butterfly short&lt;/td&gt;&lt;td&gt;−K₁ −K₃ +2K₂&lt;/td&gt;&lt;td&gt;Volatilidad&lt;/td&gt;&lt;td&gt;C&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;td&gt;K₂−K₁−π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Bottom straddle&lt;/td&gt;&lt;td&gt;+C +P (mismo K)&lt;/td&gt;&lt;td&gt;Volatilidad&lt;/td&gt;&lt;td&gt;D&lt;/td&gt;&lt;td class=&quot;pos&quot;&gt;Ilimitada&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Top straddle&lt;/td&gt;&lt;td&gt;−C −P (mismo K)&lt;/td&gt;&lt;td&gt;NO volatilidad&lt;/td&gt;&lt;td&gt;C&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;td class=&quot;neg&quot;&gt;Ilimitada&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Strip / Strap&lt;/td&gt;&lt;td&gt;+1C+2P / +2C+1P&lt;/td&gt;&lt;td&gt;Vol. sesgo ↓ / ↑&lt;/td&gt;&lt;td&gt;D&lt;/td&gt;&lt;td class=&quot;pos&quot;&gt;Ilimitada&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Long strangle&lt;/td&gt;&lt;td&gt;+P(K₁) +C(K₂)&lt;/td&gt;&lt;td&gt;Volatilidad&lt;/td&gt;&lt;td&gt;D&lt;/td&gt;&lt;td class=&quot;pos&quot;&gt;Ilimitada&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Short strangle&lt;/td&gt;&lt;td&gt;−P(K₁) −C(K₂)&lt;/td&gt;&lt;td&gt;NO volatilidad&lt;/td&gt;&lt;td&gt;C&lt;/td&gt;&lt;td&gt;π&lt;/td&gt;&lt;td class=&quot;neg&quot;&gt;Ilimitada&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Covered call&lt;/td&gt;&lt;td&gt;+S −C&lt;/td&gt;&lt;td&gt;Lateral/alcista&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;td&gt;K−S₀+π&lt;/td&gt;&lt;td&gt;S₀−π&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Protective put&lt;/td&gt;&lt;td&gt;+S +P&lt;/td&gt;&lt;td&gt;Alcista c/seguro&lt;/td&gt;&lt;td&gt;D&lt;/td&gt;&lt;td class=&quot;pos&quot;&gt;Ilimitada&lt;/td&gt;&lt;td&gt;S₀−K+π&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;
    &lt;p class=&quot;note&quot;&gt;π = prima neta. Break-evens: spreads → strike comprado ± π; straddle → K ± π; strangle → K₁−π y K₂+π; butterfly → K₁+π y K₃−π.&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;
&lt;/section&gt;

&lt;!-- ============ FORMULAS ============ --&gt;
&lt;section class=&quot;unit&quot; id=&quot;for&quot;&gt;
  &lt;div class=&quot;uhead&quot; style=&quot;border-left:4px solid #f472b6;&quot;&gt;&lt;h2&gt;Σ Todas las fórmulas&lt;/h2&gt;&lt;p&gt;Resumen rápido para repasar antes del parcial&lt;/p&gt;&lt;/div&gt;
  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c5&quot;&gt;U5&lt;/span&gt;Propiedades&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;Payoffs: +C = máx(S&lt;sub&gt;T&lt;/sub&gt;−K;0) · +P = máx(K−S&lt;sub&gt;T&lt;/sub&gt;;0)&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Prima = VI + Valor tiempo · BE call = K+π · BE put = K−π&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;c ≤ S₀; C ≤ S₀; p ≤ Ke&lt;sup&gt;−rT&lt;/sup&gt;; P ≤ K&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;c ≥ máx(S₀−Ke&lt;sup&gt;−rT&lt;/sup&gt;;0) · p ≥ máx(Ke&lt;sup&gt;−rT&lt;/sup&gt;−S₀;0)&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;PCP: c + Ke&lt;sup&gt;−rT&lt;/sup&gt; = p + S₀ &amp;nbsp;|&amp;nbsp; con div.: c + D + Ke&lt;sup&gt;−rT&lt;/sup&gt; = p + S₀&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Americanas: S₀−K ≤ C−P ≤ S₀−Ke&lt;sup&gt;−rT&lt;/sup&gt; &amp;nbsp;(con div.: S₀−D−K ≤ C−P)&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;
  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c6&quot;&gt;U6&lt;/span&gt;Valuación&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;Δ = (f&lt;sub&gt;u&lt;/sub&gt;−f&lt;sub&gt;d&lt;/sub&gt;)/(S₀(u−d)) · B = e&lt;sup&gt;−rT&lt;/sup&gt;(uf&lt;sub&gt;d&lt;/sub&gt;−df&lt;sub&gt;u&lt;/sub&gt;)/(u−d)&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;p = (a−d)/(u−d) · a = e&lt;sup&gt;rΔt&lt;/sup&gt; | e&lt;sup&gt;(r−q)Δt&lt;/sup&gt; | e&lt;sup&gt;(r−r_f)Δt&lt;/sup&gt; | 1 (futuros)&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;f = e&lt;sup&gt;−rΔt&lt;/sup&gt;[pf&lt;sub&gt;u&lt;/sub&gt;+(1−p)f&lt;sub&gt;d&lt;/sub&gt;] · 2 pasos: e&lt;sup&gt;−2rΔt&lt;/sup&gt;[p²f&lt;sub&gt;uu&lt;/sub&gt;+2p(1−p)f&lt;sub&gt;ud&lt;/sub&gt;+(1−p)²f&lt;sub&gt;dd&lt;/sub&gt;]&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;u = e&lt;sup&gt;σ√Δt&lt;/sup&gt; · d = 1/u · condición d &amp;lt; e&lt;sup&gt;rΔt&lt;/sup&gt; &amp;lt; u&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Americana: nodo = máx(continuación; ejercicio)&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;ln S&lt;sub&gt;T&lt;/sub&gt; ~ Φ[ln S₀+(μ−σ²/2)T; σ²T] · E(S&lt;sub&gt;T&lt;/sub&gt;) = S₀e&lt;sup&gt;μT&lt;/sup&gt;&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;c = S₀N(d₁) − Ke&lt;sup&gt;−rT&lt;/sup&gt;N(d₂) · p = Ke&lt;sup&gt;−rT&lt;/sup&gt;N(−d₂) − S₀N(−d₁)&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;d₁ = [ln(S₀/K)+(r+σ²/2)T]/(σ√T) · d₂ = d₁ − σ√T&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Con yield δ: c = Se&lt;sup&gt;−δT&lt;/sup&gt;N(d₁) − Ke&lt;sup&gt;−rT&lt;/sup&gt;N(d₂), (r−δ) en d₁ · Discretos: S₀ → S₀−D&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;N(d₁) = Δ (AorN) · N(d₂) = prob. NR de ejercicio (CorN) · σ̂ = s/√τ (252 ruedas)&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;
  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c8&quot;&gt;U8&lt;/span&gt;Estrategias&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;Box = (K₂−K₁)e&lt;sup&gt;−rT&lt;/sup&gt; (solo europeas)&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Butterfly: gan. máx = K₂−K₁−π · BE: K₁+π y K₃−π&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Straddle: BE = K±π · Strangle: BE = K₁−π y K₂+π&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Forward sintético: +C −P (mismo K) = S&lt;sub&gt;T&lt;/sub&gt; − K&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Covered call ≈ short put · Protective put ≈ long call (vía PCP)&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;
&lt;/section&gt;

&lt;!-- ============ GLOSARIO ============ --&gt;
&lt;section class=&quot;unit&quot; id=&quot;glo&quot;&gt;
  &lt;div class=&quot;uhead&quot; style=&quot;border-left:4px solid #fb923c;&quot;&gt;&lt;h2&gt;Glosario español / inglés&lt;/h2&gt;&lt;p&gt;Términos clave de las tres unidades&lt;/p&gt;&lt;/div&gt;
  &lt;div class=&quot;body&quot; style=&quot;padding:0;&quot;&gt;
  &lt;table class=&quot;glos&quot;&gt;
    &lt;tr&gt;&lt;th&gt;Español&lt;/th&gt;&lt;th&gt;English&lt;/th&gt;&lt;th&gt;Definición&lt;/th&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Opción de compra / venta&lt;/td&gt;&lt;td&gt;Call / Put&lt;/td&gt;&lt;td&gt;Derecho a comprar / vender a K&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Prima&lt;/td&gt;&lt;td&gt;Premium&lt;/td&gt;&lt;td&gt;Precio de la opción (lo único que se negocia en mercados organizados)&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Precio de ejercicio&lt;/td&gt;&lt;td&gt;Strike (K)&lt;/td&gt;&lt;td&gt;Precio pactado&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Titular / Lanzador&lt;/td&gt;&lt;td&gt;Holder / Writer&lt;/td&gt;&lt;td&gt;Compra y paga prima / vende y cobra prima&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Valor intrínseco / tiempo&lt;/td&gt;&lt;td&gt;Intrinsic / Time value&lt;/td&gt;&lt;td&gt;Ejercicio inmediato / prima − VI&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Dentro-al-fuera del dinero&lt;/td&gt;&lt;td&gt;ITM / ATM / OTM&lt;/td&gt;&lt;td&gt;VI&amp;gt;0 / S=K / sin VI&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Paridad put-call&lt;/td&gt;&lt;td&gt;Put-call parity&lt;/td&gt;&lt;td&gt;c + Ke⁻ʳᵀ = p + S₀&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Ejercicio anticipado&lt;/td&gt;&lt;td&gt;Early exercise&lt;/td&gt;&lt;td&gt;Ejercer americana antes de T&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Cartera replicante&lt;/td&gt;&lt;td&gt;Replicating portfolio&lt;/td&gt;&lt;td&gt;Δ·S + B que copia el payoff&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Valuación neutral al riesgo&lt;/td&gt;&lt;td&gt;Risk-neutral valuation&lt;/td&gt;&lt;td&gt;E^NR del payoff descontado a r&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Árbol binomial&lt;/td&gt;&lt;td&gt;Binomial tree&lt;/td&gt;&lt;td&gt;Trayectorias discretas u/d&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Inducción hacia atrás&lt;/td&gt;&lt;td&gt;Backward induction&lt;/td&gt;&lt;td&gt;De los payoffs de T hacia t=0&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Delta / cobertura delta&lt;/td&gt;&lt;td&gt;Delta / delta hedging&lt;/td&gt;&lt;td&gt;∂f/∂S; rebalanceo continuo&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Mov. browniano geométrico&lt;/td&gt;&lt;td&gt;GBM&lt;/td&gt;&lt;td&gt;Retornos normales, precios lognormales&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Volatilidad implícita&lt;/td&gt;&lt;td&gt;Implied volatility&lt;/td&gt;&lt;td&gt;σ que iguala B&amp;S al precio de mercado (iterando)&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Efectivo o nada / activo o nada&lt;/td&gt;&lt;td&gt;Cash- / Asset-or-Nothing&lt;/td&gt;&lt;td&gt;Digitales: N(d₂) y S₀N(d₁)&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Lanzamiento cubierto&lt;/td&gt;&lt;td&gt;Covered call&lt;/td&gt;&lt;td&gt;+S −C ≈ short put&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Put protector&lt;/td&gt;&lt;td&gt;Protective put&lt;/td&gt;&lt;td&gt;+S +P ≈ long call&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Diferencial alcista / bajista&lt;/td&gt;&lt;td&gt;Bull / bear spread&lt;/td&gt;&lt;td&gt;Mismo tipo, distinto K&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Débito / crédito neto&lt;/td&gt;&lt;td&gt;Net debit / credit&lt;/td&gt;&lt;td&gt;Pago inicial / cobro inicial&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Mariposa&lt;/td&gt;&lt;td&gt;Butterfly&lt;/td&gt;&lt;td&gt;K₁, 2×K₂, K₃ — no volatilidad&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Caja&lt;/td&gt;&lt;td&gt;Box spread&lt;/td&gt;&lt;td&gt;Payoff fijo K₂−K₁ → tasa sintética&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Cono / cuna&lt;/td&gt;&lt;td&gt;Straddle / strangle&lt;/td&gt;&lt;td&gt;C+P mismo K / distinto K&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Banda / correa&lt;/td&gt;&lt;td&gt;Strip / strap&lt;/td&gt;&lt;td&gt;1C+2P / 2C+1P&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Diferencial calendario&lt;/td&gt;&lt;td&gt;Calendar spread&lt;/td&gt;&lt;td&gt;Mismo K, distinto T&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Liquidación en efectivo&lt;/td&gt;&lt;td&gt;Cash settlement&lt;/td&gt;&lt;td&gt;Se paga la diferencia (índices: siempre)&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Cámara compensadora&lt;/td&gt;&lt;td&gt;Clearing house (OCC)&lt;/td&gt;&lt;td&gt;Garantiza a los lanzadores&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Fecha ex-dividendo&lt;/td&gt;&lt;td&gt;Ex-dividend date&lt;/td&gt;&lt;td&gt;El precio cae por el dividendo; momento crítico para ejercicio del call&lt;/td&gt;&lt;/tr&gt;

  &lt;/div&gt;
&lt;/section&gt;
&lt;/main&gt;

&lt;script&gt;
  const tabs = document.querySelectorAll(&#x27;.tab&#x27;);
  const units = document.querySelectorAll(&#x27;section.unit&#x27;);
  tabs.forEach(t =&gt; t.addEventListener(&#x27;click&#x27;, () =&gt; {
    tabs.forEach(x =&gt; x.classList.remove(&#x27;active&#x27;));
    t.classList.add(&#x27;active&#x27;);
    units.forEach(u =&gt; u.classList.toggle(&#x27;show&#x27;, u.id === t.dataset.t));
    document.getElementById(&#x27;q&#x27;).value = &#x27;&#x27;; filter(&#x27;&#x27;);
  }));
  const input = document.getElementById(&#x27;q&#x27;);
  input.addEventListener(&#x27;input&#x27;, () =&gt; filter(input.value.trim().toLowerCase()));
  function filter(q){
    document.querySelectorAll(&#x27;section.unit.show details&#x27;).forEach(d =&gt; {
      if(!q){ d.classList.remove(&#x27;hide&#x27;); return; }
      const hit = d.textContent.toLowerCase().includes(q);
      d.classList.toggle(&#x27;hide&#x27;, !hit);
      if(hit &amp;&amp; q.length &gt; 2) d.open = true;
    });
  }
&lt;/script&gt;

    &lt;button class=&quot;fbtn&quot; data-c=&quot;Payoff&quot; onclick=&quot;filt(this,&#x27;c&#x27;,&#x27;Payoff&#x27;)&quot;&gt;Payoff&lt;/button&gt;
    &lt;button class=&quot;fbtn&quot; data-c=&quot;Límites&quot; onclick=&quot;filt(this,&#x27;c&#x27;,&#x27;Límites&#x27;)&quot;&gt;Límites&lt;/button&gt;
    &lt;button class=&quot;fbtn&quot; data-c=&quot;Paridad&quot; onclick=&quot;filt(this,&#x27;c&#x27;,&#x27;Paridad&#x27;)&quot;&gt;Paridad&lt;/button&gt;
    &lt;button class=&quot;fbtn&quot; data-c=&quot;Binomial&quot; onclick=&quot;filt(this,&#x27;c&#x27;,&#x27;Binomial&#x27;)&quot;&gt;Binomial&lt;/button&gt;
    &lt;button class=&quot;fbtn&quot; data-c=&quot;Valuación&quot; onclick=&quot;filt(this,&#x27;c&#x27;,&#x27;Valuación&#x27;)&quot;&gt;Valuación&lt;/button&gt;
    &lt;button class=&quot;fbtn&quot; data-c=&quot;Estrategia&quot; onclick=&quot;filt(this,&#x27;c&#x27;,&#x27;Estrategia&#x27;)&quot;&gt;Estrategia&lt;/button&gt;

&lt;script&gt;
const UNITS={U5:&quot;Mecánica y propiedades&quot;,U6:&quot;Valuación&quot;,U8:&quot;Estrategias con opciones&quot;};
const F=[
// ---------- U5 ----------
{u:&quot;U5&quot;,cat:&quot;Payoff&quot;,name:&quot;Payoff de un call&quot;,variants:[
  {label:&quot;Long&quot;,eq:&quot;Payoff = max(Sᴛ − K ; 0)&quot;},
  {label:&quot;Short&quot;,eq:&quot;Payoff = − max(Sᴛ − K ; 0)&quot;}],
  vars:[{s:&quot;Sᴛ&quot;,d:&quot;Precio spot del subyacente en maturity&quot;},{s:&quot;K&quot;,d:&quot;Strike&quot;}],
  uso:&quot;&lt;b&gt;Trader direccional alcista&lt;/b&gt;: long call para apostar a la suba con pérdida limitada a la prima.&quot;},
{u:&quot;U5&quot;,cat:&quot;Payoff&quot;,name:&quot;Payoff de un put&quot;,variants:[
  {label:&quot;Long&quot;,eq:&quot;Payoff = max(K − Sᴛ ; 0)&quot;},
  {label:&quot;Short&quot;,eq:&quot;Payoff = − max(K − Sᴛ ; 0)&quot;}],
  vars:[{s:&quot;Sᴛ&quot;,d:&quot;Precio spot en maturity&quot;},{s:&quot;K&quot;,d:&quot;Strike&quot;}],
  uso:&quot;&lt;b&gt;Trader bajista / hedger&lt;/b&gt;: long put para apostar a la baja o asegurar una posición long en el subyacente.&quot;},
{u:&quot;U5&quot;,cat:&quot;Límites&quot;,name:&quot;Bandas superiores de no arbitraje&quot;,variants:[
  {label:&quot;Call&quot;,eq:&quot;c ≤ S₀   ;   C ≤ S₀&quot;},
  {label:&quot;Put&quot;,eq:&quot;p ≤ K·e^(−rT)   ;   P ≤ K&quot;}],
  vars:[{s:&quot;c / C&quot;,d:&quot;Call europeo / americano&quot;},{s:&quot;p / P&quot;,d:&quot;Put europeo / americano&quot;},{s:&quot;S₀&quot;,d:&quot;Spot hoy&quot;},{s:&quot;r&quot;,d:&quot;Risk-free (compos. continua)&quot;},{s:&quot;T&quot;,d:&quot;Tiempo a maturity (años)&quot;}],
  uso:&quot;&lt;b&gt;Arbitrajista&lt;/b&gt;: un call nunca vale más que la acción; un put europeo nunca más que el VP del strike.&quot;},
{u:&quot;U5&quot;,cat:&quot;Límites&quot;,name:&quot;Bandas inferiores (europeas)&quot;,variants:[
  {label:&quot;Call&quot;,eq:&quot;c ≥ max(S₀ − K·e^(−rT) ; 0)&quot;},
  {label:&quot;Put&quot;,eq:&quot;p ≥ max(K·e^(−rT) − S₀ ; 0)&quot;}],
  vars:[{s:&quot;S₀&quot;,d:&quot;Spot hoy&quot;},{s:&quot;K&quot;,d:&quot;Strike&quot;},{s:&quot;r&quot;,d:&quot;Risk-free&quot;},{s:&quot;T&quot;,d:&quot;Maturity (años)&quot;}],
  uso:&quot;&lt;b&gt;Arbitrajista&lt;/b&gt;: cotas que el precio de la opción no puede violar sin generar arbitraje (construidas con portfolios).&quot;},
{u:&quot;U5&quot;,cat:&quot;Límites&quot;,name:&quot;Rango de valor del put (eur. vs amer.)&quot;,variants:[
  {label:&quot;Europeo&quot;,eq:&quot;max(K·e^(−rT) − S₀ ; 0) ≤ p ≤ K·e^(−rT)&quot;},
  {label:&quot;Americano&quot;,eq:&quot;max(K − S₀ ; 0) ≤ P ≤ K&quot;}],
  vars:[{s:&quot;p / P&quot;,d:&quot;Put europeo / americano&quot;},{s:&quot;K&quot;,d:&quot;Strike&quot;},{s:&quot;S₀&quot;,d:&quot;Spot&quot;}],
  uso:&quot;&lt;b&gt;Estudiante / quant&lt;/b&gt;: el put americano (P) puede valer su intrínseco antes de T; el europeo no.&quot;},
{u:&quot;U5&quot;,cat:&quot;Paridad&quot;,name:&quot;Put-Call Parity&quot;,variants:[
  {label:&quot;Europeas&quot;,eq:&quot;c + K·e^(−rT) = p + S₀&quot;},
  {label:&quot;Americanas&quot;,eq:&quot;S₀ − K ≤ C − P ≤ S₀ − K·e^(−rT)&quot;}],
  vars:[{s:&quot;c, p&quot;,d:&quot;Call y put europeos (mismo K y T)&quot;},{s:&quot;C, P&quot;,d:&quot;Call y put americanos&quot;},{s:&quot;S₀&quot;,d:&quot;Spot hoy&quot;},{s:&quot;K&quot;,d:&quot;Strike&quot;}],
  uso:&quot;&lt;b&gt;Arbitrajista / armador de estrategias&lt;/b&gt;: vincula el precio de call y put; base de covered call, protective put y box spread.&quot;},
{u:&quot;U5&quot;,cat:&quot;Paridad&quot;,name:&quot;Límite inferior del call americano&quot;,variants:[
  {label:&quot;Con put&quot;,eq:&quot;C ≥ S₀ − K + P&quot;}],
  vars:[{s:&quot;C, P&quot;,d:&quot;Call y put americanos&quot;},{s:&quot;S₀&quot;,d:&quot;Spot&quot;},{s:&quot;K&quot;,d:&quot;Strike&quot;}],
  uso:&quot;&lt;b&gt;Quant&lt;/b&gt;: muestra el &#x27;put implícito&#x27; que se pierde al ejercer un call americano anticipadamente.&quot;},
// ---------- U6 ----------
{u:&quot;U6&quot;,cat:&quot;Binomial&quot;,name:&quot;Portfolio replicante — Δ y B (1 paso)&quot;,variants:[
  {label:&quot;Delta&quot;,eq:&quot;Δ = (Cᵤ − C_d) / [ S₀·(u − d) ]&quot;},
  {label:&quot;Bono B&quot;,eq:&quot;B = e^(−rT) · (u·C_d − d·Cᵤ) / (u − d)&quot;},
  {label:&quot;Precio&quot;,eq:&quot;C₀ = Δ·S₀ + B&quot;}],
  vars:[{s:&quot;Cᵤ,C_d&quot;,d:&quot;Payoff de la opción en estado up / down&quot;},{s:&quot;u,d&quot;,d:&quot;Factores de suba / baja&quot;},{s:&quot;S₀&quot;,d:&quot;Spot hoy&quot;},{s:&quot;Δ&quot;,d:&quot;Delta (cobertura)&quot;},{s:&quot;B&quot;,d:&quot;Posición en caución&quot;}],
  uso:&quot;&lt;b&gt;Market maker&lt;/b&gt;: replica la opción con Δ acciones + caución; Δ es el ratio de cobertura.&quot;},
{u:&quot;U6&quot;,cat:&quot;Binomial&quot;,name:&quot;Calibración de u y d&quot;,variants:[
  {label:&quot;u, d&quot;,eq:&quot;u = e^(σ·√dt)\nd = e^(−σ·√dt) = 1/u&quot;}],
  vars:[{s:&quot;σ&quot;,d:&quot;Volatilidad del subyacente&quot;},{s:&quot;dt&quot;,d:&quot;Longitud del paso (en años)&quot;}],
  uso:&quot;&lt;b&gt;Quant&lt;/b&gt;: liga los factores del árbol con la volatilidad para que el binomial converja al continuo.&quot;},
{u:&quot;U6&quot;,cat:&quot;Binomial&quot;,name:&quot;Condición de no arbitraje del árbol&quot;,variants:[
  {label:&quot;Desigualdad&quot;,eq:&quot;d &lt; e^(rT) &lt; u&quot;}],
  vars:[{s:&quot;u,d&quot;,d:&quot;Factores up/down&quot;},{s:&quot;r&quot;,d:&quot;Risk-free&quot;},{s:&quot;T&quot;,d:&quot;Paso (años)&quot;}],
  uso:&quot;&lt;b&gt;Arbitrajista&lt;/b&gt;: si se viola, hay arbitraje (tomar/colocar y comprar/shortear el subyacente).&quot;},
{u:&quot;U6&quot;,cat:&quot;Binomial&quot;,name:&quot;Probabilidad neutral al riesgo&quot;,variants:[
  {label:&quot;p&quot;,eq:&quot;p = (e^(rT) − d) / (u − d)&quot;}],
  vars:[{s:&quot;p&quot;,d:&quot;Prob. NR de suba&quot;},{s:&quot;u,d&quot;,d:&quot;Factores up/down&quot;},{s:&quot;r&quot;,d:&quot;Risk-free&quot;},{s:&quot;T&quot;,d:&quot;Paso (años)&quot;}],
  uso:&quot;&lt;b&gt;Quant&lt;/b&gt;: probabilidad ficticia bajo la cual todo activo rinde la risk-free; no es la probabilidad real.&quot;},
{u:&quot;U6&quot;,cat:&quot;Valuación&quot;,name:&quot;Valuación neutral al riesgo (binomial)&quot;,variants:[
  {label:&quot;1 paso&quot;,eq:&quot;C₀ = e^(−rT)·[ p·Cᵤ + (1−p)·C_d ]&quot;},
  {label:&quot;2 pasos&quot;,eq:&quot;C₀ = e^(−2rΔt)·[ p²·C_uu + 2p(1−p)·C_ud + (1−p)²·C_dd ]&quot;},
  {label:&quot;n pasos&quot;,eq:&quot;C₀ = e^(−nrΔt) · Σⱼ [ n!/(j!(n−j)!) · pʲ(1−p)^(n−j) · max(0 ; uʲ d^(n−j) S₀ − K) ]&quot;}],
  vars:[{s:&quot;p&quot;,d:&quot;Prob. neutral al riesgo&quot;},{s:&quot;C_..&quot;,d:&quot;Payoff en cada nodo terminal&quot;},{s:&quot;j&quot;,d:&quot;Cantidad de pasos al alza&quot;},{s:&quot;Δt&quot;,d:&quot;Longitud del paso&quot;}],
  uso:&quot;&lt;b&gt;Quant / estudiante&lt;/b&gt;: valor = esperanza del payoff (bajo p) descontada a la risk-free. Sirve para calls, puts y cualquier payoff conocido.&quot;},
{u:&quot;U6&quot;,cat:&quot;Valuación&quot;,name:&quot;Black-Scholes (sin dividendos)&quot;,variants:[
  {label:&quot;Call&quot;,eq:&quot;c = S₀·N(d₁) − K·e^(−rT)·N(d₂)&quot;},
  {label:&quot;Put&quot;,eq:&quot;p = K·e^(−rT)·N(−d₂) − S₀·N(−d₁)&quot;},
  {label:&quot;d₁, d₂&quot;,eq:&quot;d₁ = [ ln(S₀/K) + (r + σ²/2)·T ] / (σ·√T)\nd₂ = d₁ − σ·√T&quot;}],
  vars:[{s:&quot;N(x)&quot;,d:&quot;Normal estándar acumulada&quot;},{s:&quot;S₀&quot;,d:&quot;Spot hoy&quot;},{s:&quot;K&quot;,d:&quot;Strike&quot;},{s:&quot;r&quot;,d:&quot;Risk-free (continua)&quot;},{s:&quot;σ&quot;,d:&quot;Volatilidad&quot;},{s:&quot;T&quot;,d:&quot;Maturity (años)&quot;}],
  uso:&quot;&lt;b&gt;Trader de opciones&lt;/b&gt;: precio de europeas en tiempo continuo. Único input no observable: la volatilidad.&quot;},
{u:&quot;U6&quot;,cat:&quot;Valuación&quot;,name:&quot;Black-Scholes con dividendos (δ)&quot;,variants:[
  {label:&quot;Call&quot;,eq:&quot;c = S·e^(−δ(T−t))·N(d₁) − K·e^(−r(T−t))·N(d₂)&quot;},
  {label:&quot;d₁, d₂&quot;,eq:&quot;d₁ = [ ln(S/K) + (r − δ + σ²/2)(T−t) ] / (σ·√(T−t))\nd₂ = d₁ − σ·√(T−t)&quot;}],
  vars:[{s:&quot;δ&quot;,d:&quot;Dividend yield continuo&quot;},{s:&quot;S&quot;,d:&quot;Spot&quot;},{s:&quot;K&quot;,d:&quot;Strike&quot;},{s:&quot;r&quot;,d:&quot;Risk-free&quot;},{s:&quot;σ&quot;,d:&quot;Volatilidad&quot;},{s:&quot;T−t&quot;,d:&quot;Tiempo restante&quot;}],
  uso:&quot;&lt;b&gt;Trader de equity/índices&lt;/b&gt;: ajusta BS por el flujo de dividendos del subyacente.&quot;},
{u:&quot;U6&quot;,cat:&quot;Valuación&quot;,name:&quot;Interpretación de N(d₁) y N(d₂)&quot;,variants:[
  {label:&quot;Delta&quot;,eq:&quot;N(d₁) = Δ = ∂c/∂S₀&quot;},
  {label:&quot;Descomposición&quot;,eq:&quot;call = (Asset-or-Nothing, long) − K·(Cash-or-Nothing, short)&quot;}],
  vars:[{s:&quot;N(d₁)&quot;,d:&quot;Prob. NR de recibir el subyacente / delta&quot;},{s:&quot;N(d₂)&quot;,d:&quot;Prob. NR de ejercicio&quot;}],
  uso:&quot;&lt;b&gt;Quant&lt;/b&gt;: N(d₂)=prob. de ejercicio (Cash-or-Nothing); N(d₁)=delta (Asset-or-Nothing).&quot;},
// ---------- U8 ----------
{u:&quot;U8&quot;,cat:&quot;Estrategia&quot;,name:&quot;Spreads verticales (2 opciones, distinto K)&quot;,variants:[
  {label:&quot;Bull Call&quot;,eq:&quot;Long call K₁ + Short call K₂   (K₁&lt;K₂)\n→ Net Debit · payoff bruto ≥ 0&quot;},
  {label:&quot;Bull Put&quot;,eq:&quot;Short put K₂ + Long put K₁\n→ Net Credit · payoff bruto ≤ 0&quot;},
  {label:&quot;Bear Put&quot;,eq:&quot;Long put K₂ + Short put K₁\n→ Net Debit · payoff bruto ≥ 0&quot;},
  {label:&quot;Bear Call&quot;,eq:&quot;Short call K₁ + Long call K₂\n→ Net Credit · payoff bruto ≤ 0&quot;}],
  vars:[{s:&quot;K₁,K₂&quot;,d:&quot;Strikes (K₁&lt;K₂)&quot;},{s:&quot;Debit&quot;,d:&quot;Requiere desembolso inicial&quot;},{s:&quot;Credit&quot;,d:&quot;Genera cash flow inicial&quot;}],
  uso:&quot;&lt;b&gt;Trader con view acotado&lt;/b&gt;: apuesta direccional con ganancia y pérdida limitadas, más barata que la opción sola.&quot;},
{u:&quot;U8&quot;,cat:&quot;Estrategia&quot;,name:&quot;Box Spread (tasa sintética)&quot;,variants:[
  {label:&quot;Payoff&quot;,eq:&quot;Payoff = K₂ − K₁  (constante)&quot;},
  {label:&quot;Valor hoy&quot;,eq:&quot;VP = (K₂ − K₁)·e^(−rT)&quot;}],
  vars:[{s:&quot;K₁,K₂&quot;,d:&quot;Strikes del bull call + bear put&quot;},{s:&quot;r&quot;,d:&quot;Risk-free&quot;},{s:&quot;T&quot;,d:&quot;Maturity&quot;}],
  uso:&quot;&lt;b&gt;Arbitrajista&lt;/b&gt;: Bull Call + Bear Put con mismos K → flujo cierto. Debe rendir la risk-free; si no, hay arbitraje (vale para europeas).&quot;},
{u:&quot;U8&quot;,cat:&quot;Estrategia&quot;,name:&quot;Butterfly Spread (4 opciones, 3 strikes)&quot;,variants:[
  {label:&quot;Long (NO vol)&quot;,eq:&quot;Ganancia máx = K₃ − K₁ − π_pagada\nPérdida máx = π_pagada\nNeto = 0 en K₁+π y K₃−π&quot;},
  {label:&quot;Short (vol)&quot;,eq:&quot;Ganancia máx = π_cobrada\nPérdida máx = K₃ − K₁ − π_cobrada&quot;}],
  vars:[{s:&quot;K₁,K₂,K₃&quot;,d:&quot;Strikes (K₂ = promedio)&quot;},{s:&quot;π&quot;,d:&quot;Prima neta (pagada/cobrada)&quot;}],
  uso:&quot;&lt;b&gt;Trader de volatilidad&lt;/b&gt;: long butterfly gana si el precio queda cerca de K₂ (Net Debit); short si se aleja (Net Credit).&quot;},
{u:&quot;U8&quot;,cat:&quot;Estrategia&quot;,name:&quot;Straddle (mismo K)&quot;,variants:[
  {label:&quot;Bottom (vol)&quot;,eq:&quot;Long call + Long put (mismo K)\n→ ganancia ilimitada, pérdida = π_pagada&quot;},
  {label:&quot;Top (NO vol)&quot;,eq:&quot;Short call + Short put (mismo K)\n→ ganancia = π_cobrada, pérdida ilimitada&quot;}],
  vars:[{s:&quot;K&quot;,d:&quot;Strike común&quot;},{s:&quot;π&quot;,d:&quot;Prima neta&quot;}],
  uso:&quot;&lt;b&gt;Trader de eventos&lt;/b&gt;: bottom straddle antes de un anuncio (espera gran movimiento); top straddle si espera calma.&quot;},
{u:&quot;U8&quot;,cat:&quot;Estrategia&quot;,name:&quot;Strip y Strap (mismo K)&quot;,variants:[
  {label:&quot;Strip&quot;,eq:&quot;Long 1 call + Long 2 puts → sesgo bajista&quot;},
  {label:&quot;Strap&quot;,eq:&quot;Long 2 calls + Long 1 put → sesgo alcista&quot;}],
  vars:[{s:&quot;K&quot;,d:&quot;Strike común&quot;}],
  uso:&quot;&lt;b&gt;Trader de volatilidad con sesgo&lt;/b&gt;: apuesta a movimiento fuerte pero con mayor probabilidad de una dirección.&quot;},
{u:&quot;U8&quot;,cat:&quot;Estrategia&quot;,name:&quot;Strangle (distinto K)&quot;,variants:[
  {label:&quot;Long (vol)&quot;,eq:&quot;Long call K₂ + Long put K₁\n→ ganancia ilimitada, pérdida = π_pagada&quot;},
  {label:&quot;Short (NO vol)&quot;,eq:&quot;Short call K₂ + Short put K₁\n→ ganancia = π_cobrada, pérdida ilimitada&quot;}],
  vars:[{s:&quot;K₁,K₂&quot;,d:&quot;Strikes (K₁&lt;K₂)&quot;},{s:&quot;π&quot;,d:&quot;Prima neta&quot;}],
  uso:&quot;&lt;b&gt;Trader de volatilidad&lt;/b&gt;: similar al straddle pero más barato (strikes separados); necesita un movimiento mayor para entrar en ganancia.&quot;},
{u:&quot;U8&quot;,cat:&quot;Estrategia&quot;,name:&quot;Subyacente + opción (vía parity)&quot;,variants:[
  {label:&quot;Covered Call&quot;,eq:&quot;Long subyacente + Short call → limita ganancia, reduce pérdida&quot;},
  {label:&quot;Protective Put&quot;,eq:&quot;Long subyacente + Long put → mantiene upside, asegura piso&quot;}],
  vars:[{s:&quot;K&quot;,d:&quot;Strike de la opción&quot;}],
  uso:&quot;&lt;b&gt;Tenedor de acciones&lt;/b&gt;: covered call para generar ingreso por la prima; protective put como seguro de cartera.&quot;}
];

let curU=&quot;all&quot;, curC=&quot;all&quot;, curQ=&quot;&quot;;
const list=document.getElementById(&#x27;list&#x27;), empty=document.getElementById(&#x27;empty&#x27;);

function render(){
  list.innerHTML=&#x27;&#x27;;
  let any=false;
  for(const uk of Object.keys(UNITS)){
    if(curU!==&#x27;all&#x27; &amp;&amp; curU!==uk) continue;
    const items=F.filter(f=&gt;f.u===uk
      &amp;&amp; (curC===&#x27;all&#x27;||f.cat===curC)
      &amp;&amp; match(f,curQ));
    if(!items.length) continue;
    any=true;
    const g=document.createElement(&#x27;div&#x27;); g.className=&#x27;unit-group&#x27;;
    g.innerHTML=`&lt;div class=&quot;unit-label&quot;&gt;&lt;span class=&quot;dot ${uk}&quot;&gt;&lt;/span&gt;${uk} — ${UNITS[uk]}&lt;span class=&quot;cap&quot;&gt;${items.length} fórmula(s)&lt;/span&gt;&lt;/div&gt;`;
    items.forEach(f=&gt;g.appendChild(card(f)));
    list.appendChild(g);
  }
  empty.style.display=any?&#x27;none&#x27;:&#x27;block&#x27;;
}
function match(f,q){
  if(!q) return true;
  const hay=(f.name+&#x27; &#x27;+f.cat+&#x27; &#x27;+f.variants.map(v=&gt;v.label+&#x27; &#x27;+v.eq).join(&#x27; &#x27;)+&#x27; &#x27;+f.vars.map(v=&gt;v.s+&#x27; &#x27;+v.d).join(&#x27; &#x27;)+&#x27; &#x27;+f.uso).toLowerCase();
  return q.toLowerCase().split(/\s+/).every(t=&gt;hay.includes(t));
}
function card(f){
  const c=document.createElement(&#x27;div&#x27;); c.className=&#x27;card&#x27;;
  const vars=f.vars.map(v=&gt;`&lt;div class=&quot;v&quot;&gt;&lt;code&gt;${v.s}&lt;/code&gt;&lt;span&gt;${v.d}&lt;/span&gt;&lt;/div&gt;`).join(&#x27;&#x27;);
  const tabs=f.variants.length&gt;1?`&lt;div class=&quot;tabs&quot;&gt;${f.variants.map((v,i)=&gt;`&lt;button class=&quot;tab ${i===0?&#x27;active&#x27;:&#x27;&#x27;}&quot; onclick=&quot;swap(this,${&#x27;`&#x27;}${i}${&#x27;`&#x27;})&quot;&gt;${v.label}&lt;/button&gt;`).join(&#x27;&#x27;)}&lt;/div&gt;`:&#x27;&#x27;;
  const eqs=f.variants.map((v,i)=&gt;`&lt;div class=&quot;eq eqv&quot; data-i=&quot;${i}&quot; style=&quot;${i===0?&#x27;&#x27;:&#x27;display:none&#x27;}&quot;&gt;${v.eq}&lt;/div&gt;`).join(&#x27;&#x27;);
  c.innerHTML=`&lt;div class=&quot;card-head&quot; onclick=&quot;this.parentElement.classList.toggle(&#x27;open&#x27;)&quot;&gt;
      &lt;span class=&quot;card-name&quot;&gt;${f.name}&lt;/span&gt;
      &lt;span class=&quot;cat-chip cat-${f.cat}&quot;&gt;${f.cat}&lt;/span&gt;

    &lt;div class=&quot;card-body&quot;&gt;${tabs}${eqs}

      &lt;div class=&quot;uso&quot;&gt;${f.uso}&lt;/div&gt;&lt;/div&gt;`;
  return c;
}
function swap(btn,i){
