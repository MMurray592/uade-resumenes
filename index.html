gt;&lt;line x1=&quot;12&quot; y1=&quot;10&quot; x2=&quot;12&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;12&quot; y1=&quot;98&quot; x2=&quot;192&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;12.0,17.9 18.0,22.8 24.0,27.6 30.0,32.1 36.0,36.5 42.0,40.8 48.0,44.8 54.0,48.8 60.0,52.5 66.0,56.1 72.0,59.5 78.0,62.7 84.0,65.8 90.0,68.7 96.0,71.4 102.0,74.0 108.0,76.4 114.0,78.7 120.0,80.8 126.0,82.7 132.0,84.4 138.0,86.0 144.0,87.4 150.0,88.6 156.0,89.7 162.0,90.6 168.0,91.4 174.0,92.0 180.0,92.4 186.0,92.6 192.0,92.7&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2&quot;/&gt;&lt;polyline points=&quot;12.0,92.7 18.0,92.6 24.0,92.4 30.0,92.0 36.0,91.4 42.0,90.6 48.0,89.7 54.0,88.6 60.0,87.4 66.0,86.0 72.0,84.4 78.0,82.7 84.0,80.8 90.0,78.7 96.0,76.4 102.0,74.0 108.0,71.4 114.0,68.7 120.0,65.8 126.0,62.7 132.0,59.5 138.0,56.1 144.0,52.5 150.0,48.8 156.0,44.8 162.0,40.8 168.0,36.5 174.0,32.1 180.0,27.6 186.0,22.8 192.0,17.9&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2&quot;/&gt;&lt;text x=&quot;100&quot; y=&quot;113&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9.5&quot; text-anchor=&quot;middle&quot;&gt;K →&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;K↑&lt;/b&gt;: comprar más caro vale menos (call baja); vender más caro vale más (put sube). Imagen espejo del efecto de S₀.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 200 120&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;12&quot; y1=&quot;10&quot; x2=&quot;12&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;12&quot; y1=&quot;98&quot; x2=&quot;192&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;12.0,91.0 18.0,78.1 24.0,72.8 30.0,68.7 36.0,65.3 42.0,62.2 48.0,59.5 54.0,57.0 60.0,54.6 66.0,52.4 72.0,50.3 78.0,48.3 84.0,46.4 90.0,44.6 96.0,42.9 102.0,41.2 108.0,39.5 114.0,38.0 120.0,36.4 126.0,34.9 132.0,33.5 138.0,32.1 144.0,30.7 150.0,29.3 156.0,28.0 162.0,26.7 168.0,25.4 174.0,24.2 180.0,22.9 186.0,21.7 192.0,20.6&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2&quot;/&gt;&lt;polyline points=&quot;12.0,93.6 18.0,82.4 24.0,77.7 30.0,74.1 36.0,71.1 42.0,68.5 48.0,66.1 54.0,63.8 60.0,61.8 66.0,59.9 72.0,58.0 78.0,56.3 84.0,54.6 90.0,53.0 96.0,51.5 102.0,50.0 108.0,48.6 114.0,47.2 120.0,45.9 126.0,44.6 132.0,43.3 138.0,42.1 144.0,40.8 150.0,39.7 156.0,38.5 162.0,37.4 168.0,36.3 174.0,35.2 180.0,34.1 186.0,33.0 192.0,32.0&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2&quot;/&gt;&lt;text x=&quot;100&quot; y=&quot;113&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9.5&quot; text-anchor=&quot;middle&quot;&gt;T →&lt;/text&gt;&lt;text x=&quot;192&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;8.5&quot; text-anchor=&quot;end&quot;&gt;americanas (eur: «?»)&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;T↑&lt;/b&gt;: en americanas, más plazo = más oportunidades de ejercicio (nunca resta). En europeas es «?»: un dividendo entre vencimientos puede hacer que la corta valga más.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 200 120&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;12&quot; y1=&quot;10&quot; x2=&quot;12&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;12&quot; y1=&quot;98&quot; x2=&quot;192&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;12.0,89.2 18.0,86.9 24.0,84.5 30.0,82.2 36.0,79.8 42.0,77.5 48.0,75.1 54.0,72.8 60.0,70.4 66.0,68.1 72.0,65.7 78.0,63.4 84.0,61.0 90.0,58.7 96.0,56.3 102.0,54.0 108.0,51.7 114.0,49.3 120.0,47.0 126.0,44.6 132.0,42.3 138.0,39.9 144.0,37.6 150.0,35.2 156.0,32.9 162.0,30.5 168.0,28.2 174.0,25.8 180.0,23.5 186.0,21.1 192.0,18.8&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2&quot;/&gt;&lt;polyline points=&quot;12.0,91.8 18.0,89.6 24.0,87.4 30.0,85.2 36.0,83.0 42.0,80.8 48.0,78.6 54.0,76.4 60.0,74.2 66.0,72.0 72.0,69.8 78.0,67.6 84.0,65.4 90.0,63.2 96.0,61.0 102.0,58.8 108.0,56.6 114.0,54.4 120.0,52.2 126.0,50.0 132.0,47.8 138.0,45.6 144.0,43.4 150.0,41.2 156.0,39.0 162.0,36.8 168.0,34.6 174.0,32.4 180.0,30.2 186.0,28.0 192.0,25.8&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2&quot;/&gt;&lt;text x=&quot;100&quot; y=&quot;113&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9.5&quot; text-anchor=&quot;middle&quot;&gt;σ →&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;σ↑&lt;/b&gt;: más volatilidad = más escenarios extremos. Como las pérdidas están capeadas en la prima y las ganancias no, ambas opciones suben. (En un forward, payoff lineal, σ no importa.)&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 200 120&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;12&quot; y1=&quot;10&quot; x2=&quot;12&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;12&quot; y1=&quot;98&quot; x2=&quot;192&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;12.0,76.0 18.0,74.4 24.0,72.8 30.0,71.2 36.0,69.5 42.0,67.9 48.0,66.3 54.0,64.7 60.0,63.1 66.0,61.5 72.0,59.9 78.0,58.3 84.0,56.6 90.0,55.0 96.0,53.4 102.0,51.8 108.0,50.2 114.0,48.6 120.0,47.0 126.0,45.3 132.0,43.7 138.0,42.1 144.0,40.5 150.0,38.9 156.0,37.3 162.0,35.7 168.0,34.1 174.0,32.4 180.0,30.8 186.0,29.2 192.0,27.6&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2&quot;/&gt;&lt;polyline points=&quot;12.0,27.6 18.0,29.2 24.0,30.8 30.0,32.4 36.0,34.1 42.0,35.7 48.0,37.3 54.0,38.9 60.0,40.5 66.0,42.1 72.0,43.7 78.0,45.3 84.0,47.0 90.0,48.6 96.0,50.2 102.0,51.8 108.0,53.4 114.0,55.0 120.0,56.6 126.0,58.3 132.0,59.9 138.0,61.5 144.0,63.1 150.0,64.7 156.0,66.3 162.0,67.9 168.0,69.5 174.0,71.2 180.0,72.8 186.0,74.4 192.0,76.0&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2&quot;/&gt;&lt;text x=&quot;100&quot; y=&quot;113&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9.5&quot; text-anchor=&quot;middle&quot;&gt;r →&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;r↑&lt;/b&gt;: baja el valor presente de K → el call (que paga K a futuro) gana; el put (que recibe K a futuro) pierde. Ojo Hull: supone S₀ constante; en la práctica el efecto combinado puede invertirse.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 200 120&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;12&quot; y1=&quot;10&quot; x2=&quot;12&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;12&quot; y1=&quot;98&quot; x2=&quot;192&quot; y2=&quot;98&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;polyline points=&quot;12.0,27.6 18.0,29.2 24.0,30.8 30.0,32.4 36.0,34.1 42.0,35.7 48.0,37.3 54.0,38.9 60.0,40.5 66.0,42.1 72.0,43.7 78.0,45.3 84.0,47.0 90.0,48.6 96.0,50.2 102.0,51.8 108.0,53.4 114.0,55.0 120.0,56.6 126.0,58.3 132.0,59.9 138.0,61.5 144.0,63.1 150.0,64.7 156.0,66.3 162.0,67.9 168.0,69.5 174.0,71.2 180.0,72.8 186.0,74.4 192.0,76.0&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2&quot;/&gt;&lt;polyline points=&quot;12.0,76.0 18.0,74.4 24.0,72.8 30.0,71.2 36.0,69.5 42.0,67.9 48.0,66.3 54.0,64.7 60.0,63.1 66.0,61.5 72.0,59.9 78.0,58.3 84.0,56.6 90.0,55.0 96.0,53.4 102.0,51.8 108.0,50.2 114.0,48.6 120.0,47.0 126.0,45.3 132.0,43.7 138.0,42.1 144.0,40.5 150.0,38.9 156.0,37.3 162.0,35.7 168.0,34.1 174.0,32.4 180.0,30.8 186.0,29.2 192.0,27.6&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2&quot;/&gt;&lt;text x=&quot;100&quot; y=&quot;113&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9.5&quot; text-anchor=&quot;middle&quot;&gt;D →&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Dividendos↑&lt;/b&gt;: el pago deprime el precio en la fecha ex-dividendo → mala noticia para el call, buena para el put (cuando el strike no se ajusta).&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;&lt;p class=&quot;note&quot;&gt;Azul = call · Rosa = put. Curvas cualitativas (caso base S₀=K=50, r=5%, σ=30%, T=1).&lt;/p&gt;
    &lt;ul&gt;
      &lt;li&gt;&lt;b&gt;T = &quot;?&quot; en europeas&lt;/b&gt;: un dividendo grande entre dos vencimientos puede hacer que el call corto valga más que el largo.&lt;/li&gt;
      &lt;li&gt;&lt;b&gt;σ sube ambas&lt;/b&gt;: payoff asimétrico (pérdida capeada en la prima, ganancia no). Por eso σ importa en opciones y no en forwards (payoff lineal).&lt;/li&gt;
      &lt;li&gt;&lt;b&gt;r&lt;/b&gt;: baja el VP de K → favorece al call, castiga al put.&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;ojo&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ojo — diferencia con Hull&lt;/b&gt;La PPT dice que r &quot;solo ajusta K&quot;. Hull aclara que eso supone S₀ constante: en la práctica, tasas ↑ suelen venir con acciones ↓ y el efecto combinado puede invertirse.&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c5&quot;&gt;U5&lt;/span&gt;Bandas de no arbitraje&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;c ≤ S₀ · C ≤ S₀ &amp;nbsp;&amp;nbsp;|&amp;nbsp;&amp;nbsp; p ≤ Ke&lt;sup&gt;−rT&lt;/sup&gt; · P ≤ K&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;c ≥ máx(S₀ − Ke&lt;sup&gt;−rT&lt;/sup&gt;; 0) &amp;nbsp;&amp;nbsp;|&amp;nbsp;&amp;nbsp; p ≥ máx(Ke&lt;sup&gt;−rT&lt;/sup&gt; − S₀; 0)&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Demostración call&lt;/b&gt;: Portfolio A (call + cupón cero que paga K) vale máx(S&lt;sub&gt;T&lt;/sub&gt;;K) ≥ Portfolio B (acción) = S&lt;sub&gt;T&lt;/sub&gt; → A ≥ B también hoy. &lt;b&gt;Put&lt;/b&gt;: Portfolio C (put + acción) vale máx(S&lt;sub&gt;T&lt;/sub&gt;;K) ≥ Portfolio D (VP de K).&lt;/p&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo Hull 9.1&lt;/b&gt;S₀=20, K=18, r=10%, T=1 → cota 20−18e&lt;sup&gt;−0,1&lt;/sup&gt;=$3,71. Si c=$3: compro call, shorteo acción, invierto $17 → $18,79. Si S&lt;sub&gt;T&lt;/sub&gt;&amp;gt;18 gano $0,79; si S&lt;sub&gt;T&lt;/sub&gt;&amp;lt;18 gano más (ej. $1,79 con S=17).&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo Hull 9.3&lt;/b&gt;S₀=37, K=40, r=5%, T=0,5 → cota put $2,01. Si p=$1: pido $38, compro put+acción; debo $38,96. Si S&lt;sub&gt;T&lt;/sub&gt;&amp;lt;40 vendo a 40 → gano $1,04.&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c5&quot;&gt;U5&lt;/span&gt;Put-Call Parity (europeas y americanas)&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;c + Ke&lt;sup&gt;−rT&lt;/sup&gt; = p + S₀&lt;/div&gt;
    &lt;p&gt;Sale de comparar los portfolios A y C: ambos pagan máx(S&lt;sub&gt;T&lt;/sub&gt;; K) en T → ley del precio único.&lt;/p&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Arbitraje si falla (Hull tabla 9.2)&lt;/b&gt;S₀=31, K=30, r=10%, T=0,25, c=3. Si p=2,25 (caro): compro call, vendo put y acción → +30,25 hoy → $31,02 en T; siempre compro la acción a $30 → gano &lt;b&gt;$1,02&lt;/b&gt;. Si p=1 (barato): vendo call, compro put+acción con $29 prestados → debo $29,73; siempre vendo a $30 → gano &lt;b&gt;$0,27&lt;/b&gt;.&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Americanas&lt;/b&gt; (sin dividendos): la PCP exacta no vale, pero:&lt;/p&gt;
    &lt;div class=&quot;frm&quot;&gt;S₀ − K ≤ C − P ≤ S₀ − Ke&lt;sup&gt;−rT&lt;/sup&gt;&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo Hull 9.5 (el de la PPT)&lt;/b&gt;C=1,50, K=20, T=5 meses, S₀=19, r=10% → −1 ≤ C−P ≤ −0,18 → &lt;b&gt;1,68 ≤ P ≤ 2,50&lt;/b&gt;.&lt;/div&gt;
    &lt;div class=&quot;ojo&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ojo — errata PPT (pág. 22)&lt;/b&gt;La PPT escribe &quot;1 ≤ C−P ≤ 0.18&quot;. Lo correcto es &lt;b&gt;−1 ≤ C−P ≤ −0,18&lt;/b&gt; (o 0,18 ≤ P−C ≤ 1), con exponente −0,10·5/12. La conclusión 1,68 &amp;lt; P &amp;lt; 2,50 sí está bien.&lt;/div&gt;
    &lt;p class=&quot;note&quot;&gt;Extra Hull (Panorámica 9.1): el equity de una firma apalancada es un call sobre los activos con K = deuda; deuda = VP(K) − p. La PCP reaparece en la estructura de capital.&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c5&quot;&gt;U5&lt;/span&gt;Ejercicio anticipado (calls y puts)&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;&lt;b&gt;Call sin dividendos: NUNCA conviene ejercer antes&lt;/b&gt; (mejor venderlo). Razones: (1) dilatar el pago de K (valor tiempo del dinero); (2) no pierdo dividendos; (3) ejercer mata el &quot;seguro&quot; (S podría caer bajo K); (4) si quiero vender la acción, vendo el call que vale más que el VI. Formalmente C ≥ S₀−Ke&lt;sup&gt;−rT&lt;/sup&gt; &amp;gt; S₀−K → &lt;b&gt;C = c&lt;/b&gt;.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Put: SÍ puede convenir&lt;/b&gt; si está deep ITM. Caso extremo S₀≈0: la acción no puede bajar más, ejercer da K hoy y gano tasa. Más atractivo cuando S₀↓, r↑, σ↓.&lt;/p&gt;
    &lt;p&gt;Curvas: el put americano se pega al VI (K−S₀) para S₀ ≤ A (zona Δ=−1); como P&amp;gt;p, el punto B del europeo &amp;gt; A; el europeo puede valer menos que su VI (en S₀=0 vale Ke&lt;sup&gt;−rT&lt;/sup&gt;, punto E).&lt;/p&gt;&lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 170&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;14&quot; y1=&quot;12&quot; x2=&quot;14&quot; y2=&quot;144&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;14&quot; y1=&quot;144&quot; x2=&quot;260&quot; y2=&quot;144&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;122.2&quot; y1=&quot;12&quot; x2=&quot;122.2&quot; y2=&quot;144&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;122.2&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;Ke⁻ʳᵀ&lt;/text&gt;&lt;line x1=&quot;137.0&quot; y1=&quot;12&quot; x2=&quot;137.0&quot; y2=&quot;144&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;137.0&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;polyline points=&quot;14.0,144.0 137.0,144.0 260.0,37.5&quot; fill=&quot;none&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.4&quot; stroke-dasharray=&quot;5 4&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;polyline points=&quot;14.0,144.0 122.2,144.0 260.0,24.8&quot; fill=&quot;none&quot; stroke=&quot;#9aa3b5&quot; stroke-width=&quot;1.2&quot; stroke-dasharray=&quot;2 3&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;polyline points=&quot;14.0,140.2 20.1,140.0 26.3,139.8 32.5,139.5 38.6,139.2 44.8,138.9 50.9,138.5 57.0,138.1 63.2,137.6 69.3,137.0 75.5,136.4 81.7,135.6 87.8,134.6 94.0,133.5 100.1,132.2 106.2,130.5 112.4,128.6 118.5,126.4 124.7,123.7 130.8,120.8 137.0,117.4 143.2,113.8 149.3,109.8 155.4,105.7 161.6,101.3 167.8,96.8 173.9,92.2 180.1,87.5 186.2,82.7 192.3,77.8 198.5,72.8 204.7,67.9 210.8,62.8 216.9,57.8 223.1,52.7 229.2,47.6 235.4,42.4 241.6,37.3 247.7,32.1 253.8,27.0 260.0,21.8&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2.4&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;text x=&quot;260&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S₀&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Valor del call (americano = europeo, sin dividendos)&lt;/b&gt; — curva azul vs. valor intrínseco máx(S₀−K;0) (gris a rayas) y banda inferior máx(S₀−Ke⁻ʳᵀ;0) (punteada). &lt;b&gt;Lectura:&lt;/b&gt; la curva está &lt;b&gt;siempre por encima del VI&lt;/b&gt; y solo lo toca en T → ejercer anticipadamente regala el valor tiempo; siempre conviene vender la opción. Subas de σ, r o T alejan la curva del VI (se desplaza a la izquierda).&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 170&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;14&quot; y1=&quot;12&quot; x2=&quot;14&quot; y2=&quot;144&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;14&quot; y1=&quot;144&quot; x2=&quot;260&quot; y2=&quot;144&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;137.0&quot; y1=&quot;12&quot; x2=&quot;137.0&quot; y2=&quot;144&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;137.0&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;polyline points=&quot;14.0,37.5 137.0,144.0 260.0,144.0&quot; fill=&quot;none&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.4&quot; stroke-dasharray=&quot;5 4&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;polyline points=&quot;14.0,46.6 20.1,51.7 26.3,56.8 32.5,61.8 38.6,66.9 44.8,71.8 50.9,76.8 57.0,81.7 63.2,86.5 69.3,91.3 75.5,95.9 81.7,100.4 87.8,104.8 94.0,109.0 100.1,113.0 106.2,116.7 112.4,120.1 118.5,123.2 124.7,125.9 130.8,128.2 137.0,130.2 143.2,131.9 149.3,133.3 155.4,134.4 161.6,135.4 167.8,136.2 173.9,136.9 180.1,137.5 186.2,138.0 192.3,138.5 198.5,138.8 204.7,139.2 210.8,139.5 216.9,139.7 223.1,140.0 229.2,140.2 235.4,140.4 241.6,140.6 247.7,140.7 253.8,140.9 260.0,141.0&quot; fill=&quot;none&quot; stroke=&quot;#a78bfa&quot; stroke-width=&quot;2.4&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;circle cx=&quot;14.0&quot; cy=&quot;46.5&quot; r=&quot;3.5&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;14.0&quot; y=&quot;39.5&quot; fill=&quot;#fbbf24&quot; font-size=&quot;10&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;E&lt;/text&gt;&lt;circle cx=&quot;103.8&quot; cy=&quot;115.3&quot; r=&quot;3.5&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;103.8&quot; y=&quot;108.3&quot; fill=&quot;#fbbf24&quot; font-size=&quot;10&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;B&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S₀&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Put europeo&lt;/b&gt; — la curva violeta &lt;b&gt;cruza&lt;/b&gt; el valor intrínseco en el punto B: para S₀ &amp;lt; B el europeo vale &lt;b&gt;menos&lt;/b&gt; que su VI (no puedo ejercerlo ya). En S₀ = 0 vale Ke⁻ʳᵀ (punto E, debajo de K). La recta E baja con mayor maturity; con T→0, A = B = K. Cota: máx(Ke⁻ʳᵀ−S₀;0) ≤ p ≤ Ke⁻ʳᵀ.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 170&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;14&quot; y1=&quot;12&quot; x2=&quot;14&quot; y2=&quot;144&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;14&quot; y1=&quot;144&quot; x2=&quot;260&quot; y2=&quot;144&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;87.8&quot; y1=&quot;12&quot; x2=&quot;87.8&quot; y2=&quot;144&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;87.8&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;A&lt;/text&gt;&lt;line x1=&quot;137.0&quot; y1=&quot;12&quot; x2=&quot;137.0&quot; y2=&quot;144&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;137.0&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;polyline points=&quot;14.0,37.5 137.0,144.0 260.0,144.0&quot; fill=&quot;none&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.4&quot; stroke-dasharray=&quot;5 4&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;polyline points=&quot;14.0,37.5 87.8,101.4 112.4,118.5 137.0,129.1 161.6,135.5 198.5,140.2 260.0,142.7&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.4&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;circle cx=&quot;87.8&quot; cy=&quot;101.4&quot; r=&quot;3.5&quot; fill=&quot;#fbbf24&quot;/&gt;&lt;text x=&quot;87.8&quot; y=&quot;94.4&quot; fill=&quot;#fbbf24&quot; font-size=&quot;10&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;A&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;156&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S₀&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Put americano&lt;/b&gt; — para S₀ ≤ A la curva verde &lt;b&gt;se pega al VI&lt;/b&gt; (K−S₀): zona de ejercicio óptimo inmediato, donde Δ = −1 (en S₀=0 vale K, no Ke⁻ʳᵀ). Como P &amp;gt; p, el punto B del europeo queda a la derecha de A (B &amp;gt; A). Subas de σ y T, y bajas de r, corren la curva (y A) hacia la derecha: el ejercicio anticipado se vuelve menos atractivo. Cota: máx(K−S₀;0) ≤ P ≤ K.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Con dividendos&lt;/b&gt;: cotas con D = VP(dividendos): c ≥ máx(S₀−D−Ke&lt;sup&gt;−rT&lt;/sup&gt;;0); p ≥ máx(Ke&lt;sup&gt;−rT&lt;/sup&gt;+D−S₀;0); PCP: c + D + Ke&lt;sup&gt;−rT&lt;/sup&gt; = p + S₀. El call americano puede ejercerse &lt;b&gt;justo antes de una fecha ex-dividendo&lt;/b&gt; (nunca en otro momento): el dividendo debe superar el put implícito + valor tiempo de K.&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;
&lt;/section&gt;

&lt;!-- ============ U6 ============ --&gt;
&lt;section class=&quot;unit&quot; id=&quot;u6&quot;&gt;
  &lt;div class=&quot;uhead b6&quot;&gt;&lt;h2&gt;Unidad 6 — Árboles binomiales y Black-Scholes&lt;/h2&gt;
  &lt;p&gt;Hull (español): caps. 11 y 12 · La PPT cita &quot;caps. 13, 14 y 15&quot; (inglés)&lt;/p&gt;&lt;/div&gt;

  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c6&quot;&gt;U6&lt;/span&gt;Portfolio replicante y ley del precio único&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;Dos carteras con iguales pagos futuros deben valer lo mismo hoy (AOA). Para replicar un derivado: Δ unidades del subyacente + B en caución (B&amp;gt;0 colocado, B&amp;lt;0 tomado).&lt;/p&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo cátedra (PPT U6)&lt;/b&gt;Call: S₀=41, K=40, r=8% cont., T=1. Estados: 60 (C&lt;sub&gt;u&lt;/sub&gt;=20) / 30 (C&lt;sub&gt;d&lt;/sub&gt;=0).&lt;br&gt;Sistema: Δ·60 + B·e&lt;sup&gt;0,08&lt;/sup&gt; = 20; Δ·30 + B·e&lt;sup&gt;0,08&lt;/sup&gt; = 0 → &lt;b&gt;Δ = 2/3, B = −18,4623&lt;/b&gt; → C = (2/3)·41 − 18,4623 = &lt;b&gt;8,871&lt;/b&gt;.&lt;/div&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 560 230&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;135&quot; y1=&quot;115&quot; x2=&quot;380&quot; y2=&quot;45&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.3&quot;/&gt;&lt;line x1=&quot;135&quot; y1=&quot;115&quot; x2=&quot;380&quot; y2=&quot;185&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.3&quot;/&gt;&lt;rect x=&quot;55&quot; y=&quot;93&quot; width=&quot;80&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;95&quot; y=&quot;111&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;S₀ = 41&lt;/text&gt;&lt;text x=&quot;95&quot; y=&quot;128&quot; fill=&quot;#fbbf24&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;C = 8,871&lt;/text&gt;&lt;rect x=&quot;380&quot; y=&quot;23&quot; width=&quot;80&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;420&quot; y=&quot;41&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;Sᵤ = 60&lt;/text&gt;&lt;text x=&quot;420&quot; y=&quot;58&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;Cᵤ = 20&lt;/text&gt;&lt;rect x=&quot;380&quot; y=&quot;163&quot; width=&quot;80&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;420&quot; y=&quot;181&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;S_d = 30&lt;/text&gt;&lt;text x=&quot;420&quot; y=&quot;198&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;C_d = 0&lt;/text&gt;&lt;text x=&quot;258&quot; y=&quot;55&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot;&gt;Δ·60 + B·e⁰·⁰⁸ = 20&lt;/text&gt;&lt;text x=&quot;258&quot; y=&quot;195&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot;&gt;Δ·30 + B·e⁰·⁰⁸ = 0&lt;/text&gt;&lt;text x=&quot;95&quot; y=&quot;165&quot; fill=&quot;#4ade80&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;Δ = 2/3 · B = −18,4623&lt;/text&gt;&lt;text x=&quot;95&quot; y=&quot;215&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;t = 0&lt;/text&gt;&lt;text x=&quot;420&quot; y=&quot;215&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;t = T = 1&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Árbol de un paso (ejemplo de la cátedra)&lt;/b&gt; — call K=40, r=8% continua. &lt;b&gt;Lectura:&lt;/b&gt; con dos estados y dos activos (subyacente + caución) el sistema 2×2 replica el call: Δ=2/3 acciones financiadas en parte con deuda (B&amp;lt;0). El portfolio replicante cuesta (2/3)·41 − 18,4623 = &lt;b&gt;8,871&lt;/b&gt;, y por ley del precio único ese es el precio del call. Si cotizara distinto, habría arbitraje comprando el barato y vendiendo el caro.&lt;/figcaption&gt;&lt;/figure&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ejemplo Hull (fig. 11.1)&lt;/b&gt;S₀=20 → 22/18 en 3 meses; K=21; r=12%. Cartera sin riesgo: Δ=0,25 → vale 4,5 seguro → hoy 4,367 → &lt;b&gt;f = 0,633&lt;/b&gt;.&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;Δ = (f&lt;sub&gt;u&lt;/sub&gt; − f&lt;sub&gt;d&lt;/sub&gt;) / (S₀(u−d)) &amp;nbsp;·&amp;nbsp; B = e&lt;sup&gt;−rT&lt;/sup&gt;(u·f&lt;sub&gt;d&lt;/sub&gt; − d·f&lt;sub&gt;u&lt;/sub&gt;)/(u−d) &amp;nbsp;·&amp;nbsp; f = Δ·S₀ + B&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;No arbitraje: d &amp;lt; e&lt;sup&gt;rT&lt;/sup&gt; &amp;lt; u&lt;/b&gt;. Δ y B se recalibran nodo a nodo (rebalanceo). El precio NO depende de las probabilidades reales ni del rendimiento esperado: ya están en S₀.&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c6&quot;&gt;U6&lt;/span&gt;Valuación neutral al riesgo&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;f = e&lt;sup&gt;−rΔt&lt;/sup&gt;[p·f&lt;sub&gt;u&lt;/sub&gt; + (1−p)·f&lt;sub&gt;d&lt;/sub&gt;] &amp;nbsp;&amp;nbsp;con&amp;nbsp;&amp;nbsp; p = (e&lt;sup&gt;rΔt&lt;/sup&gt; − d)/(u − d)&lt;/div&gt;
    &lt;p&gt;p = probabilidad &lt;b&gt;neutral al riesgo&lt;/b&gt; de suba (≠ probabilidad real). Con p, la acción rinde exactamente r. &lt;b&gt;Principio VNR&lt;/b&gt;: el derivado vale su payoff esperado bajo p, descontado a r — y el precio es válido en cualquier &quot;mundo&quot;.&lt;/p&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Mundo real vs. NR (Hull)&lt;/b&gt;p=0,6523 → f=0,633. Si el retorno real fuera 16%, q=0,7041 y el payoff esperado real 0,7041… pero ¿a qué tasa descontarlo? Solo sabiendo f=0,633 se deduce 42,58%. Por eso se usa VNR: todo a r.&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c6&quot;&gt;U6&lt;/span&gt;Árboles de 2 y n pasos · americanas · delta&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;div class=&quot;frm&quot;&gt;f = e&lt;sup&gt;−2rΔt&lt;/sup&gt;[p²f&lt;sub&gt;uu&lt;/sub&gt; + 2p(1−p)f&lt;sub&gt;ud&lt;/sub&gt; + (1−p)²f&lt;sub&gt;dd&lt;/sub&gt;]&lt;/div&gt;
    &lt;p&gt;Se valúa &lt;b&gt;de atrás hacia adelante&lt;/b&gt; desde los payoffs en T (condiciones de transversalidad), nodo a nodo. Sirve para calls, puts y cualquier payoff conocido. Los tres métodos de la cátedra —portfolio replicante, VNR y &lt;b&gt;Arrow-Debreu&lt;/b&gt; (valuar con los precios de los activos estado-contingentes)— son esencialmente el mismo, expresado de distintas formas.&lt;/p&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull figs. 11.3–11.5&lt;/b&gt;S₀=20, u=1,1, d=0,9, K=21, r=12%, Δt=0,25 → p=0,6523. f&lt;sub&gt;uu&lt;/sub&gt;=3,2 → nodo B: 2,0257 → &lt;b&gt;f = 1,2823&lt;/b&gt;.&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Put europeo vs. americano (figs. 11.7–11.8)&lt;/b&gt;K=52, S₀=50, u=1,2, d=0,8, r=5%, Δt=1 → p=0,6282. Europeo: &lt;b&gt;4,1923&lt;/b&gt;. Americano: en el nodo de baja (S=40) ejercicio 12 &amp;gt; continuación 9,4636 → &lt;b&gt;P = 5,0894&lt;/b&gt;. Regla: en cada nodo, máx(continuación; ejercicio).&lt;/div&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 560 260&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;104&quot; y1=&quot;130&quot; x2=&quot;216&quot; y2=&quot;62&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.3&quot;/&gt;&lt;line x1=&quot;104&quot; y1=&quot;130&quot; x2=&quot;216&quot; y2=&quot;198&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.3&quot;/&gt;&lt;line x1=&quot;284&quot; y1=&quot;62&quot; x2=&quot;436&quot; y2=&quot;30&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.3&quot;/&gt;&lt;line x1=&quot;284&quot; y1=&quot;62&quot; x2=&quot;436&quot; y2=&quot;130&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.3&quot;/&gt;&lt;line x1=&quot;284&quot; y1=&quot;198&quot; x2=&quot;436&quot; y2=&quot;130&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.3&quot;/&gt;&lt;line x1=&quot;284&quot; y1=&quot;198&quot; x2=&quot;436&quot; y2=&quot;228&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1.3&quot;/&gt;&lt;rect x=&quot;36&quot; y=&quot;108&quot; width=&quot;68&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;70&quot; y=&quot;126&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;20&lt;/text&gt;&lt;text x=&quot;70&quot; y=&quot;143&quot; fill=&quot;#fbbf24&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;1,2823&lt;/text&gt;&lt;rect x=&quot;216&quot; y=&quot;40&quot; width=&quot;68&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;250&quot; y=&quot;58&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;22&lt;/text&gt;&lt;text x=&quot;250&quot; y=&quot;75&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;2,0257&lt;/text&gt;&lt;rect x=&quot;216&quot; y=&quot;176&quot; width=&quot;68&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;250&quot; y=&quot;194&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;18&lt;/text&gt;&lt;text x=&quot;250&quot; y=&quot;211&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;0&lt;/text&gt;&lt;rect x=&quot;436&quot; y=&quot;8&quot; width=&quot;68&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;470&quot; y=&quot;26&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;24,2&lt;/text&gt;&lt;text x=&quot;470&quot; y=&quot;43&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;3,2&lt;/text&gt;&lt;rect x=&quot;436&quot; y=&quot;108&quot; width=&quot;68&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;470&quot; y=&quot;126&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;19,8&lt;/text&gt;&lt;text x=&quot;470&quot; y=&quot;143&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;0&lt;/text&gt;&lt;rect x=&quot;436&quot; y=&quot;206&quot; width=&quot;68&quot; height=&quot;44&quot; rx=&quot;9&quot; fill=&quot;#10141c&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;text x=&quot;470&quot; y=&quot;224&quot; fill=&quot;#e8eaf0&quot; font-size=&quot;12&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;&gt;16,2&lt;/text&gt;&lt;text x=&quot;470&quot; y=&quot;241&quot; fill=&quot;#a78bfa&quot; font-size=&quot;11&quot; text-anchor=&quot;middle&quot;&gt;0&lt;/text&gt;&lt;text x=&quot;70&quot; y=&quot;250&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;t = 0&lt;/text&gt;&lt;text x=&quot;250&quot; y=&quot;250&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;Δt = 0,25&lt;/text&gt;&lt;text x=&quot;470&quot; y=&quot;250&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;&gt;T = 0,5&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Árbol de dos pasos (Hull fig. 11.4)&lt;/b&gt; — call K=21, u=1,1, d=0,9, r=12%, Δt=0,25 → p=0,6523. En cada nodo: precio de la acción (blanco) y valor de la opción (violeta). &lt;b&gt;Lectura:&lt;/b&gt; se arranca por la derecha (condiciones de transversalidad): solo el nodo 24,2 paga (3,2). Después, backward induction: cada nodo vale e&lt;sup&gt;−rΔt&lt;/sup&gt;[p·f&lt;sub&gt;u&lt;/sub&gt;+(1−p)·f&lt;sub&gt;d&lt;/sub&gt;] → el nodo de suba vale 2,0257, el de baja 0, y el inicial (amarillo) &lt;b&gt;1,2823&lt;/b&gt;. Si la opción fuera americana, en cada nodo se compararía además contra el ejercicio inmediato y se tomaría el mayor.&lt;/figcaption&gt;&lt;/figure&gt;
    &lt;p&gt;&lt;b&gt;Delta&lt;/b&gt;: Δ = (f&lt;sub&gt;u&lt;/sub&gt;−f&lt;sub&gt;d&lt;/sub&gt;)/(S₀u−S₀d). Positiva en calls, negativa en puts. Cambia entre nodos → la cobertura se rebalancea (delta hedging).&lt;/p&gt;
    &lt;div class=&quot;frm&quot;&gt;u = e&lt;sup&gt;σ√Δt&lt;/sup&gt; · d = 1/u &amp;nbsp;|&amp;nbsp; C₀ = e&lt;sup&gt;−nrΔt&lt;/sup&gt; Σ&lt;sub&gt;j&lt;/sub&gt; [n!/(j!(n−j)!)]·p&lt;sup&gt;j&lt;/sup&gt;(1−p)&lt;sup&gt;n−j&lt;/sup&gt;·máx(0; u&lt;sup&gt;j&lt;/sup&gt;d&lt;sup&gt;n−j&lt;/sup&gt;S₀ − K)&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Calibrado con σ (fig. 11.9)&lt;/b&gt;Mismo put americano con σ=30%: u=1,3499, p=0,5097 → &lt;b&gt;7,43&lt;/b&gt;. Con 500 pasos: 7,47. El europeo con 500 pasos da 6,76 = Black-Scholes → &lt;b&gt;el binomial converge a B&amp;S&lt;/b&gt;.&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Otros subyacentes&lt;/b&gt; (cambia a en p=(a−d)/(u−d)): acciones a=e&lt;sup&gt;rΔt&lt;/sup&gt;; con dividend yield q: a=e&lt;sup&gt;(r−q)Δt&lt;/sup&gt;; divisas: a=e&lt;sup&gt;(r−r_f)Δt&lt;/sup&gt;; futuros: a=1.&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c6&quot;&gt;U6&lt;/span&gt;Lognormalidad y volatilidad&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;B&amp;S asume &lt;b&gt;MBG&lt;/b&gt;: retornos cortos normales, μ y σ constantes → precios &lt;b&gt;lognormales&lt;/b&gt; (solo positivos, asimétricos).&lt;/p&gt;&lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 150&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;12&quot; y1=&quot;126&quot; x2=&quot;260&quot; y2=&quot;126&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;136.0&quot; y1=&quot;12&quot; x2=&quot;136.0&quot; y2=&quot;126&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;136.0&quot; y=&quot;142&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;media = mediana = moda&lt;/text&gt;&lt;polyline points=&quot;12.0,124.7 16.1,124.3 20.3,123.7 24.4,123.0 28.5,122.1 32.7,121.0 36.8,119.6 40.9,117.9 45.1,115.9 49.2,113.4 53.3,110.6 57.5,107.2 61.6,103.4 65.7,99.1 69.9,94.3 74.0,89.0 78.1,83.2 82.3,77.0 86.4,70.5 90.5,63.7 94.7,56.9 98.8,50.0 102.9,43.2 107.1,36.8 111.2,30.8 115.3,25.4 119.5,20.8 123.6,17.0 127.7,14.3 131.9,12.6 136.0,12.0 140.1,12.6 144.3,14.3 148.4,17.0 152.5,20.8 156.7,25.4 160.8,30.8 164.9,36.8 169.1,43.2 173.2,50.0 177.3,56.9 181.5,63.7 185.6,70.5 189.7,77.0 193.9,83.2 198.0,89.0 202.1,94.3 206.3,99.1 210.4,103.4 214.5,107.2 218.7,110.6 222.8,113.4 226.9,115.9 231.1,117.9 235.2,119.6 239.3,121.0 243.5,122.1 247.6,123.0 251.7,123.7 255.9,124.3 260.0,124.7&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Distribución normal (los retornos)&lt;/b&gt; — simétrica, definida en toda la recta (un retorno continuo puede ser muy negativo). Media = mediana = moda. Es el supuesto del MBG para ΔS/S en períodos cortos.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 150&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;12&quot; y1=&quot;126&quot; x2=&quot;260&quot; y2=&quot;126&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;48.0&quot; y1=&quot;12&quot; x2=&quot;48.0&quot; y2=&quot;126&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;48.0&quot; y=&quot;142&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;8.5&quot; text-anchor=&quot;middle&quot;&gt;moda&lt;/text&gt;&lt;line x1=&quot;63.7&quot; y1=&quot;12&quot; x2=&quot;63.7&quot; y2=&quot;126&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;63.7&quot; y=&quot;142&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;8.5&quot; text-anchor=&quot;middle&quot;&gt;mediana&lt;/text&gt;&lt;line x1=&quot;73.9&quot; y1=&quot;12&quot; x2=&quot;73.9&quot; y2=&quot;126&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;73.9&quot; y=&quot;142&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;8.5&quot; text-anchor=&quot;middle&quot;&gt;media&lt;/text&gt;&lt;polyline points=&quot;15.1,126.0 18.2,124.5 21.3,117.1 24.4,102.5 27.5,83.6 30.6,63.9 33.7,46.2 36.8,32.0 39.9,21.8 43.0,15.4 46.1,12.3 49.2,12.0 52.3,13.8 55.4,17.2 58.5,21.7 61.6,26.9 64.7,32.6 67.8,38.4 70.9,44.3 74.0,50.1 77.1,55.7 80.2,61.1 83.3,66.2 86.4,70.9 89.5,75.4 92.6,79.6 95.7,83.4 98.8,86.9 101.9,90.2 105.0,93.2 108.1,96.0 111.2,98.5 114.3,100.8 117.4,102.9 120.5,104.9 123.6,106.6 126.7,108.2 129.8,109.7 132.9,111.1 136.0,112.3 139.1,113.4 142.2,114.4 145.3,115.4 148.4,116.2 151.5,117.0 154.6,117.7 157.7,118.4 160.8,119.0 163.9,119.6 167.0,120.1 170.1,120.5 173.2,120.9 176.3,121.3 179.4,121.7 182.5,122.0 185.6,122.3 188.7,122.6 191.8,122.8 194.9,123.1 198.0,123.3 201.1,123.5 204.2,123.7 207.3,123.8 210.4,124.0 213.5,124.1 216.6,124.3 219.7,124.4 222.8,124.5 225.9,124.6 229.0,124.7 232.1,124.8 235.2,124.9 238.3,124.9 241.4,125.0 244.5,125.1 247.6,125.1 250.7,125.2 253.8,125.3 256.9,125.3 260.0,125.3&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot;/&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Distribución lognormal (los precios)&lt;/b&gt; — si el retorno es normal, S&lt;sub&gt;T&lt;/sub&gt; = S₀e^retorno^ es lognormal: &lt;b&gt;solo valores positivos&lt;/b&gt; y asimétrica a la derecha (cola larga hacia precios altos), con moda &amp;lt; mediana &amp;lt; media. Por eso en d₁ y d₂ aparece ln(S₀/K), y por eso la media del retorno efectivo es μ−σ²/2 (la geométrica corre por debajo de la aritmética).&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;ln S&lt;sub&gt;T&lt;/sub&gt; ~ Φ[ln S₀ + (μ − σ²/2)T; σ²T] &amp;nbsp;·&amp;nbsp; E(S&lt;sub&gt;T&lt;/sub&gt;) = S₀e&lt;sup&gt;μT&lt;/sup&gt;&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull 12.1&lt;/b&gt;S₀=40, μ=16%, σ=20%, T=0,5 → con 95% de confianza, S&lt;sub&gt;T&lt;/sub&gt; ∈ ($32,55; $56,56).&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;μ vs. μ−σ²/2&lt;/b&gt;: el retorno continuo efectivamente ganado tiene media μ−σ²/2 (media geométrica &amp;lt; aritmética). Hull: retornos 15/20/30/−20/25% → media aritmética 14% pero el inversor ganó 12,4% anual.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Volatilidad histórica&lt;/b&gt;: u&lt;sub&gt;i&lt;/sub&gt;=ln(S&lt;sub&gt;i&lt;/sub&gt;/S&lt;sub&gt;i−1&lt;/sub&gt;); σ̂ = s/√τ; con 252 ruedas/año. Hull 12.3: s=1,216% diario → σ̂ = 19,3% anual. Se usan días de negociación (la volatilidad la genera el propio trading: Fama/French/Roll).&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c6&quot;&gt;U6&lt;/span&gt;Black-Scholes: fórmulas, supuestos y ejemplo&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;&lt;b&gt;Supuestos&lt;/b&gt;: MBG con μ,σ constantes · sin costos/impuestos · sin dividendos · AOA · negociación continua · prestar/tomar a r · r constante. &lt;b&gt;Argumento&lt;/b&gt;: cartera Δ-cubierta (ej. Δc=0,4ΔS → long 40 acciones + short 100 calls) libre de riesgo por un instante → rinde r → ecuación diferencial → fórmulas.&lt;/p&gt;
    &lt;div class=&quot;frm&quot;&gt;c = S₀N(d₁) − Ke&lt;sup&gt;−rT&lt;/sup&gt;N(d₂) &amp;nbsp;·&amp;nbsp; p = Ke&lt;sup&gt;−rT&lt;/sup&gt;N(−d₂) − S₀N(−d₁)&lt;/div&gt;
    &lt;div class=&quot;frm&quot;&gt;d₁ = [ln(S₀/K) + (r + σ²/2)T]/(σ√T) &amp;nbsp;·&amp;nbsp; d₂ = d₁ − σ√T&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull 12.4&lt;/b&gt;S₀=42, K=40, r=10%, σ=20%, T=0,5 → d₁=0,7693; d₂=0,6278; N(d₁)=0,7791; N(d₂)=0,7349 → &lt;b&gt;c=4,76 · p=0,81&lt;/b&gt;. (Verifica PCP: c + Ke&lt;sup&gt;−rT&lt;/sup&gt; = 42,81 = p + S₀.)&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Límites&lt;/b&gt;: S₀≫K → c→S₀−Ke&lt;sup&gt;−rT&lt;/sup&gt; (forward), p→0. S₀≪K → c→0, p→Ke&lt;sup&gt;−rT&lt;/sup&gt;−S₀. En t→T las normales van a 0/1 según el signo de ln(S/K).&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Interpretación (PPT)&lt;/b&gt;: N(d₂) = probabilidad NR de ejercicio → Ke&lt;sup&gt;−rT&lt;/sup&gt;N(d₂) es una posición short en K digitales &lt;b&gt;Cash-or-Nothing&lt;/b&gt;. N(d₁) = Δ = ∂c/∂S₀ → S₀N(d₁) es una &lt;b&gt;Asset-or-Nothing&lt;/b&gt;. &lt;b&gt;Call vanilla = long AorN + short K·CorN&lt;/b&gt;.&lt;/p&gt;&lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 150&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;30&quot; y1=&quot;14&quot; x2=&quot;30&quot; y2=&quot;124&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;30&quot; y1=&quot;124&quot; x2=&quot;260&quot; y2=&quot;124&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;145.0&quot; y1=&quot;14&quot; x2=&quot;145.0&quot; y2=&quot;124&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;145.0&quot; y=&quot;136&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;polyline points=&quot;30.0,124.0 145.0,124.0&quot; fill=&quot;none&quot; stroke=&quot;#fbbf24&quot; stroke-width=&quot;2.4&quot;/&gt;&lt;line x1=&quot;145.0&quot; y1=&quot;124.0&quot; x2=&quot;145.0&quot; y2=&quot;63.5&quot; stroke=&quot;#fbbf24&quot; stroke-width=&quot;2.4&quot; stroke-dasharray=&quot;3 3&quot;/&gt;&lt;polyline points=&quot;145.0,63.5 260.0,63.5&quot; fill=&quot;none&quot; stroke=&quot;#fbbf24&quot; stroke-width=&quot;2.4&quot;/&gt;&lt;text x=&quot;26&quot; y=&quot;66.5&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;$1&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;136&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Cash-or-Nothing (CorN)&lt;/b&gt; — paga $1 si S&lt;sub&gt;T&lt;/sub&gt; &amp;gt; K, $0 si no (payoff escalón). &lt;b&gt;Lectura:&lt;/b&gt; su valor hoy es e⁻ʳᵀ·N(d₂): la probabilidad neutral al riesgo de ejercicio, descontada. El término Ke⁻ʳᵀN(d₂) del call son &lt;b&gt;K posiciones short&lt;/b&gt; en esta digital (lo que pago si ejerzo).&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 150&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;30&quot; y1=&quot;14&quot; x2=&quot;30&quot; y2=&quot;124&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;30&quot; y1=&quot;124&quot; x2=&quot;260&quot; y2=&quot;124&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;145.0&quot; y1=&quot;14&quot; x2=&quot;145.0&quot; y2=&quot;124&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;145.0&quot; y=&quot;136&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;polyline points=&quot;30.0,124.0 145.0,124.0&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.4&quot;/&gt;&lt;line x1=&quot;145.0&quot; y1=&quot;124.0&quot; x2=&quot;145.0&quot; y2=&quot;69.0&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.4&quot; stroke-dasharray=&quot;3 3&quot;/&gt;&lt;polyline points=&quot;145.0,69.0 260.0,19.5&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.4&quot;/&gt;&lt;text x=&quot;26&quot; y=&quot;72.0&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S=K&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;136&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Asset-or-Nothing (AorN)&lt;/b&gt; — entrega 1 unidad del subyacente si S&lt;sub&gt;T&lt;/sub&gt; &amp;gt; K, nada si no (salta a K y sigue la diagonal). &lt;b&gt;Lectura:&lt;/b&gt; su valor hoy es S₀·N(d₁) — por eso N(d₁) mide “cuánto se parece la opción a tener el subyacente” y N(d₁) = Δ. &lt;b&gt;Call vanilla = long 1 AorN + short K CorN&lt;/b&gt;: si se activan, recibo el activo pagando K.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
    &lt;p&gt;&lt;b&gt;Volatilidad implícita&lt;/b&gt;: el σ que iguala la fórmula al precio de mercado; se obtiene &lt;b&gt;iterando&lt;/b&gt; (Hull: c=1,90 → VI=24,2%). Histórica = backward; implícita = forward (predice mejor). Los traders cotizan en VI.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Limitaciones (PPT)&lt;/b&gt;: solo europeas; ignora colas pesadas; σ y r constantes; asume mercados 100% eficientes.&lt;/p&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c6&quot;&gt;U6&lt;/span&gt;Dividendos en B&amp;S&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;&lt;b&gt;Libro (discretos)&lt;/b&gt;: restar a S₀ el VP de los dividendos (D) y aplicar B&amp;S normal.&lt;/p&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Hull 12.5&lt;/b&gt;Dividendos $0,50 en 2 y 5 meses; S₀=40, K=40, σ=30%, r=9%, T=0,5. D=0,9741 → S₀=39,0259 → &lt;b&gt;c=3,67&lt;/b&gt;.&lt;/div&gt;
    &lt;div class=&quot;ej&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Aproximación de Black (Hull 12.6)&lt;/b&gt;La misma americana: europea &quot;corta&quot; hasta justo antes del último ex-dividendo → 3,52; europea completa → 3,67. &lt;b&gt;C ≈ máx = 3,67&lt;/b&gt; (no conviene ejercicio anticipado acá).&lt;/div&gt;
    &lt;div class=&quot;ojo&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ojo — notación cátedra vs. libro&lt;/b&gt;La PPT usa dividend yield continuo δ (Merton): c = Se&lt;sup&gt;−δ(T−t)&lt;/sup&gt;N(d₁) − Ke&lt;sup&gt;−r(T−t)&lt;/sup&gt;N(d₂), con (r−δ) en d₁. El libro usa dividendos discretos (S₀−D). Ambos válidos; con δ=0 coinciden.&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;
&lt;/section&gt;

&lt;!-- ============ U8 ============ --&gt;
&lt;section class=&quot;unit&quot; id=&quot;u8&quot;&gt;
  &lt;div class=&quot;uhead b8&quot;&gt;&lt;h2&gt;Unidad 8 — Estrategias con opciones&lt;/h2&gt;
  &lt;p&gt;Hull (español): cap. 10 · La PPT cita &quot;caps. 17 y 18&quot; — errata (en inglés sería el cap. 12)&lt;/p&gt;&lt;/div&gt;

  &lt;details open&gt;&lt;summary&gt;&lt;span class=&quot;chip c8&quot;&gt;U8&lt;/span&gt;Para qué sirven + capital garantizado&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;Combinando calls y puts (long/short) puedo: garantizar capital, apostar al alza/baja, apostar a la volatilidad o a la NO volatilidad, abaratar inversiones y diseñar payoffs a medida. &lt;b&gt;Net debit&lt;/b&gt; = requiere inversión inicial; &lt;b&gt;net credit&lt;/b&gt; = genera cobro inicial. Convención Hull: las utilidades ignoran el valor tiempo del dinero.&lt;/p&gt;
    &lt;div class=&quot;ej cat&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Capital garantizado (PPT)&lt;/b&gt;Bono cupón cero $1.000 a 3 años al 6% cont. → hoy $835. Los $165 de interés van a long calls. En T: $1.000 garantizados ± payoff de los calls.&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c8&quot;&gt;U8&lt;/span&gt;Opción + subyacente (covered call, protective put)&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;table&gt;&lt;tr&gt;&lt;th&gt;Estrategia&lt;/th&gt;&lt;th&gt;Composición&lt;/th&gt;&lt;th&gt;Equivale a (por PCP)&lt;/th&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Covered call&lt;/td&gt;&lt;td&gt;Long acción + short call&lt;/td&gt;&lt;td&gt;Short put&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Reverse covered call&lt;/td&gt;&lt;td&gt;Short acción + long call&lt;/td&gt;&lt;td&gt;Long put&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Protective put&lt;/td&gt;&lt;td&gt;Long acción + long put&lt;/td&gt;&lt;td&gt;Long call&lt;/td&gt;&lt;/tr&gt;
    &lt;tr&gt;&lt;td&gt;Reverse protective put&lt;/td&gt;&lt;td&gt;Short acción + short put&lt;/td&gt;&lt;td&gt;Short call&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;
    &lt;p&gt;Covered call: vendo el escenario de suba arriba de K (limito ganancia, cobro prima). Protective put: sigo alcista pero asegurado contra caídas bajo K. La equivalencia sale de reordenar c + Ke&lt;sup&gt;−rT&lt;/sup&gt; = p + S₀.&lt;/p&gt;&lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;53.8&quot; x2=&quot;260&quot; y2=&quot;53.8&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;56.8&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,53.8 34.0,117.9 147.0,28.1 260.0,28.1 260.0,53.8&quot; fill=&quot;#4fc3f7&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,117.9 147.0,28.1 260.0,28.1&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Covered call&lt;/b&gt; (long acción S₀=100 + short call K=105, π=5). &lt;b&gt;Lectura:&lt;/b&gt; hasta K el perfil es el de la acción mejorado por la prima cobrada; arriba de K la ganancia queda &lt;b&gt;capeada&lt;/b&gt; en (K−S₀)+π = $10 — vendí el escenario de suba. La pérdida sigue siendo grande si la acción se desploma (como tener la acción, menos la prima). Por PCP, el perfil es el de un short put.&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;97.9&quot; x2=&quot;260&quot; y2=&quot;97.9&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;100.9&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,97.9 34.0,117.9 114.7,117.9 260.0,28.1 260.0,97.9&quot; fill=&quot;#4fc3f7&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,117.9 114.7,117.9 260.0,28.1&quot; fill=&quot;none&quot; stroke=&quot;#4fc3f7&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;114.7&quot; y1=&quot;12&quot; x2=&quot;114.7&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;114.7&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Protective put&lt;/b&gt; (long acción S₀=100 + long put K=95, π=5). &lt;b&gt;Lectura:&lt;/b&gt; sigo alcista (gano uno a uno con la suba, menos la prima) pero el put actúa de &lt;b&gt;seguro&lt;/b&gt;: debajo de K la pérdida queda congelada en (S₀−K)+π = $10, pase lo que pase. Por PCP, el perfil es el de un long call.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;&lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;92.2&quot; x2=&quot;260&quot; y2=&quot;92.2&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;95.2&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,92.2 34.0,28.1 147.0,117.9 260.0,117.9 260.0,92.2&quot; fill=&quot;#f87171&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,28.1 147.0,117.9 260.0,117.9&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;147.0&quot; y1=&quot;12&quot; x2=&quot;147.0&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;147.0&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Reverse covered call&lt;/b&gt; (short acción S₀=100 + long call K=105, π=5). &lt;b&gt;Lectura:&lt;/b&gt; sigo bajista (gano si cae) pero el call &lt;b&gt;capea la pérdida&lt;/b&gt; si el precio se dispara: arriba de K queda congelada en −10. Perfil de long put (por PCP).&lt;/figcaption&gt;&lt;/figure&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;48.1&quot; x2=&quot;260&quot; y2=&quot;48.1&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;51.1&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,48.1 34.0,28.1 114.7,28.1 260.0,117.9 260.0,48.1&quot; fill=&quot;#f87171&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,28.1 114.7,28.1 260.0,117.9&quot; fill=&quot;none&quot; stroke=&quot;#f87171&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;114.7&quot; y1=&quot;12&quot; x2=&quot;114.7&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;114.7&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K&lt;/text&gt;&lt;text x=&quot;260&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;S&lt;tspan font-size=&quot;7&quot; dy=&quot;2&quot;&gt;T&lt;/tspan&gt;&lt;/text&gt;&lt;text x=&quot;12&quot; y=&quot;18&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot;&gt;P&amp;amp;L&lt;/text&gt;&lt;/svg&gt;&lt;figcaption&gt;&lt;b&gt;Reverse protective put&lt;/b&gt; (short acción S₀=100 + short put K=95, π=5). &lt;b&gt;Lectura:&lt;/b&gt; vendo el escenario de caída: debajo de K la ganancia queda capeada en +10 (el put vendido me ejecuta), y si el precio sube pierdo sin tope. Perfil de short call (por PCP).&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;
  &lt;/div&gt;&lt;/details&gt;

  &lt;details&gt;&lt;summary&gt;&lt;span class=&quot;chip c8&quot;&gt;U8&lt;/span&gt;Spreads (bull, bear, box, butterfly, calendar)&lt;/summary&gt;&lt;div class=&quot;body&quot;&gt;
    &lt;p&gt;&lt;b&gt;Bull call&lt;/b&gt; (long K₁ + short K₂, K₁&amp;lt;K₂): net debit, payoff bruto 0 a K₂−K₁. Hull 10.1: call 30 a $3, vendo 35 a $1 → costo $2; gano $3 si S&lt;sub&gt;T&lt;/sub&gt;≥35, pierdo $2 si ≤30. Tipos: ambos OTM (agresivo) → ambos ITM (conservador).&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Bull put&lt;/b&gt; (long put K₁ + short put K₂): &lt;b&gt;net credit&lt;/b&gt;, payoff bruto 0 o negativo: la ganancia es la prima neta.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Bear put&lt;/b&gt; (long K₂ + short K₁): net debit. Hull 10.2: put 35 a $3, vendo 30 a $1 → costo $2; gano $3 si S&lt;sub&gt;T&lt;/sub&gt;≤30. &lt;b&gt;Bear call&lt;/b&gt;: net credit.&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Box spread&lt;/b&gt; = bull call + bear put (mismos K): payoff fijo K₂−K₁ →&lt;/p&gt;
    &lt;div class=&quot;frm&quot;&gt;Box = (K₂ − K₁)·e&lt;sup&gt;−rT&lt;/sup&gt; &amp;nbsp;→&amp;nbsp; &quot;tasa sintética&quot; (rinde r)&lt;/div&gt;
    &lt;p&gt;Solo vale con &lt;b&gt;europeas&lt;/b&gt;: con americanas (P &amp;gt; p posible) puede fallar. Hull Panorámica 10.1: box 55/60 teórico $4,93 europeo pero $5,26 americano → venderlo a $5,10 pierde (te ejercen el put 60 enseguida).&lt;/p&gt;
    &lt;p&gt;&lt;b&gt;Butterfly&lt;/b&gt; (long K₁ + long K₃ + short 2 K₂, K₂ al medio): apuesta a NO volatilidad, net debit, pérdida limitada a π. Hull: calls 55/60/65 a $10/$7/$5 → costo $1; ganancia máx en S&lt;sub&gt;T&lt;/sub&gt;=60: &lt;b&gt;$4&lt;/b&gt;; break-evens $56 y $64. Con puts es idéntico (PCP). &lt;b&gt;Short butterfly&lt;/b&gt;: net credit, apuesta a volatilidad.&lt;/p&gt;
    &lt;div class=&quot;ojo&quot;&gt;&lt;b class=&quot;tag&quot;&gt;Ojo — posible errata PPT&lt;/b&gt;La PPT da ganancia máx = K₃−K₁−π. Según Hull es &lt;b&gt;K₂−K₁−π&lt;/b&gt; (= (K₃−K₁)/2 − π con K₂ al medio). Chequeo: ejemplo 55/60/65, costo $1 → máx $4 = (60−55)−1, no $9. Los break-evens de la PPT sí están bien.&lt;/div&gt;
    &lt;p class=&quot;note&quot;&gt;Extra Hull (no está en la PPT): calendar spread (mismo K, distinto vencimiento; perfil tipo butterfly al vencer la corta) y diagonal spread (difieren K y T).&lt;/p&gt;&lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; role=&quot;img&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot; stroke-width=&quot;1&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;81.7&quot; x2=&quot;260&quot; y2=&quot;81.7&quot; stroke=&quot;#566075&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;84.7&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,81.7 34.0,116.6 109.3,116.6 184.7,29.4 260.0,29.4 260.0,81.7&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,116.6 109.3,116.6 184.7,29.4 260.0,29.4&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;109.3&quot; y1=&quot;12&quot; x2=&quot;109.3&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;109.3&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₁&lt;/text&gt;&lt;line x1=&quot;184.7&quot; y1=&quot;12&quot; x2=&quot;184.7&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;184.7&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₂&lt;/text&gt;&lt;circle cx=&quot;1 b&gt;Lectura:&lt;/b&gt; apuesta a la &lt;b&gt;NO volatilidad&lt;/b&gt;: el pico de ganancia (K₂−K₁−π = $4) está exactamente en K₂; se diluye hacia los BE ($56 y $64) y fuera de [K₁,K₃] la pérdida es solo la prima (−1). Riesgo chico, ganancia si el precio “no se mueve”.&lt;/figcaption&gt;&lt;/figure&gt;&lt;/div&gt;&lt;div class=&quot;chartgrid&quot;&gt;&lt;figure class=&quot;chart&quot;&gt;&lt;svg viewBox=&quot;0 0 270 160&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;&gt;&lt;line x1=&quot;34&quot; y1=&quot;12&quot; x2=&quot;34&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;134&quot; x2=&quot;260&quot; y2=&quot;134&quot; stroke=&quot;#2c3444&quot;/&gt;&lt;line x1=&quot;34&quot; y1=&quot;64.3&quot; x2=&quot;260&quot; y2=&quot;64.3&quot; stroke=&quot;#566075&quot; stroke-dasharray=&quot;4 3&quot;/&gt;&lt;text x=&quot;30&quot; y=&quot;67.3&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;end&quot;&gt;0&lt;/text&gt;&lt;polygon points=&quot;34.0,64.3 34.0,116.6 109.3,116.6 184.7,29.4 260.0,29.4 260.0,64.3&quot; fill=&quot;#4ade80&quot; opacity=&quot;0.10&quot;/&gt;&lt;polyline points=&quot;34.0,116.6 109.3,116.6 184.7,29.4 260.0,29.4&quot; fill=&quot;none&quot; stroke=&quot;#4ade80&quot; stroke-width=&quot;2.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;line x1=&quot;109.3&quot; y1=&quot;12&quot; x2=&quot;109.3&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;109.3&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₁&lt;/text&gt;&lt;line x1=&quot;184.7&quot; y1=&quot;12&quot; x2=&quot;184.7&quot; y2=&quot;134&quot; stroke=&quot;#222a38&quot; stroke-dasharray=&quot;2 3&quot;/&gt;&lt;text x=&quot;184.7&quot; y=&quot;146&quot; fill=&quot;#9aa3b5&quot; font-size=&quot;9&quot; text-anchor=&quot;middle&quot;&gt;K₂&lt;/text&gt;&lt;circle cx=&quot;154.5&quot; cy=&quot;64.3&quot; r=&quot;3&quo
